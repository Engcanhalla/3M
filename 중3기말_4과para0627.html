<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}
body{font-family:"Noto Sans KR",sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);min-height:100vh;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
.container{max-width:720px;width:100%;background:#f8fafc;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden}
.header{background:linear-gradient(150deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);padding:26px 24px 20px;color:#fff;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header h1{font-size:1.3rem;font-weight:800;margin-bottom:4px;letter-spacing:-.02em}
.header p{opacity:.75;font-size:.82rem}
.content{padding:22px 20px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.set-list{display:grid;gap:12px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:18px;padding:18px 22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 5px rgba(15,23,42,.07)}
.set-card:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-3px);box-shadow:0 6px 20px rgba(59,130,246,.18)}
.set-card.done{border-color:#34d399;background:linear-gradient(135deg,#ecfdf5,#d1fae5);box-shadow:0 2px 8px rgba(52,211,153,.15)}
.q-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0}
.q-chip{width:46px;height:46px;border-radius:13px;border:2px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#374151;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.q-chip:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-1px)}
.q-chip.correct{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
.q-chip.wrong{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337}
.progress-bar{height:8px;background:#e5e7eb;border-radius:4px;margin-bottom:16px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d5a87,#60a5fa);border-radius:4px;transition:width .4s}
.q-counter{text-align:center;font-size:.82rem;color:#6b7280;margin-bottom:8px;font-weight:500}
.key-box{text-align:center;margin:16px 0;padding:20px 18px;background:linear-gradient(135deg,#f0f7ff,#e8f0fe);border-radius:20px;border:2px solid #bfdbfe;box-shadow:0 3px 12px rgba(59,130,246,.1)}
.key-box .expr{font-size:1.45rem;font-weight:800;color:#1e3a5f;margin-bottom:8px;line-height:1.4;letter-spacing:-.02em}
.key-box .qtext{font-size:.95rem;color:#374151;font-weight:500}
.key-box .qtext .hl{color:#e11d48;font-weight:800}
.passage-box{margin:12px 0;padding:14px 18px;background:#fff;border-left:4px solid #3b82f6;border-radius:0 14px 14px 0;font-size:.88rem;color:#4b5563;line-height:1.75;font-style:italic;box-shadow:0 1px 4px rgba(59,130,246,.08)}
.show-passage-btn{margin:4px auto 10px;display:block;padding:7px 16px;background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;border-radius:10px;font-size:.8rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.options{display:grid;gap:10px;margin-top:16px}
.option-btn{padding:15px 18px;background:#fff;border:2px solid #e8ecf1;border-radius:16px;font-size:1rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;color:#1f2937;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(15,23,42,.07)}
.option-btn .num{width:34px;height:34px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#6b7280;flex-shrink:0;transition:all .2s}
.option-btn:hover:not(:disabled){border-color:#3b82f6;background:#f0f7ff;box-shadow:0 3px 10px rgba(59,130,246,.12)}
.option-btn.correct{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;animation:pop .3s;box-shadow:0 2px 10px rgba(16,185,129,.18)}
.option-btn.correct .num{background:#10b981;color:#fff}
.option-btn.wrong{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;animation:shake .4s;box-shadow:0 2px 10px rgba(244,63,94,.15)}
.option-btn.wrong .num{background:#f43f5e;color:#fff}
.option-btn.reveal{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
.option-btn.reveal .num{background:#10b981;color:#fff}
.option-btn:disabled{cursor:default;opacity:.85}
.feedback{text-align:center;padding:14px 16px;border-radius:16px;margin-top:14px;font-weight:700;font-size:.95rem;line-height:1.5}
.feedback.correct-fb{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1.5px solid #6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.15)}
.feedback.wrong-fb{background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;border:1.5px solid #fda4af;box-shadow:0 2px 8px rgba(244,63,94,.12)}
.explain-box{margin-top:12px;padding:14px 16px;background:#fff;border-radius:14px;border:1.5px solid #e8ecf1;box-shadow:0 1px 5px rgba(15,23,42,.06)}
.ex-title{font-size:.92rem;font-weight:700;color:#374151;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #f1f5f9}
.ex-item{padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:.9rem;line-height:1.75}
.ex-item:last-child{border-bottom:none}
.tag-w{color:#e11d48;font-weight:700;font-size:.8rem}
.tag-o{color:#059669;font-weight:600;font-size:.8rem}
.trans{color:#6b7280;font-size:.88rem}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1.5px solid #e8ecf1;gap:8px}
.nav-btn{padding:10px 18px;border:none;border-radius:12px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.nav-btn:active{transform:scale(.97);opacity:.9}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}
.nav-btn.prev{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 2px 10px rgba(45,90,135,.28)}
.nav-btn.home,.nav-btn.back{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:18px auto;font-size:2rem;font-weight:800;border:6px solid;box-shadow:0 6px 20px rgba(0,0,0,.12)}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 3px 12px rgba(45,90,135,.3)}
.btn-block{width:100%}
.opt-list{margin:16px 0}
.opt-item{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;border-radius:14px;border:2px solid #e8ecf1;margin-bottom:8px;font-size:1rem;line-height:1.65;color:#1f2937;background:#fff;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.opt-item .onum{width:32px;height:32px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:#6b7280;flex-shrink:0}
.opt-item.correct{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
.opt-item.correct .onum{background:#f43f5e;color:#fff}
.opt-item.wrong{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.opt-item.wrong .onum{background:#10b981;color:#fff}
.answer-section{margin:16px 0;padding:20px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:16px;border:1.5px solid #6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.1)}
.ans-label{font-size:.85rem;font-weight:700;color:#065f46;margin-bottom:10px}
.ans-correct{font-size:1.1rem;font-weight:800;color:#dc2626;margin-bottom:12px}
.explain-item{padding:9px 0;border-bottom:1px solid #d1fae5;font-size:.92rem;line-height:1.75}
.explain-item:last-child{border-bottom:none}
.tag-wrong{color:#e11d48;font-weight:700;font-size:.8rem}

rect":false,"explanation":"올바름: 250,000 = a quarter million, attracts = welcomes로 적절히 바꿔 표현","translation":"하루에 25만 명 이상의 관광객을 맞이하다","enText":""},{"text":"receives over 250,000 visitors on a daily basis","isCorrect":false,"explanation":"올바름: attracts = receives, every day = on a daily basis로 의미 일치","translation":"매일 250,000명이 넘는 방문객을 받다","enText":""},{"text":"is visited by fewer than 250,000 people each day","isCorrect":true,"explanation":"잘못됨: over 250,000 = more than 250,000인데 fewer than으로 반대 방향으로 왜곡됨","translation":"매일 250,000명 미만의 사람들이 방문하다","enText":""},{"text":"is popular enough to bring in 250,000 or more guests a day","isCorrect":false,"explanation":"올바름: attracts의 의미와 over 250,000의 수치가 모두 정확하게 반영됨","translation":"하루에 250,000명 이상의 손님을 끌어들일 만큼 인기 있다","enText":""}],"passage":"The market attracts over 250,000 visitors every day.","passageTranslation":"그 시장은 매일 250,000명이 넘는 방문객을 끌어들인다."},{"questionNumber":18,"sourceQuestion":"4번 지문","keyExpression":"traded and shipped to all corners of the world","questionText":"'traded and shipped to all corners of the world'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"exchanged and delivered around the globe","isCorrect":false,"explanation":"올바름: traded = exchanged, shipped = delivered, all corners of the world = around the globe로 적절","translation":"전 세계에 교환되고 배달되다","enText":""},{"text":"distributed to different countries after being sold","isCorrect":false,"explanation":"올바름: shipped to all corners = distributed to different countries로 전 세계 유통의 의미를 올바르게 표현","translation":"판매된 후 여러 나라에 배포되다","enText":""},{"text":"sold and sent to every part of the world","isCorrect":false,"explanation":"올바름: traded = sold, shipped = sent, all corners = every part로 의미 일치","translation":"세계 모든 곳에 판매되고 보내지다","enText":""},{"text":"bought and sold only within the country","isCorrect":true,"explanation":"잘못됨: all corners of the world = 전 세계인데 only within the country = 국내에서만으로 범위를 완전히 잘못 표현","translation":"국내에서만 사고팔리다","enText":""},{"text":"sent to places all over the world after trading","isCorrect":false,"explanation":"올바름: all corners of the world = places all over the world, shipped = sent로 의미 정확히 일치","translation":"거래 후 전 세계 각지로 보내지다","enText":""}],"passage":"Every day, around 20 million flowers are traded and shipped to all corners of the world.","passageTranslation":"매일 약 2천만 송이의 꽃이 거래되어 세계 각지로 배송된다."},{"questionNumber":19,"sourceQuestion":"4번 지문","keyExpression":"a good way to learn about the culture of a country","questionText":"'a good way to learn about the culture of a country'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a nice opportunity to explore what a country's culture is like","isCorrect":false,"explanation":"올바름: good way = nice opportunity, learn about culture = explore what culture is like로 의미 일치","translation":"한 나라의 문화가 어떤지 탐색하는 좋은 기회","enText":""},{"text":"a useful way to find out about how people live in a country","isCorrect":false,"explanation":"올바름: culture = how people live로 문화의 의미를 적절히 풀어서 표현","translation":"한 나라 사람들이 어떻게 사는지 알아보는 유용한 방법","enText":""},{"text":"one of the best ways to create a new culture","isCorrect":true,"explanation":"잘못됨: learn about culture = 문화를 배우는 것인데 create a new culture = 새 문화를 만들다로 의미를 정반대로 왜곡","translation":"새로운 문화를 만드는 가장 좋은 방법 중 하나","enText":""},{"text":"a helpful approach to discovering cultural traditions","isCorrect":false,"explanation":"올바름: good way = helpful approach, learn about culture = discovering cultural traditions으로 의미 일치","translation":"문화적 전통을 발견하는 데 도움이 되는 접근법","enText":""},{"text":"an effective method to understand a nation's culture","isCorrect":false,"explanation":"올바름: good way = effective method, learn about = understand로 의미 정확히 일치","translation":"한 나라의 문화를 이해하는 효과적인 방법","enText":""}],"passage":"Visiting markets is a good way to learn about the culture of a country.","passageTranslation":"시장을 방문하는 것은 한 나라의 문화를 배우는 좋은 방법이다."},{"questionNumber":20,"sourceQuestion":"4번 지문","keyExpression":"about a third of the country sits below sea level","questionText":"'about a third of the country sits below sea level'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"almost all of the country is located below the ocean","isCorrect":true,"explanation":"잘못됨: about a third = 약 3분의 1인데 almost all = 거의 전부로 범위를 크게 확대하여 왜곡","translation":"국토의 거의 전부가 해양 아래에 위치한다","enText":""},{"text":"nearly a third of the country's land is below the water level","isCorrect":false,"explanation":"올바름: about = nearly, a third = a third, below sea level = below the water level로 의미 일치","translation":"국토의 거의 3분의 1이 수면 아래에 있다","enText":""},{"text":"around one-third of the land lies at a level lower than the sea","isCorrect":false,"explanation":"올바름: about = around, a third = one-third, sits below sea level = lies at a level lower than the sea로 적절","translation":"국토의 약 3분의 1이 해수면보다 낮은 위치에 있다","enText":""},{"text":"roughly one-third of the land is lower than the sea","isCorrect":false,"explanation":"올바름: about = roughly, a third = one-third, below sea level = lower than the sea로 의미 정확히 일치","translation":"국토의 약 3분의 1이 해수면보다 낮다","enText":""},{"text":"approximately 33 percent of the country is under sea level","isCorrect":false,"explanation":"올바름: about = approximately, a third = 33 percent, below = under sea level로 의미 일치","translation":"국토의 약 33퍼센트가 해수면 아래에 있다","enText":""}],"passage":"As the name suggests, about a third of the country sits below sea level.","passageTranslation":"이름이 암시하듯이, 국토의 약 3분의 1이 해수면 아래에 위치한다."},{"questionNumber":21,"sourceQuestion":"4번 지문","keyExpression":"buy local foods and traditional gift items directly from boats","questionText":"'buy local foods and traditional gift items directly from boats'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"shop for local foods and handmade gifts from sellers on the water","isCorrect":false,"explanation":"올바름: directly from boats = from sellers on the water, traditional gift items = handmade gifts로 의미 일치","translation":"물 위의 판매자들로부터 현지 음식과 수공예 선물을 구매하다","enText":""},{"text":"order local foods and gifts to be delivered to your home","isCorrect":true,"explanation":"잘못됨: directly from boats = 보트에서 직접 구매하는 것인데 delivered to your home = 집으로 배달되는 것으로 구매 방식을 완전히 다르게 표현","translation":"현지 음식과 선물을 집으로 배달 주문하다","enText":""},{"text":"get local products and traditional goods without going to a store","isCorrect":false,"explanation":"올바름: directly from boats = without going to a store로 상점에 가지 않고 직접 구매한다는 의미를 올바르게 표현","translation":"가게에 가지 않고 현지 상품과 전통 물건을 얻다","enText":""},{"text":"buy regional foods and traditional items without a middleman","isCorrect":false,"explanation":"올바름: directly = without a middleman으로 직거래의 의미를 올바르게 표현, local = regional로 적절히 대체","translation":"중간상인 없이 지역 음식과 전통 물건을 구입하다","enText":""},{"text":"purchase local foods and souvenirs right from the boats","isCorrect":false,"explanation":"올바름: buy = purchase, traditional gift items = souvenirs, directly = right from으로 의미 일치","translation":"현지 음식과 기념품을 바로 보트에서 구입하다","enText":""}],"passage":"You can buy local foods and traditional gift items directly from boats.","passageTranslation":"여러분은 보트에서 직접 현지 음식과 전통 선물용 물품을 살 수 있다."},{"questionNumber":22,"sourceQuestion":"4번 지문","keyExpression":"has a long tradition of trade","questionText":"'has a long tradition of trade'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"has a history of doing business that goes back a long way","isCorrect":false,"explanation":"올바름: long tradition of trade = history of doing business that goes back a long way로 오랜 무역 역사를 적절히 표현","translation":"오래전으로 거슬러 올라가는 사업 역사를 가지고 있다","enText":""},{"text":"has recently started developing its trading customs","isCorrect":true,"explanation":"잘못됨: long tradition = 오랜 전통인데 recently started = 최근에 시작되었다고 하여 시간적 의미를 정반대로 왜곡","translation":"최근에 무역 관습을 발전시키기 시작했다","enText":""},{"text":"has been involved in trading for a very long time","isCorrect":false,"explanation":"올바름: long tradition of trade = has been trading for a long time으로 오랜 무역 전통을 적절히 표현","translation":"매우 오랫동안 무역에 관여해 왔다","enText":""},{"text":"has practiced trading as a custom for many generations","isCorrect":false,"explanation":"올바름: long tradition = practiced as a custom for many generations로 오랜 세대에 걸친 무역 전통의 의미를 올바르게 표현","translation":"여러 세대에 걸쳐 무역을 관습으로 실천해 왔다","enText":""},{"text":"is known for its long history of buying and selling goods","isCorrect":false,"explanation":"올바름: tradition of trade = history of buying and selling goods, long = long으로 의미 정확히 일치","translation":"물건을 사고파는 오랜 역사로 알려져 있다","enText":""}],"passage":"Turkey is a country where East meets West, so it has a long tradition of trade.","passageTranslation":"터키는 동서양이 만나는 나라이기 때문에 오랜 무역 전통을 가지고 있다."},{"questionNumber":23,"sourceQuestion":"4번 지문","keyExpression":"wonder whether there is any better way to discover another culture","questionText":"'wonder whether there is any better way to discover another culture'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"question if anything can beat visiting markets for learning about other cultures","isCorrect":false,"explanation":"올바름: wonder whether there is a better way = question if anything can beat로 더 나은 방법이 있는지 의문을 품는다는 의미 일치","translation":"다른 문화를 배우는 데 있어 시장 방문을 능가하는 것이 있는지 의문을 갖다","enText":""},{"text":"think there is clearly a much better way to learn about other cultures","isCorrect":true,"explanation":"잘못됨: wonder whether = ~인지 의문을 가지다(불확실)인데 think there is clearly = 분명히 있다고 생각한다로 불확실성을 확신으로 왜곡","translation":"다른 문화에 대해 배우는 훨씬 더 나은 방법이 분명히 있다고 생각하다","enText":""},{"text":"find myself thinking that markets may not be the only way to experience a culture","isCorrect":false,"explanation":"올바름: wonder whether there is a better way = markets may not be the only way로 더 좋은 방법의 가능성을 열어두는 의미를 올바르게 표현","translation":"시장이 문화를 경험하는 유일한 방법이 아닐 수도 있다고 생각하게 되다","enText":""},{"text":"ask myself if there is a more effective way to explore a different culture","isCorrect":false,"explanation":"올바름: wonder = ask myself, better = more effective, discover = explore로 의미 정확히 일치","translation":"다른 문화를 탐색하는 더 효과적인 방법이 있는지 자문하다","enText":""},{"text":"am not sure if visiting markets is the best way to understand a foreign culture","isCorrect":false,"explanation":"올바름: wonder whether = am not sure if로 의문과 불확실성의 의미를 올바르게 표현","translation":"시장 방문이 외국 문화를 이해하는 최선의 방법인지 확신하지 못하다","enText":""}],"passage":"I wonder whether there is any better way to discover another culture.","passageTranslation":"나는 다른 문화를 발견하는 데 있어 더 좋은 방법이 있는지 의문이 든다."},{"questionNumber":24,"sourceQuestion":"4번 지문","keyExpression":"the Dutch built up the land","questionText":"'the Dutch built up the land'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the people of the Netherlands added soil to increase the height of the land","isCorrect":false,"explanation":"올바름: built up = added soil to increase height로 흙을 쌓아 땅을 높였다는 구체적 방법으로 의미를 올바르게 표현","translation":"네덜란드 사람들은 땅의 높이를 높이기 위해 흙을 더했다","enText":""},{"text":"Dutch people worked to raise the level of their land","isCorrect":false,"explanation":"올바름: built up = raised the level로 낮은 땅을 높였다는 의미를 올바르게 표현","translation":"네덜란드 사람들은 땅의 수위를 높이기 위해 노력했다","enText":""},{"text":"people in the Netherlands created more usable land by filling it in","isCorrect":false,"explanation":"올바름: built up = created more usable land by filling in으로 간척지를 만들었다는 의미를 올바르게 표현","translation":"네덜란드 사람들은 땅을 메워 더 사용 가능한 토지를 만들었다","enText":""},{"text":"Dutch people developed the low land so they could use it","isCorrect":false,"explanation":"올바름: built up = developed, land = low land로 낮은 땅을 개발했다는 의미를 올바르게 표현","translation":"네덜란드 사람들은 사용할 수 있도록 낮은 땅을 개발했다","enText":""},{"text":"the Dutch decided to move their country to higher ground","isCorrect":true,"explanation":"잘못됨: built up the land = 땅을 쌓아 올렸다는 뜻인데 move their country to higher ground = 나라를 높은 곳으로 이동시켰다로 의미를 완전히 왜곡","translation":"네덜란드인들은 나라를 더 높은 곳으로 이전하기로 결정했다","enText":""}],"passage":"Thus, the Dutch built up the land, and one effective way to use it was to grow flowers and sell them.","passageTranslation":"따라서 네덜란드 사람들은 땅을 높였고, 그것을 활용하는 효과적인 방법 중 하나가 꽃을 재배하여 파는 것이었다."},{"questionNumber":25,"sourceQuestion":"4번 지문","keyExpression":"you can see how wholesale flower trading works","questionText":"'you can see how wholesale flower trading works'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"you can observe the process of trading flowers in large amounts","isCorrect":false,"explanation":"올바름: see = observe, wholesale = in large amounts, how it works = the process로 의미 일치","translation":"대량으로 꽃을 거래하는 과정을 관찰할 수 있다","enText":""},{"text":"you can participate in buying flowers at a low wholesale price","isCorrect":true,"explanation":"잘못됨: see how it works = 과정을 관찰하는 것인데 participate in buying = 직접 구매에 참여하다로 관찰을 행동으로 바꾸어 의미를 왜곡, 또한 지문에서 개인 구매는 불가능하다고 명시됨","translation":"낮은 도매 가격으로 꽃을 구매하는 것에 참여할 수 있다","enText":""},{"text":"it is possible to see the way flowers are sold in bulk","isCorrect":false,"explanation":"올바름: you can see = it is possible to see, wholesale trading = sold in bulk로 대량 판매 방식을 본다는 의미를 올바르게 표현","translation":"꽃이 대량으로 판매되는 방식을 볼 수 있다","enText":""},{"text":"you are able to watch how large-scale flower selling is done","isCorrect":false,"explanation":"올바름: see = watch, wholesale = large-scale, trading works = selling is done으로 의미 정확히 일치","translation":"대규모 꽃 판매가 어떻게 이루어지는지 볼 수 있다","enText":""},{"text":"visitors can find out how the large flower market operates","isCorrect":false,"explanation":"올바름: you can see how it works = visitors can find out how it operates로 시장의 운영 방식을 알 수 있다는 의미 일치","translation":"방문객들은 대형 꽃 시장이 어떻게 운영되는지 알 수 있다","enText":""}],"passage":"Sadly, you cannot, but you can see how wholesale flower trading works.","passageTranslation":"안타깝게도 그럴 수 없지만, 도매 꽃 거래가 어떻게 이루어지는지는 볼 수 있다."},{"questionNumber":26,"sourceQuestion":"5번 지문","keyExpression":"allow you to travel back in time to the old Korea","questionText":"'allow you to travel back in time to the old Korea'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"help you discover how Korea has changed in the future","isCorrect":true,"explanation":"잘못됨: 원문은 '옛 한국으로 시간 여행'을 의미하지만, 이 보기는 '미래의 변화를 발견'한다고 하여 시간 방향이 반대로 왜곡되었습니다.","translation":"한국이 미래에 어떻게 변할지 발견하도록 도와줍니다","enText":""},{"text":"give you a chance to experience Korea's past","isCorrect":false,"explanation":"올바름: 'allow you to'를 'give you a chance to'로, 'travel back in time'을 'experience Korea's past'로 자연스럽게 바꿨습니다.","translation":"한국의 과거를 경험할 기회를 줍니다","enText":""},{"text":"make it possible for you to connect with Korea's past","isCorrect":false,"explanation":"올바름: 'allow you to travel back in time'을 'make it possible to connect with Korea's past'로 자연스럽게 바꿨습니다.","translation":"한국의 과거와 연결될 수 있게 해줍니다","enText":""},{"text":"offer an opportunity to explore traditional Korean culture","isCorrect":false,"explanation":"올바름: 'travel back in time to old Korea'의 의미를 '전통 한국 문화 탐방 기회 제공'으로 적절히 표현했습니다.","translation":"전통 한국 문화를 탐방할 기회를 제공합니다","enText":""},{"text":"let you learn about Korea's history","isCorrect":false,"explanation":"올바름: '옛 한국으로 돌아가는 것'을 '한국 역사를 배우는 것'으로 적절히 paraphrase했습니다.","translation":"한국의 역사에 대해 배울 수 있게 해줍니다","enText":""}],"passage":"A few stops at some museums on the way will allow you to travel back in time to the old Korea.","passageTranslation":"가는 길에 몇몇 박물관에 잠시 들르면 옛 한국으로 시간 여행을 할 수 있습니다."},{"questionNumber":27,"sourceQuestion":"5번 지문","keyExpression":"We strongly recommend you be prepared for possible weather changes","questionText":"'We strongly recommend you be prepared for possible weather changes'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"We suggest that you bring items in case the weather changes","isCorrect":false,"explanation":"올바름: '날씨 변화에 대비해 물품을 챙기도록 제안한다'는 원문의 의미를 잘 담고 있습니다.","translation":"날씨가 변할 경우에 대비해 물품을 챙길 것을 제안합니다","enText":""},{"text":"We require that you cancel your plans if the weather becomes bad","isCorrect":true,"explanation":"잘못됨: 원문은 날씨 변화에 '대비하도록 권고'하는 것이지만, 이 보기는 날씨가 나쁘면 '계획을 취소하도록 요구'한다고 하여 의미가 완전히 왜곡되었습니다.","translation":"날씨가 나빠지면 계획을 취소하도록 요구합니다","enText":""},{"text":"You are highly encouraged to prepare for unexpected weather conditions","isCorrect":false,"explanation":"올바름: 'strongly recommend'를 'highly encourage'로, 'possible weather changes'를 'unexpected weather conditions'로 자연스럽게 paraphrase했습니다.","translation":"예상치 못한 날씨 상황에 대비할 것을 강력히 권장합니다","enText":""},{"text":"It is a good idea to be ready for changes in the weather","isCorrect":false,"explanation":"올바름: 권고의 의미를 'it is a good idea to be ready'로 자연스럽게 바꿨습니다.","translation":"날씨 변화에 대비하는 것이 좋습니다","enText":""},{"text":"It is strongly advised that you get ready for weather that may change","isCorrect":false,"explanation":"올바름: 'recommend'를 'advise'로, 'be prepared'를 'get ready'로 적절히 바꿨습니다.","translation":"날씨가 변할 수 있으므로 준비하도록 강력히 권고됩니다","enText":""}],"passage":"We strongly recommend you be prepared for possible weather changes.","passageTranslation":"날씨가 변할 수 있으니 반드시 대비하실 것을 강력히 권고합니다."},{"questionNumber":28,"sourceQuestion":"5번 지문","keyExpression":"no refunds will be given","questionText":"'no refunds will be given'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"participants cannot receive any money back","isCorrect":false,"explanation":"올바름: 'no refunds will be given'을 '참가자가 돈을 돌려받을 수 없다'로 정확히 표현했습니다.","translation":"참가자들은 어떠한 환불도 받을 수 없습니다","enText":""},{"text":"a partial refund may be offered in some cases","isCorrect":true,"explanation":"잘못됨: 원문은 '어떠한 환불도 없다'고 명시하지만, 이 보기는 '일부 경우에 부분 환불이 가능할 수 있다'고 하여 원문과 정반대의 의미를 나타냅니다.","translation":"경우에 따라 부분 환불이 제공될 수 있습니다","enText":""},{"text":"you will not get your money back","isCorrect":false,"explanation":"올바름: '환불이 주어지지 않는다'를 '돈을 돌려받지 못한다'로 자연스럽게 표현했습니다.","translation":"돈을 돌려받지 못합니다","enText":""},{"text":"the payment you made will not be returned","isCorrect":false,"explanation":"올바름: 'no refunds will be given'을 '지불한 금액이 반환되지 않는다'로 적절히 paraphrase했습니다.","translation":"지불한 금액은 반환되지 않습니다","enText":""},{"text":"your fee will not be returned to you","isCorrect":false,"explanation":"올바름: '환불 없음'의 의미를 '참가비가 돌려지지 않는다'로 자연스럽게 paraphrase했습니다.","translation":"참가비는 귀하에게 반환되지 않습니다","enText":""}],"passage":"Participants may choose not to attend the changed schedule, but no refunds will be given.","passageTranslation":"참가자는 변경된 일정에 참석하지 않을 수 있지만, 환불은 제공되지 않습니다."},{"questionNumber":29,"sourceQuestion":"5번 지문","keyExpression":"If you are new to the group, please provide your emergency contact information","questionText":"'If you are new to the group, please provide your emergency contact information'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"new members need to give details of a person to contact in case of emergency","isCorrect":false,"explanation":"올바름: 'new to the group'을 'new members'로, 'emergency contact information'을 'details of a person to contact in case of emergency'로 적절히 표현했습니다.","translation":"신규 회원은 긴급 상황 시 연락할 사람의 정보를 제공해야 합니다","enText":""},{"text":"those joining for the first time must include emergency contact details","isCorrect":false,"explanation":"올바름: 'new to the group'과 'provide emergency contact information'을 자연스럽게 paraphrase했습니다.","translation":"처음 참가하는 사람은 비상 연락처를 포함해야 합니다","enText":""},{"text":"if this is your first time joining, you should submit contact details for emergencies","isCorrect":false,"explanation":"올바름: 'new to the group'과 'emergency contact information'의 의미를 자연스럽게 paraphrase했습니다.","translation":"처음 참가하는 경우 비상 연락처를 제출해야 합니다","enText":""},{"text":"all participants are required to submit emergency contact information","isCorrect":true,"explanation":"잘못됨: 원문은 '그룹에 처음 온 사람'에게만 비상 연락처 제출을 요구하지만, 이 보기는 '모든 참가자'에게 요구한다고 하여 대상 범위가 잘못 확대되었습니다.","translation":"모든 참가자는 비상 연락처를 제출해야 합니다","enText":""},{"text":"first-time participants should share information about someone who can be contacted in an emergency","isCorrect":false,"explanation":"올바름: 'new to the group'을 'first-time participants'로, 'emergency contact information'을 '비상 연락 가능한 사람의 정보'로 적절히 표현했습니다.","translation":"처음 참가하는 사람은 비상시 연락 가 var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
var CIRCLED=["①","②","③","④","⑤","⑥"];
function esc(s){if(s==null)return "";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub;}
function gi(si,pi){return si*SET_SIZE+pi;}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var len=sq.length;var done=0,correct=0;
    for(var i=0;i<len;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===len);
    var pct=done>0?Math.round(correct/len*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af;'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b;'>📝 "+done+"/"+len+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"+
           "<div><div style='font-weight:700;'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400;'>("+len+"문제)</span></div></div>"+
           "<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"+
    "<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"+
    "<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>총 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"+
    "</div>"+
    "<div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0);}
function showQ(pos){
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length)return;
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var optsHTML=q.options.map(function(o,i){
    var cls="";
    if(answered){
      if(i===answered.selected&&!answered.isCorrect)cls="wrong";
      if(o.isCorrect)cls=(answered.isCorrect&&i===answered.selected)?"correct":"reveal";
    }
    return "<button class='option-btn "+cls+"' onclick='answer("+pos+","+i+")' "+(answered?"disabled":"")+">"+
           "<span class='num'>"+(i+1)+"</span><span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidx=q.options.findIndex(function(o){return o.isCorrect;});
    var cLabel=cidx>=0?CIRCLED[cidx]:"?";
    feedbackHTML=
      "<div class='feedback "+(answered.isCorrect?"correct-fb":"wrong-fb")+"'>"+
      (answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)+
      "</div>"+
      "<div class='explain-box'><div class='ex-title'>해설</div>"+
      q.options.map(function(o,i){
        var tag=q.qmode==="ko"
          ?(o.isCorrect?"<span class='tag-w'>[오답 — 틀린 해석]</span>":"<span class='tag-o'>[올바른 해석]</span>")
          :(o.isCorrect?"<span class='tag-w'>[오답 — 잘못된 paraphrasing]</span>":"<span class='tag-o'>[올바른 paraphrasing]</span>");
        var sub=q.qmode==="ko"?(o.enText||o.explanation):(o.translation||o.explanation);
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag+
               "<br><span class='trans'>→ "+esc(sub)+"</span></div>";
      }).join("")+
      "</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection=
      "<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"+
      "<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"+
    "<div class='progress-bar'><div class='progress-fill' style='width:"+pct+"%'></div></div>"+
    (q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px;'>"+esc(q.sourceQuestion)+"</div>":"")+
    "<div class='key-box'>"+
    "<div class='expr'>“"+esc(q.keyExpression)+"”</div>"+
    (q.qmode==="ko"?"<div class='qtext'>위 표현의 <span class='hl'>의미(한글 해석)</span>로 잘못된 것은?</div>":"<div class='qtext'>위 표현을 <span class='hl'>잘못</span> paraphrasing 한 것은?</div>")+
    "</div>"+
    passageSection+
    "<div class='options'>"+optsHTML+"</div>"+
    feedbackHTML+
    "<div class='nav-bar'>"+
    "<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"+
    "<button class='nav-btn home' onclick='showIndex()'>목록</button>"+
    "<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>"+
    "</div>";
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기";}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기";}
}
function answer(pos,optIdx){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=!!(q.options[optIdx]&&q.options[optIdx].isCorrect);
  answers[gidx]={selected:optIdx,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"+
    "<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"통과!":"미달")+"</p>"+
    "<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"+
    "</div>"+
    "<div style='margin-top:16px'><button class='btn btn-primary btn-block' onclick='showIndex()'>목록으로</button></div>";
}
showIndex();
</script>
</body>
</html>
