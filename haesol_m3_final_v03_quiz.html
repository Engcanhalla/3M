<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 해솔중 3학년 영어 기말고사 모의시험 Set 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;--primary-light:#e0e7ff;--primary-dark:#3730a3;
  --accent:#7c3aed;
  --success:#16a34a;--success-light:#dcfce7;
  --danger:#dc2626;--danger-light:#fee2e2;
  --warning:#f59e0b;--warning-light:#fef3c7;
  --para:#ea580c;--para-light:#ffedd5;
  --bg:#eef2ff;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#c7d2fe;
  --radius:12px;
}
body{font-family:'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55}
.container{max-width:760px;margin:0 auto;padding:16px}
.start-screen{text-align:center;padding:48px 20px}
.start-screen h1{font-size:1.7rem;margin-bottom:6px;color:var(--primary)}
.start-screen .sub-title{color:var(--muted);margin-bottom:24px;font-size:0.95rem}
.start-screen .info-box{background:var(--primary-light);border-radius:var(--radius);padding:22px;margin:18px 0;text-align:left;font-size:.9rem;line-height:1.85}
.start-screen .info-box strong{color:var(--primary-dark)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 30px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-sm{padding:8px 18px;font-size:.85rem}
.progress-bar{background:var(--border);border-radius:99px;height:8px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .4s ease}
.progress-text{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:4px}
.q-map{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:10px 0 14px}
.q-dot{aspect-ratio:1;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s;background:#fff}
.q-dot:hover{transform:scale(1.08)}
.q-dot.answered{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark)}
.q-dot.current{background:var(--primary);color:#fff;border-color:var(--primary)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.04);padding:22px;margin:14px 0}
.card.paraphrased{border-top:3px solid var(--para)}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.q-num{background:var(--primary);color:#fff;border-radius:99px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;flex-shrink:0}
.q-type{font-size:.72rem;padding:3px 9px;border-radius:99px;font-weight:600}
.q-type.d{background:#fef3c7;color:#92400e}
.q-type.p{background:#dbeafe;color:#1e40af}
.q-type.k{background:#fce7f3;color:#9d174d}
.q-type.g{background:#dcfce7;color:#065f46}
.q-type.t{background:#ede9fe;color:#5b21b6}
.q-pts{font-size:.72rem;color:var(--muted);font-weight:600}
.q-diff{font-size:.68rem;padding:2px 8px;border-radius:99px;font-weight:700}
.q-diff.low{background:#e0f2fe;color:#0369a1}
.q-diff.mid{background:#fef3c7;color:#a16207}
.q-diff.high{background:#fee2e2;color:#b91c1c}
.para-badge{background:var(--para-light);color:var(--para);padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:700}
.multi-hint{font-size:.78rem;color:#b91c1c;background:#fee2e2;padding:6px 10px;border-radius:6px;margin-bottom:10px;font-weight:600}
.stem{font-size:.95rem;line-height:1.65;margin-bottom:14px;font-weight:500;white-space:pre-line}
.passage{background:#eef2ff;border-left:3px solid var(--primary);padding:12px 14px;margin-bottom:14px;font-size:.86rem;line-height:1.8;border-radius:0 8px 8px 0;white-space:pre-line;max-height:340px;overflow-y:auto;font-family:'Times New Roman',serif}
.passage u{text-decoration:underline;text-decoration-color:var(--danger);text-underline-offset:3px;font-weight:600}
.passage b{font-weight:700;color:var(--primary-dark)}
.choices{list-style:none;display:flex;flex-direction:column;gap:7px}
.choice{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:.88rem;line-height:1.55}
.choice:hover{border-color:var(--primary);background:var(--primary-light)}
.choice.selected{border-color:var(--primary);background:var(--primary-light)}
.choice input{margin-top:3px;flex-shrink:0;accent-color:var(--primary)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:8px}
.nav-row .btn{min-width:96px}
.result-screen{text-align:center;padding:36px 20px}
.score-circle{width:170px;height:170px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:18px auto;font-size:2.6rem;font-weight:800;border:6px solid}
.score-circle.perfect{border-color:var(--warning);background:#fffbeb;color:var(--warning);animation:pulse 1s infinite}
.score-circle.great{border-color:var(--success);background:var(--success-light);color:var(--success)}
.score-circle.retry{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.score-circle small{font-size:.78rem;font-weight:400;margin-top:4px}
.result-msg{font-size:1.05rem;margin:14px 0;line-height:1.6}
.result-detail{background:#eef2ff;border-radius:var(--radius);padding:16px;margin:14px 0;text-align:left;font-size:.86rem;line-height:1.85}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.review-card{border-left:4px solid var(--danger);margin-bottom:14px}
.my-answer{background:#fef3c7;border-radius:6px;padding:10px;margin:8px 0;font-size:.85rem}
.model-answer{background:var(--success-light);border-radius:6px;padding:10px;margin:8px 0;font-size:.85rem}
.explanation{background:var(--warning-light);border-radius:6px;padding:10px 12px;margin-top:10px;font-size:.84rem;line-height:1.6;color:#713f12}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
@media(max-width:520px){.container{padding:10px}.card{padding:14px}.q-map{grid-template-columns:repeat(8,1fr)}.passage{font-size:.8rem;max-height:260px}}
</style>
</head>

let state={screen:"start",cur:0,ans:{},score:0,wrong:[],retry:null,att:1,startTime:0,elapsed:0};
function fmt(ms){if(!ms||ms<0) return "0초";const s=Math.floor(ms/1000);const m=Math.floor(s/60);const r=s%60;return m>0?`${m}분 ${r}초`:`${r}초`;}
const app=document.getElementById("app");
const TOT=Q.reduce((s,q)=>s+q.pts,0);
const lowC=Q.filter(q=>q.diff==="low").length;
const midC=Q.filter(q=>q.diff==="mid").length;
const highC=Q.filter(q=>q.diff==="high").length;
const paraC=Q.filter(q=>q.paraphrased).length;

function activeQs(){if(state.retry==="wrong") return Q.filter(q=>state.wrong.includes(q.id));return Q;}
function isCorrect(u,c){if(!u||u.length!==c.length) return false;const su=[...u].sort((a,b)=>a-b);const sc=[...c].sort((a,b)=>a-b);return su.every((v,i)=>v===sc[i]);}
function render(){switch(state.screen){case"start":rStart();break;case"quiz":rQuiz();break;case"result":rRes();break;case"review":rRev();break;}}
function esc(s){if(s==null) return "";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/&lt;u&gt;/g,"<u>").replace(/&lt;\/u&gt;/g,"</u>").replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>");}

function rStart(){
  app.innerHTML=`<div class="start-screen">
    <h1>2026 해솔중 3학년 영어 기말고사 모의시험</h1>
    <p class="sub-title">finaltermM3 Set 3 · 40문제 · 100점</p>
    <div class="info-box">
      <strong>난이도 분포</strong><br>
      • <strong>하 (low)</strong> ${lowC}문제 — 단일 정답 (라디오, 30%)<br>
      • <strong>중 (mid)</strong> ${midC}문제 — 복수 정답 + 개수 공개 (체크박스, 30%)<br>
      • <strong>상 (high)</strong> ${highC}문제 — 복수 정답 + 개수 비공개 (체크박스, 40%)<br><br>
      <strong>★ 중3 4대 문법:</strong> 분사 후치수식·since/though·관계부사·if/whether<br>
      <strong>✏️ Paraphrasing 적용:</strong> ${paraC}문제 (30%)<br><br>
      <strong>채점 규칙:</strong><br>
      • 95점 이상 — 🎉 EXCELLENT! 축포!<br>
      • 90~94점 — 틀린 문제만 재도전<br>
      • 90점 미만 — 전체 처음부터 재도전
    </div>
    <button class="btn btn-primary" onclick="start()" style="font-size:1.05rem;padding:14px 44px">시작하기</button>
  </div>`;
}

function start(){state.screen="quiz";state.cur=0;state.ans={};state.score=0;state.wrong=[];state.startTime=Date.now();state.elapsed=0;render();}

function rQuiz(){
  const qs=activeQs();const q=qs[state.cur];const total=qs.length;
  const aCnt=Object.keys(state.ans).filter(k=>state.ans[k]&&state.ans[k].length>0).length;
  const pct=Math.round(((state.cur+1)/total)*100);
  const isMulti=q.diff!=="low";
  const sel=state.ans[q.id]||[];
  const diffLabel=q.diff==="low"?"하":q.diff==="mid"?"중":"상";
  const countHint=q.diff==="mid"?`<div class="multi-hint">✓ 복수 정답 — 정답 ${q.answers.length}개를 모두 고르세요</div>`:q.diff==="high"?`<div class="multi-hint">✓ 복수 정답 — "모두 고르시오" (개수 비공개)</div>`:"";

  app.innerHTML=`
  <div class="progress-text"><span>${state.cur+1} / ${total}</span><span>${aCnt}/${total} 완료</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="q-map">${qs.map((qq,i)=>{let cls="q-dot";if(i===state.cur) cls+=" current";else if(state.ans[qq.id]&&state.ans[qq.id].length>0) cls+=" answered";return`<div class="${cls}" onclick="goto(${i})">${qq.num}</div>`}).join("")}</div>
  <div class="card${q.paraphrased?" paraphrased":""}">
    <div class="q-header">
      <div class="q-num">${q.num}</div>
      <span class="q-type ${q.cat}">${esc(q.type)}</span>
      <span class="q-pts">${q.pts}점</span>
      <span class="q-diff ${q.diff}">난이도 ${diffLabel}</span>
      ${q.paraphrased?`<span class="para-badge">✏️ Paraphrased</span>`:""}
    </div>
    ${countHint}
    <div class="stem">${esc(q.stem)}</div>
    ${q.passage?`<div class="passage">${q.passage}</div>`:""}
    <ul class="choices">${q.choices.map((c,i)=>{const n=i+1;const checked=sel.includes(n);return`<li class="choice${checked?" selected":""}" onclick="pick(${n},${isMulti})"><input type="${isMulti?"checkbox":"radio"}" name="q${q.id}" ${checked?"checked":""}><span>${"①②③④⑤"[i]} ${esc(c)}</span></li>`}).join("")}</ul>
  </div>
  <div class="nav-row">
    <button class="btn btn-outline btn-sm" ${state.cur===0?"disabled":""} onclick="goto(${state.cur-1})">◀ 이전</button>
    ${state.cur===total-1?`<button class="btn btn-success btn-sm" onclick="submit()">제출하기 ✓</button>`:`<button class="btn btn-primary btn-sm" onclick="goto(${state.cur+1})">다음 ▶</button>`}
  </div>`;
}

function pick(n,isMulti){
  const qs=activeQs();const q=qs[state.cur];
  let sel=state.ans[q.id]||[];
  if(isMulti){if(sel.includes(n)) sel=sel.filter(x=>x!==n);else sel=[...sel,n];}
  else{sel=[n];}
  state.ans[q.id]=sel;render();
}

function goto(i){const qs=activeQs();if(i>=0&&i<qs.length){state.cur=i;render()}}

function submit(){
  const qs=activeQs();
  const unanswered=qs.filter(q=>!state.ans[q.id]||state.ans[q.id].length===0);
  if(unanswered.length>0){if(!confirm(`아직 ${unanswered.length}문제를 풀지 않았습니다. 그래도 제출하시겠습니까?`)) return;}
  let score=0;const wrong=[];
  qs.forEach(q=>{if(isCorrect(state.ans[q.id],q.answers)) score+=q.pts;else wrong.push(q.id);});
  state.elapsed=Date.now()-state.startTime;
  state.attemptTotal=qs.length;state.attemptCorrect=qs.length-wrong.length;state.attemptMaxPts=qs.reduce((s,q)=>s+q.pts,0);
  state.score=score;state.wrong=wrong;state.screen="result";render();
  if(state.score>=95) confetti();
}

function rRes(){
  const qs=activeQs();const max=state.attemptMaxPts||qs.reduce((s,q)=>s+q.pts,0);
  const total=state.attemptTotal||qs.length;const cc=state.attemptCorrect!==undefined?state.attemptCorrect:(qs.length-state.wrong.length);const wc=total-cc;const pct=Math.round((state.score/max)*100);
  let cls,msg,btns;
  if(state.score>=95){cls="perfect";msg=`<b>🎉 EXCELLENT!</b> ${state.score}점!<br>대단합니다!`;
    btns=`${wc>0?`<button class="btn btn-success" onclick="retryW()">틀린 문제 재도전</button>`:""}<button class="btn btn-outline" onclick="showRev()">오답 복습</button><button class="btn btn-primary" onclick="resetAll()">처음부터</button>`;}
  else if(state.score>=90){cls="great";msg=`훌륭합니다! ${pct}점<br>틀린 ${wc}문제만 다시 풀어보세요.`;
    btns=`<button class="btn btn-success" onclick="retryW()">틀린 문제만 재도전</button><button class="btn btn-outline" onclick="showRev()">오답 복습</button><button class="btn btn-outline" onclick="resetAll()">처음부터</button>`;}
  else{cls="retry";msg=`${pct}점 (${state.score}/${max})<br>전체 문제를 다시 도전하세요!`;
    btns=`<button class="btn btn-outline" onclick="showRev()">오답 복습</button><button class="btn btn-danger" onclick="resetAll()">전체 재도전</button>`;}
  app.innerHTML=`<div class="result-screen">
    <h2>${state.att>1?`${state.att}차 `:""}채점 결과</h2>
    <div class="score-circle ${cls}"><span>${state.score}</span><small>/ ${max}점</small></div>
    <div class="result-msg">${msg}</div>
    <div class="result-detail">
      <b>📋 시험:</b> finaltermM3 Set 3<br>
      <b>정답:</b> ${cc}문제 / <b>오답:</b> ${wc}문제 / <b>정답률:</b> ${pct}%<br>
      <b>⏱ 풀이 시간:</b> ${fmt(state.elapsed)}<br>
      ${wc>0?`<b>틀린 문제:</b> ${state.wrong.map(id=>Q.find(x=>x.id===id)?.num).filter(Boolean).sort((a,b)=>a-b).join(", ")}번`:""}
    </div>
    <div class="result-btns">${btns}</div>
  </div>`;
}

function retryW(){state.retry="wrong";state.att++;state.screen="quiz";state.cur=0;state.ans={};state.score=0;state.startTime=Date.now();state.elapsed=0;render();}
function resetAll(){state.retry=null;state.att=1;state.screen="start";state.ans={};state.score=0;state.wrong=[];render();}
function showRev(){state.screen="review";render();}

function rRev(){
  app.innerHTML=`<div class="card">
    <h2 style="color:var(--primary);margin-bottom:14px">📖 오답 복습</h2>
    ${activeQs().filter(q=>state.wrong.includes(q.id)).map(q=>{
      const my=state.ans[q.id]&&state.ans[q.id].length>0?[...state.ans[q.id]].sort((a,b)=>a-b).map(n=>"①②③④⑤"[n-1]).join(", "):"(미응답)";
      const corr=[...q.answers].sort((a,b)=>a-b).map(n=>`${"①②③④⑤"[n-1]} ${esc(q.choices[n-1])}`).join("<br>");
      return `<div class="card review-card${q.paraphrased?" paraphrased":""}">
        <div class="q-header"><div class="q-num">${q.num}</div><span class="q-type ${q.cat}">${esc(q.type)}</span><span class="q-pts">${q.pts}점</span><span class="q-diff ${q.diff}">난이도 ${q.diff==="low"?"하":q.diff==="mid"?"중":"상"}</span>${q.paraphrased?`<span class="para-badge">✏️ Paraphrased</span>`:""}</div>
        <div class="stem">${esc(q.stem)}</div>
        ${q.passage?`<div class="passage">${q.passage}</div>`:""}
        <div class="my-answer"><b>[내 답안]</b> ${my}</div>
        <div class="model-answer"><b>[정답]</b><br>${corr}</div>
        <div class="explanation"><b>해설:</b> ${esc(q.explanation)}${q.paraphrasingNote?`<br><b>✏️ 원문:</b> ${esc(q.paraphrasingNote)}`:""}</div>
      </div>`;
    }).join("")}
    <div style="text-align:center;margin-top:18px"><button class="btn btn-outline" onclick="state.screen='result';render()">결과로 돌아가기</button></div>
  </div>`;
}

function confetti(){
  const c=document.getElementById("confetti-canvas");const ctx=c.getContext("2d");
  c.width=window.innerWidth;c.height=window.innerHeight;
  const colors=["#4f46e5","#7c3aed","#ea580c","#16a34a","#3730a3","#fbbf24"];
  const parts=[];for(let i=0;i<140;i++){parts.push({x:Math.random()*c.width,y:-20,vx:(Math.random()-0.5)*5,vy:Math.random()*4+3,size:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],angle:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.2});}
  let f=0;function tick(){ctx.clearRect(0,0,c.width,c.height);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;p.vy+=0.05;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();});f++;if(f<260) requestAnimationFrame(tick);else ctx.clearRect(0,0,c.width,c.height);}tick();
}
render();
</script>
</body>
