<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 해솔중 3학년 영어 기말고사 모의시험 Set 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;--primary-light:#e0e7ff;--primary-dark:#3730a3;
  --accent:#7c3aed;
  --success:#16a34a;--success-light:#dcfce7;
  --danger:#dc2626;--danger-light:#fee2e2;
  --warning:#f59e0b;--warning-light:#fef3c7;
  --d-color:#f59e0b;--p-color:#2563eb;--k-color:#db2777;--g-color:#16a34a;--t-color:#7c3aed;
  --para-color:#ea580c;--para-light:#ffedd5;
  --bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --radius:12px;
}
body{font-family:'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55}
.container{max-width:760px;margin:0 auto;padding:16px}
.start-screen{text-align:center;padding:48px 20px}
.start-screen h1{font-size:1.7rem;margin-bottom:6px;color:var(--primary)}
.start-screen .sub-title{color:var(--muted);margin-bottom:24px;font-size:0.95rem}
.start-screen .info-box{background:var(--primary-light);border-radius:var(--radius);padding:22px;margin:18px 0;text-align:left;font-size:.9rem;line-height:1.85}
.start-screen .info-box strong{color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 30px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-sm{padding:8px 18px;font-size:.85rem}
.progress-bar{background:var(--border);border-radius:99px;height:8px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .4s ease}
.progress-text{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:4px}
.q-map{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:10px 0 14px}
.q-dot{aspect-ratio:1;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s;background:#fff}
.q-dot:hover{transform:scale(1.08)}
.q-dot.answered{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.q-dot.current{background:var(--primary);color:#fff;border-color:var(--primary)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.04);padding:22px;margin:14px 0;animation:slideIn .3s ease;position:relative}
.card.paraphrased{border-top:3px solid var(--para-color)}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.q-num{background:var(--primary);color:#fff;border-radius:99px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;flex-shrink:0}
.q-type{font-size:.72rem;padding:3px 9px;border-radius:99px;font-weight:600}
.q-type.d{background:#fef3c7;color:#92400e}
.q-type.p{background:#dbeafe;color:#1e40af}
.q-type.k{background:#fce7f3;color:#9d174d}
.q-type.g{background:#dcfce7;color:#065f46}
.q-type.t{background:#ede9fe;color:#5b21b6}
.q-pts{font-size:.72rem;color:var(--muted);font-weight:600}
.q-diff{font-size:.68rem;padding:2px 8px;border-radius:99px;font-weight:700}
.q-diff.low{background:#e0f2fe;color:#0369a1}
.q-diff.mid{background:#fef9c3;color:#a16207}
.q-diff.high{background:#fee2e2;color:#b91c1c}
.q-para-badge{background:var(--para-light);color:var(--para-color);padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700}
.stem{font-size:.95rem;line-height:1.65;margin-bottom:14px;font-weight:500;white-space:pre-line}
.passage{background:#f1f5f9;border-left:3px solid var(--primary);padding:12px 14px;margin-bottom:14px;font-size:.86rem;line-height:1.8;border-radius:0 8px 8px 0;white-space:pre-line;max-height:340px;overflow-y:auto;font-family:'Times New Roman',serif}
.passage u{text-decoration:underline;text-decoration-color:var(--danger);text-underline-offset:3px;font-weight:600}
.passage b{font-weight:700;color:var(--primary-dark)}
.choices{list-style:none;display:flex;flex-direction:column;gap:7px}
.choice{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:.88rem;line-height:1.55}
.choice:hover{border-color:var(--primary);background:var(--primary-light)}
.choice.selected{border-color:var(--primary);background:var(--primary-light)}
.choice.correct{border-color:var(--success);background:var(--success-light)}
.choice.wrong{border-color:var(--danger);background:var(--danger-light)}
.choice input{margin-top:3px;flex-shrink:0;accent-color:var(--primary)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:8px}
.nav-row .btn{min-width:96px}
.result-screen{text-align:center;padding:36px 20px}
.score-circle{width:170px;height:170px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:18px auto;font-size:2.6rem;font-weight:800;border:6px solid}
.score-circle.perfect{border-color:var(--warning);background:#fffbeb;color:var(--warning);animation:pulse 1s infinite}
.score-circle.great{border-color:var(--success);background:var(--success-light);color:var(--success)}
.score-circle.retry{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.score-circle small{font-size:.78rem;font-weight:400;margin-top:4px}
.result-msg{font-size:1.05rem;margin:14px 0;line-height:1.6}
.result-detail{background:#f1f5f9;border-radius:var(--radius);padding:16px;margin:14px 0;text-align:left;font-size:.86rem;line-height:1.85}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.review-card{border-left:4px solid var(--danger);margin-bottom:14px}
.review-card.correct{border-left-color:var(--success)}
.my-answer{background:#fef3c7;border-radius:6px;padding:10px;margin:8px 0;font-size:.85rem;line-height:1.6}
.model-answer{background:var(--success-light);border-radius:6px;padding:10px;margin:8px 0;font-size:.85rem;line-height:1.6}
.explanation{background:var(--warning-light);border-radius:6px;padding:10px 12px;margin-top:10px;font-size:.84rem;line-height:1.6;color:#713f12}
.para-note{background:var(--para-light);border-left:3px solid var(--para-color);padding:8px 12px;margin-top:8px;font-size:.8rem;color:#9a3412;border-radius:0 4px 4px 0}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
@media(max-width:520px){.container{padding:10px}.card{padding:14px}.q-map{grid-template-columns:repeat(8,1fr)}.passage{font-size:.8rem;max-height:260px}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<canvas id="confetti-canvas"></canvas>
<script>
const QUESTIONS=[
{id:"q001",num:1,type:"D-1",cat:"d",pts:2,diff:"low",paraphrased:false,
 stem:"대화가 자연스럽게 이어지도록 〈보기〉의 (A)~(D)를 순서에 맞게 배열한 것은?",

(C) M: Then go to Jeongseon Market. It opens every five days.
(D) W: Yes. I'd like to try some local food.`,
 choices:["(A)-(B)-(C)-(D)","(A)-(C)-(B)-(D)","(B)-(A)-(D)-(C)","(B)-(D)-(A)-(C)","(D)-(B)-(A)-(C)"],

{id:"q002",num:2,type:"D-5",cat:"d",pts:2,diff:"low",paraphrased:false,
 stem:"위 대화(Tourist Info)의 요지로 가장 적절한 것은?",

W: Hi, I wonder if there's a tourist map of the town.

 choices:["외국인에게 한국 전통 음식을 자세히 소개한다.","정선시장의 영업 시간 변경 사항을 안내한다.","지도를 시민에게 무료로 배포하는 방법을 설명한다.","관광 안내소의 위치를 옮기는 계획을 알린다.","관광객에게 정선시장과 곤드레밥을 안내한다."],

{id:"q003",num:3,type:"D-4",cat:"d",pts:2,diff:"low",paraphrased:false,

 passage:`W: Can I have the bill, please?

{id:"q004",num:4,type:"K-1",cat:"k",pts:3,diff:"mid",paraphrased:true,

{id:"q005",num:5,type:"D-6",cat:"d",pts:2,diff:"low",paraphrased:false,

W: __________`,

{id:"q006",num:6,type:"D-2",cat:"d",pts:2,diff:"low",paraphrased:false,

 passage:`W: Can you help me with this milk?

 choices:["if","that","whether","how","what"],

{id:"q008",num:8,type:"P-21 목적",cat:"p",pts:2,diff:"low",paraphrased:false,
 stem:"다음 글(Grand Bazaar)의 목적으로 가장 적절한 것은?",
 passage:`Turkey is a country where East meets West, so it has a long tradition of trade. It is a natural place for large markets like the Grand Bazaar. The market was built in 1455 in Istanbul. Today the Grand Bazaar is much bigger, and it is the largest covered market in the world. It has 64 streets and more than 4,000 shops under one roof. The market attracts over 250,000 visitors every day.`,

 answers:[1],explanation:"그랜드 바자르의 역사·규모·특징 소개"},
{id:"q009",num:9,type:"P-4 내용 일치",cat:"p",pts:3,diff:"mid",paraphrased:false,
 stem:"위 글(Grand Bazaar)의 내용과 일치하는 것을 모두 고르시오. [정답 2개]",
 passage:`The market was built in 1455 in Istanbul. Today the Grand Bazaar has 64 streets and more than 4,000 shops under one roof. The market attracts over 250,000 visitors every day. Ask shop owners if they carry nazar boncuğu, a traditional Turkish symbol for good luck. Also, make sure to try lokum, a traditional Turkish candy.`,
 choices:["그랜드 바자르는 1455년 이스탄불에 건설되었다.","그랜드 바자르는 현재 30개의 거리와 1,000개의 상점이 있다.","매일 약 100,000명의 방문객이 방문한다.","그랜드 바자르는 세계에서 가장 큰 야외 시장이다.","lokum은 터키의 전통 사탕이다."],
 answers:[1,5],explanation:"② 64거리·4,000상점 / ③ 250,000명 / ④ covered(실내) market"},
{id:"q010",num:10,type:"G-3 ★ 관계부사",cat:"g",pts:3,diff:"mid",paraphrased:false,
 stem:"다음 중 관계부사의 쓰임이 어법상 올바른 것을 모두 고르시오. [정답 2개]",
 passage:"",
 choices:["Turkey is a country where East meets West.","This is the building where the market is housed.","I don't know the reason because she left.","My mom told me the way how I can cook this.","He lives in the village which there is a small river."],
 answers:[1,2],explanation:"③ because→why / ④ the way how 함께 불가 / ⑤ which→where"},
{id:"q011",num:11,type:"T-1 원문 단어 조합",cat:"t",pts:4,diff:"high",paraphrased:true,
 paraphrasingNote:"오답 선지에 동의어 다수 사용(bigger→greater/larger, roof→cover/tent) — 매력 오답 (약)",
 stem:"다음 본문 빈칸에 들어갈 단어 조합을 모두 고르시오.",
 passage:`Today the Grand Bazaar is much (A)____, and it is the (B)____ covered market in the world. It has 64 streets and more than 4,000 shops under one (C)____.`,
 choices:["bigger — largest — roof","greater — largest — roof","bigger — biggest — cover","larger — largest — tent","greater — greatest — shelter"],

{id:"q012",num:12,type:"P-12 제목",cat:"p",pts:2,diff:"low",paraphrased:false,
 stem:"다음 글(Damnoen Saduak)의 제목으로 가장 적절한 것은?",
 passage:`In the past, Thai people traded goods on rivers. This was the beginning of floating markets in Thailand. With better road transportation, many floating markets disappeared. Since the late 1960s, however, some of them have come back and kept the tradition alive. Today, one of the most popular floating markets is Damnoen Saduak Floating Market. It is always crowded with tourists from all over the world.`,
 choices:["The Decline of Traditional Markets in Thailand","How Road Transportation Changed Asia","The Best Foods to Eat in Thailand","Damnoen Saduak: Thailand's Living Floating Market Tradition","A History of Pad Thai Noodles"],
 answers:[4],explanation:"태국 수상시장의 전통과 부활을 다룬 글"},
{id:"q013",num:13,type:"G-2 ★ since 의미",cat:"g",pts:2,diff:"low",paraphrased:false,
 stem:`다음 문장의 밑줄 친 since와 같은 용법으로 사용된 것은?

<u>Since</u> the late 1960s, some floating markets have come back.`,
 passage:"",
 choices:["<u>Since</u> you are tired, take a rest.","<u>Since</u> I was sick, I went to the hospital.","<u>Since</u> the war ended, peace has lasted.","<u>Since</u> she didn't study, she failed the test.","<u>Since</u> he is busy, he can't come."],
 answers:[3],explanation:"본문 since는 시간(이래로) · ①②④⑤는 이유(=because) · ③만 시간"},
{id:"q014",num:14,type:"P-4 내용 일치",cat:"p",pts:3,diff:"mid",paraphrased:false,
 stem:"위 글(Damnoen Saduak)의 내용과 일치하는 것을 모두 고르시오. [정답 2개]",
 passage:`In the past, Thai people traded goods on rivers. With better road transportation, many floating markets disappeared. Since the late 1960s, however, some of them have come back. Today, one of the most popular floating markets is Damnoen Saduak Floating Market. You can buy local foods and traditional gift items directly from boats.`,
 choices:["태국 사람들은 과거에 강에서 상품을 거래했다.","도로 교통의 발달로 모든 수상 시장이 사라졌다.","1960년대 후반 이후 일부 수상 시장이 다시 등장했다.","Damnoen Saduak은 세계에서 가장 오래된 수상 시장이다.","Damnoen Saduak에서는 보트에서 상품을 직접 살 수 없다."],
 answers:[1,3],explanation:"② 'many'(모든 X) / ④ 'most popular'(가장 오래된 X) / ⑤ 'directly from boats'"},
{id:"q015",num:15,type:"P-21 목적",cat:"p",pts:2,diff:"low",paraphrased:true,
 paraphrasingNote:"원문 'The Netherlands means low lands. As the name suggests, about a third of the country sits below sea level.' → 'The Netherlands, which means low lands, has about one third of its area lying below sea level.' (관계대명사절+분사, 중)",
 stem:"다음 글의 목적으로 가장 적절한 것은?",
 passage:`[변형 본문] The Netherlands, which means "low lands," has about one third of its area lying below sea level. Thus, the Dutch built up the land and started to grow flowers. Today, the Aalsmeer Flower Market is the largest flower market in the world.`,
 choices:["네덜란드 국토 개간의 역사를 비판한다.","전 세계 꽃 생산량의 추세를 분석한다.","전기 트럭의 환경 영향을 평가한다.","세계 최대 화훼 시장 Aalsmeer를 소개한다.","네덜란드 관광지의 가격을 비교한다."],

  return su.every((v,i)=>v===sc[i]);
}
function render(){switch(state.screen){case"start":renderStart();break;case"quiz":renderQuiz();break;case"result":renderResult();break;case"review":renderReview();break;}}

function renderStart(){
  app.innerHTML=`<div class="start-screen">
    <h1>2026 해솔중 3학년 영어 기말고사 모의시험</h1>
    <p class="sub-title">finaltermM3 Set 1 · 40문제 · 100점</p>
    <div class="info-box">
      <strong>총 ${objCount}문제</strong> | 만점 <strong>${totalPts}점</strong><br><br>
      <strong>난이도 [하]</strong> ${lowCount}문제 — 단일 정답 (라디오)<br>
      <strong>난이도 [중]</strong> ${midCount}문제 — 복수 정답, 개수 공개 (체크박스)<br>
      <strong>난이도 [상]</strong> ${highCount}문제 — 복수 정답, 개수 비공개 (체크박스)<br><br>
      <strong>✏️ Paraphrasing 적용:</strong> ${paraCount}문제 (전체 ${Math.round(paraCount/objCount*100)}%)<br>
      <strong>★ 중3 4대 문법:</strong> 분사 후치수식 · since/though · 관계부사 · if/whether<br><br>
      <strong>채점 규칙 (M3):</strong><br>
      • 95점 이상 — 🎉 EXCELLENT! 축포!<br>
      • 90~94점 — 틀린 문제만 재도전 (축포 없음)<br>
      • 90점 미만 — 전체 처음부터 재도전
    </div>
    <button class="btn btn-primary" onclick="startQuiz()" style="font-size:1.05rem;padding:14px 44px">시작하기</button>
  </div>`;
}

function startQuiz(){state.screen="quiz";state.currentQ=0;state.userAnswers={};state.score=0;state.wrongIds=[];state.startTime=Date.now();state.elapsed=0;render();}

function renderQuiz(){
  const qs=getActiveQs();const q=qs[state.currentQ];const total=qs.length;
  const answered=Object.keys(state.userAnswers).filter(k=>state.userAnswers[k]&&state.userAnswers[k].length>0).length;
  const pct=Math.round(((state.currentQ+1)/total)*100);
  const isMulti=q.diff==="mid"||q.diff==="high";
  const sel=state.userAnswers[q.id]||[];
  const diffLabel=q.diff==="low"?"하":q.diff==="mid"?"중":"상";
  const diffHint=q.diff==="mid"?` [정답 ${q.answers.length}개]`:"";

  app.innerHTML=`
  <div class="progress-text"><span>${state.currentQ+1} / ${total}</span><span>${answered}/${total} 완료</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="q-map">${qs.map((qq,i)=>{let cls="q-dot";if(i===state.currentQ) cls+=" current";else if(state.userAnswers[qq.id]&&state.userAnswers[qq.id].length>0) cls+=" answered";return`<div class="${cls}" onclick="goTo(${i})" title="${qq.num}번">${qq.num}</div>`}).join("")}</div>
  <div class="card${q.paraphrased?" paraphrased":""}">
    <div class="q-header">
      <div class="q-num">${q.num}</div>
      <span class="q-type ${q.cat}">${escapeHTML(q.type)}</span>
      <span class="q-pts">${q.pts}점</span>
      <span class="q-diff ${q.diff}">난이도 ${diffLabel}</span>
      ${q.paraphrased?`<span class="q-para-badge">✏️ Paraphrased</span>`:""}
    </div>
    <div class="stem">${escapeHTML(q.stem)}${diffHint}</div>
    ${q.passage?`<div class="passage">${q.passage}</div>`:""}
    <ul class="choices">${q.choices.map((c,i)=>{
      const num=i+1;const checked=sel.includes(num);
      return`<li class="choice${checked?" selected":""}" onclick="selectChoice(${num},${isMulti})">
        <input type="${isMulti?"checkbox":"radio"}" name="q${q.id}" ${checked?"checked":""}>
        <span>${"①②③④⑤"[i]} ${escapeHTML(c)}</span>
      </li>`}).join("")}</ul>
  </div>
  <div class="nav-row">
    <button class="btn btn-outline btn-sm" ${state.currentQ===0?"disabled":""} onclick="goTo(${state.currentQ-1})">◀ 이전</button>
    ${state.currentQ===total-1?`<button class="btn btn-success btn-sm" onclick="submitQuiz()">제출하기 ✓</button>`:`<button class="btn btn-primary btn-sm" onclick="goTo(${state.currentQ+1})">다음 ▶</button>`}
  </div>`;
}

function selectChoice(num,isMulti){
  const qs=getActiveQs();const q=qs[state.currentQ];
  let sel=state.userAnswers[q.id]||[];
  if(isMulti){if(sel.includes(num)) sel=sel.filter(n=>n!==num);else sel=[...sel,num];}
  else{sel=[num];}
  state.userAnswers[q.id]=sel;render();
}

function goTo(i){const qs=getActiveQs();if(i>=0&&i<qs.length){state.currentQ=i;render()}}

function submitQuiz(){
  const qs=getActiveQs();
  const unanswered=qs.filter(q=>!state.userAnswers[q.id]||state.userAnswers[q.id].length===0);
  if(unanswered.length>0){if(!confirm(`아직 ${unanswered.length}문제를 풀지 않았습니다. 그래도 제출하시겠습니까?`)) return;}
  let score=0;const wrong=[];
  qs.forEach(q=>{if(isCorrect(state.userAnswers[q.id],q.answers)) score+=q.pts;else wrong.push(q.id);});
  state.elapsed=Date.now()-state.startTime;
  state.score=score;state.wrongIds=wrong;state.screen="result";render();
  if(state.score>=95) launchConfetti();
}

function renderResult(){
  const qs=getActiveQs();const maxPts=qs.reduce((s,q)=>s+q.pts,0);
  const pct=Math.round((state.score/maxPts)*100);const wrongCount=state.wrongIds.length;const correctCount=qs.length-wrongCount;
  let cls,msg,btns;
  // M3 채점 규칙: 95+축포 / 90~94 틀린문제 / 90미만 전체
  if(state.score>=95){
    cls="perfect";msg=`<b>🎉 EXCELLENT!</b> ${state.score}점!<br>대단합니다, 정말 잘했어요!`;
    btns=`${wrongCount>0?`<button class="btn btn-success" onclick="retryWrong()">틀린 문제 재도전</button>`:""}<button class="btn btn-outline" onclick="showReview()">오답 복습</button><button class="btn btn-primary" onclick="resetAll()">처음부터 다시</button>`;
  }else if(state.score>=90){
    cls="great";msg=`훌륭합니다! ${pct}점 (${state.score}/${maxPts}점)<br>틀린 ${wrongCount}문제만 다시 풀어보세요.`;
    btns=`<button class="btn btn-success" onclick="retryWrong()">틀린 문제만 재도전</button><button class="btn btn-outline" onclick="showReview()">오답 복습</button><button class="btn btn-outline" onclick="resetAll()">처음부터 다시</button>`;
  }else{
    cls="retry";msg=`${pct}점 (${state.score}/${maxPts}점)<br>전체 문제를 처음부터 다시 도전해 보세요!`;
    btns=`<button class="btn btn-outline" onclick="showReview()">오답 복습</button><button class="btn btn-danger" onclick="resetAll()">전체 처음부터 재도전</button>`;
  }
  app.innerHTML=`<div class="result-screen">
    <h2 style="margin-bottom:6px">${state.attempt>1?`${state.attempt}차 `:""}채점 결과</h2>
    <div class="score-circle ${cls}"><span>${state.score}</span><small>/ ${maxPts}점</small></div>
    <div class="result-msg">${msg}</div>
    <div class="result-detail">
      <b>📋 시험:</b> finaltermM3 Set 1<br>
      <b>정답:</b> ${correctCount}문제 / <b>오답:</b> ${wrongCount}문제<br>
      <b>정답률:</b> ${pct}%<br>
      <b>⏱ 풀이 시간:</b> ${fmt(state.elapsed)}<br>
      ${wrongCount>0?`<b>틀린 문제 번호:</b> ${state.wrongIds.map(id=>QUESTIONS.find(x=>x.id===id)?.num).filter(Boolean).sort((a,b)=>a-b).join(", ")}번`:""}
    </div>
    <div class="result-btns">${btns}</div>
  </div>`;
}

function retryWrong(){state.retryMode="wrong";state.attempt++;state.screen="quiz";state.currentQ=0;state.userAnswers={};state.score=0;state.startTime=Date.now();state.elapsed=0;render();}
function resetAll(){state.retryMode=null;state.attempt=1;state.screen="start";state.userAnswers={};state.score=0;state.wrongIds=[];render();}
function showReview(){state.screen="review";render();}

function renderReview(){
  const qs=getActiveQs();
  app.innerHTML=`<div class="card">
    <h2 style="color:var(--primary);margin-bottom:14px">📖 오답 복습</h2>
    ${qs.filter(q=>state.wrongIds.includes(q.id)).map(q=>{
      const myAns=state.userAnswers[q.id]&&state.userAnswers[q.id].length>0?state.userAnswers[q.id].sort((a,b)=>a-b).map(n=>"①②③④⑤"[n-1]).join(", "):"(미응답)";
      const correctAns=q.answers.sort((a,b)=>a-b).map(n=>`${"①②③④⑤"[n-1]} ${escapeHTML(q.choices[n-1])}`).join("<br>");
      return `<div class="card review-card${q.paraphrased?" paraphrased":""}">
        <div class="q-header">
          <div class="q-num">${q.num}</div>
          <span class="q-type ${q.cat}">${escapeHTML(q.type)}</span>
          <span class="q-pts">${q.pts}점</span>
          ${q.paraphrased?`<span class="q-para-badge">✏️ Paraphrased</span>`:""}
        </div>
        <div class="stem">${escapeHTML(q.stem)}</div>
        ${q.passage?`<div class="passage">${q.passage}</div>`:""}
        <div class="my-answer"><b>[내 답안]</b> ${myAns}</div>
        <div class="model-answer"><b>[정답]</b><br>${correctAns}</div>
        <div class="explanation"><b>해설:</b> ${escapeHTML(q.explanation)}</div>
        ${q.paraphrased&&q.paraphrasingNote?`<div class="para-note"><b>✏️ Paraphrasing:</b> ${escapeHTML(q.paraphrasingNote)}</div>`:""}
      </div>`;
    }).join("")}
    <div style="text-align:center;margin-top:18px"><button class="btn btn-outline" onclick="state.screen='result';render()">결과로 돌아가기</button></div>
  </div>`;
}

function escapeHTML(s){if(s===null||s===undefined) return "";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/&lt;u&gt;/g,"<u>").replace(/&lt;\/u&gt;/g,"</u>").replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>");}

function launchConfetti(){
  const canvas=document.getElementById("confetti-canvas");const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=["#4f46e5","#7c3aed","#f59e0b","#16a34a","#db2777","#fbbf24"];
  const parts=[];for(let i=0;i<140;i++){parts.push({x:Math.random()*canvas.width,y:-20,vx:(Math.random()-0.5)*5,vy:Math.random()*4+3,size:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],angle:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.2});}
  let frame=0;function tick(){ctx.clearRect(0,0,canvas.width,canvas.height);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;p.vy+=0.05;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();});frame++;if(frame<260) requestAnimationFrame(tick);else ctx.clearRect(0,0,canvas.width,canvas.height);}tick();
}
render();
</script>
</body>
