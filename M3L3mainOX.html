<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#2e1065 0%,#4c1d95 60%,#1e1b4b 100%);min-height:100vh;min-height:-webkit-fill-available;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(80px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;touch-action:pan-y}
.wrap{max-width:520px;width:100%;background:#f8fafc;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden}
.header{background:linear-gradient(150deg,#2e1065 0%,#4c1d95 60%,#1e1b4b 100%);padding:24px 20px 18px;color:#fff;text-align:center;position:-webkit-sticky;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.header h1{font-size:1.15rem;font-weight:700;margin-bottom:3px;letter-spacing:-.02em}

.content{padding:20px 18px 40px}
.prog-bar{height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);border-radius:4px;transition:width .4s}
.q-counter{text-align:center;font-size:.82rem;color:#64748b;margin-bottom:6px;font-weight:500}
.title-box{text-align:center;margin:10px 0 14px;padding:18px 16px;background:linear-gradient(135deg,#faf5ff,#f3e8ff);border-radius:18px;border:2px solid #c4b5fd}
.title-box .ptitle{font-size:1.55rem;font-weight:800;color:#5b21b6;letter-spacing:-.02em;line-height:1.2}
.title-box .tlabel{display:inline-block;margin-top:6px;font-size:.72rem;background:#ede9fe;color:#6d28d9;padding:3px 10px;border-radius:20px;font-weight:700}
.statement{margin:14px 0;padding:16px 18px;background:#fff;border:1.5px solid #e8ecf1;border-radius:14px;font-size:1rem;color:#1e293b;line-height:1.65;font-weight:500;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.source-box{margin:10px 0 4px;padding:12px 14px;background:#f9fafb;border-left:3px solid #a78bfa;border-radius:0 10px 10px 0;font-size:.82rem;color:#4b5563;line-height:1.65;font-style:italic}
.source-label{display:block;font-size:.68rem;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-style:normal}
.ox-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.ox-btn{padding:18px 10px;border:2px solid #e5e7eb;background:#fff;border-radius:16px;font-size:1rem;font-weight:800;color:#1e293b;cursor:pointer;font-family:inherit;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;min-height:84px}
.ox-btn:active{transform:scale(.96)}
.ox-btn.o{color:#059669}
.ox-btn.x{color:#dc2626}
.ox-btn.dunno{grid-column:1 / span 2;padding:14px;font-size:.92rem;color:#64748b;font-weight:700;min-height:0}
.ox-btn.sel.o{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981}
.ox-btn.sel.x{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444}
.ox-btn.sel.dunno{background:#f1f5f9;border-color:#94a3b8}
.ox-btn.correct{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981;color:#065f46}
.ox-btn.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444;color:#7f1d1d}
.ox-btn[disabled]{cursor:default;opacity:.85}
.ox-icon{display:block;font-size:1.6rem;margin-bottom:4px}
.fb{text-align:center;padding:14px 16px;border-radius:14px;margin-top:14px;font-weight:700;font-size:.92rem;line-height:1.5}
.fb.ok{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1.5px solid #6ee7b7}
.fb.ng{background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;border:1.5px solid #fda4af}
.fb.dunno{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
.explain-box{margin-top:10px;padding:14px;background:#fff;border-radius:12px;border:1.5px solid #e8ecf1}
.ex-title{font-size:.82rem;font-weight:800;color:#6d28d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid #f1f5f9}
.ex-body{font-size:.88rem;color:#374151;line-height:1.75}
.ex-answer{display:inline-block;font-size:.95rem;font-weight:900;padding:2px 14px;border-radius:20px;margin-right:8px;vertical-align:middle}
.ex-answer.O{background:#dcfce7;color:#166534}
.ex-answer.X{background:#fee2e2;color:#991b1b}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1.5px solid #e8ecf1;gap:8px}
.nav-btn{padding:10px 16px;border:none;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation}
.nav-btn.prev,.nav-btn.home{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default}
.set-list{display:grid;gap:10px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.set-card:hover{border-color:#8b5cf6;background:#faf5ff;transform:translateY(-2px)}
.set-card.done{border-color:#8b5cf6;background:linear-gradient(135deg,#faf5ff,#f3e8ff)}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .15s ease-out}
@media(prefers-reduced-motion:reduce){.fade{animation:none}}</style>

<script>
var CONFIG={"title":"M3L3mainOX","passThreshold":100,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Stress Relief Methods","body":"Some people spend time with friends when they feel low. Others eat special foods to feel better. Still others simply sleep for a while. How do you deal with stress? Here are some stories about people who suggest different ways.\nMina (15, Daejeon)\nSometimes my friends give me stress by saying bad things about me, breaking promises, or arguing over small things. When this happens, I watch horror movies! Good horror movies are so scary that I scream a lot. I guess that screaming at the top of my lungs helps me feel better. Also, thanks to scary scenes and sound effects, I can forget about what bothers me. I've been using this method for the past several months, and it really works.\n"},{"id":2,"title":"Job Search Stress","body":"Junho (14, Yeosu)\nMy uncle graduated from college two years ago. He lives with my family, and he's been looking for a job for some time. I know that he's stressed out, but he always tries to be positive by going fishing. He never gets upset when he doesn't catch any fish. He says, \"While I fish, I'm so focused that I can leave all my worries behind. Besides, it teaches me to be patient.\" I'm sure that focusing on one thing helps us forget about something else.\n"},{"id":3,"title":"Stress Relief Cleaning","body":"Dobin (16, Seoul)\nMy sister, a second-year student in high school, has a wonderful way to stay free from stress. She feels a lot of stress from schoolwork, but my mother seems to like the situation for a good reason. It is because cleaning is my sister's number-one way to make life better! When she's so stressed that her life looks gloomy, she cleans her room. She says, \"As I clean my room, I feel like I'm also relieving stress. When my room looks tidy, my life looks brighter.\"\n"},{"id":4,"title":"Stress Relief Methods","body":"Yulia (14, Ansan)\nLet me tell you what my mother does about her stress. She feels stressed by all the things she has to do at work and at home. When she's under stress, she writes \"Me Time\" on her calendar. This means she takes some time out for herself. She reads a book, watches a movie, or talks with her friends. She says, \"It doesn't really matter what I do, as long as it's something I like. I've been writing 'Me Time' on my calendar for two months, and I feel much better.\" Which methods will work for you? Try some of these ideas yourself, and find your best way to say goodbye to stress.\n"}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"어떤 사람들은 기분이 좋지 않을 때 친구들과 시간을 보내거나, 특별한 음식을 먹거나, 잠을 자는 방식으로 스트레스를 푼다고 언급된다.","answer":"O","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":2,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"미나는 친구들이 약속을 어기거나 작은 일로 다투는 것이 스트레스의 원인이 된다고 말한다.","answer":"O","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":3,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"미나는 스트레스를 받을 때 공포 영화를 보면서 크게 우는 방법을 사용한다.","answer":"X","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null,"explanation":"지문에서 미나는 공포 영화를 보면서 '크게 소리를 지른다(scream at the top of my lungs)'고 했지, '크게 운다'고 하지 않았습니다. '소리 지르기'와 '울기'는 전혀 다른 행동이므로 statement는 지문과 일치하지 않습니다."},{"questionNumber":4,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"미나는 공포 영화의 무서운 장면과 음향 효과 덕분에 자신을 괴롭히던 일을 잊을 수 있다고 말한다.","answer":"O","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":5,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"미나는 자신의 스트레스 해소 방법을 몇 주 전부터 사용하기 시작했다고 밝히고 있다.","answer":"X","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":6,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Mina lives in Seoul and is 15 years old.","answer":"X","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":7,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to Mina, shouting loudly while watching horror movies helps her release stress.","answer":"O","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null,"explanation":"Mina는 친구들로 인해 스트레스를 받을 때 공포 영화를 보며 '있는 힘껏 소리를 지르는 것(screaming at the top of my lungs)'이 기분을 나아지게 한다고 말했다. Statement에서 '소리를 크게 지르는 것(shouting loudly)'은 이 표현과 동일한 의미이며, 그것이 스트레스 해소에 도움이 된다는 인과 관계도 지문과 일치한다. 따라서 Statement는 지문 내용과 완전히 일치한다."},{"questionNumber":8,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Mina gets stressed because her friends say unkind things and break promises, but she never argues with them.","answer":"X","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":9,"type":"insertion","typeLabel":"문장 삽입","statement":"\"Good horror movies are so scary that I scream a lot.\" → \"I guess that screaming at the top of my lungs helps me feel better.\"","anchorSentence":"Good horror movies are so scary that I scream a lot.","targetSentence":"I guess that screaming at the top of my lungs helps me feel better.","claimedPosition":"after","answer":"O","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":10,"type":"order","typeLabel":"문장 순서","statement":"\"미나가 공포 영화를 보며 소리를 지른다\" → \"미나가 자신을 괴롭히던 일을 잊게 된다\"","answer":"O","passageId":1,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":11,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"준호의 삼촌은 대학을 졸업한 지 3년이 되었다.","answer":"X","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":12,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"준호의 삼촌은 현재 준호네 가족과 함께 살고 있다.","answer":"O","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":13,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"준호의 삼촌은 스트레스를 받으면 낚시 대신 등산을 하며 긍정적인 태도를 유지하려 한다.","answer":"X","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":14,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"준호의 삼촌은 물고기를 잡지 못하면 화를 내는 편이다.","answer":"X","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":15,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"삼촌은 낚시를 통해 집중력뿐만 아니라 인내심도 기를 수 있다고 말한다.","answer":"O","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":16,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Junho's uncle has been struggling to find work since he graduated from college.","answer":"O","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":17,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Junho's uncle goes fishing because it helps him upset when he doesn't catch any fish.","answer":"X","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null,"explanation":"지문에서 Junho의 삼촌은 긍정적인 마음을 유지하기 위해(to be positive) 낚시를 한다고 나와 있습니다. Statement는 낚시가 그를 'upset하게 만든다'고 했지만, 지문에서는 오히려 'He never gets upset when he doesn't catch any fish'라고 명시되어 있습니다. 낚시의 이유와 물고기를 못 잡았을 때의 반응 모두 statement와 반대되는 내용입니다."},{"questionNumber":18,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to Junho, concentrating on one activity can help a person think about other worries.","answer":"X","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null,"explanation":"준호는 지문 마지막 문장에서 '한 가지에 집중하는 것이 다른 것을 잊는 데 도움이 된다(focusing on one thing helps us forget about something else)'고 말했다. 그러나 statement는 한 가지 활동에 집중하면 '다른 걱정들을 생각하는 데 도움이 된다(think about other worries)'고 서술하여, 지문의 '걱정을 잊게 해준다'는 의미와 정반대로 왜곡하고 있다."},{"questionNumber":19,"type":"insertion","typeLabel":"문장 삽입","statement":"\"He says patience and focus are what fishing has taught him.\" → \"Junho believes that doing one thing with full attention helps push other concerns away.\"","anchorSentence":"He says, \"While I fish, I'm so focused that I can leave all my worries behind. Besides, it teaches me to be patient.\"","targetSentence":"I'm sure that focusing on one thing helps us forget about something else.","claimedPosition":"after","answer":"O","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":20,"type":"order","typeLabel":"문장 순서","statement":"준호의 삼촌이 스트레스를 받는다는 내용 → 삼촌이 물고기를 잡지 못해도 화내지 않는다는 내용","answer":"O","passageId":2,"passageTitle":"Job Search Stress","sourceSentence":null},{"questionNumber":21,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"도빈의 언니는 고등학교 1학년 학생이다.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"도빈의 어머니는 언니가 스트레스를 받는 상황을 좋아하는 이유가 있다.","answer":"O","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":23,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"도빈의 언니에게 스트레스 해소 방법 중 청소는 두 번째로 중요한 방법이다.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":24,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"도빈의 언니는 스트레스가 너무 심해 삶이 우울하게 느껴질 때 방을 청소한다.","answer":"O","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":25,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"도빈의 언니는 방이 깔끔해 보일 때 자신의 미래가 더 밝아 보인다고 말한다.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null,"explanation":"지문에서 도빈의 언니는 '방이 깔끔해 보일 때 삶(life)이 더 밝아 보인다'고 말한다. 그러나 statement는 '미래(future)'가 더 밝아 보인다고 했으므로, '삶'을 '미래'로 바꾼 왜곡이 있다. 따라서 지문 내용과 정확히 일치하지 않아 X이다."},{"questionNumber":26,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Dobin's sister gets a lot of stress from her relationships with friends.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":27,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Dobin's mother has a positive view of her daughter's stress because it leads to cleaning her car.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null,"explanation":"지문에서 엄마가 딸의 스트레스 상황을 긍정적으로 보는 이유는 스트레스를 받으면 방 청소(cleaning her room)를 하기 때문입니다. Statement에서는 'cleaning her car(차 청소)'라고 했으나, 지문에는 차 청소에 관한 내용이 전혀 없습니다. 따라서 'car'라는 단어가 사실과 다르므로 X입니다."},{"questionNumber":28,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Dobin's sister says that cleaning her room makes her stress disappear.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null,"explanation":"지문에서 Dobin의 언니는 방을 청소하면 스트레스가 '해소되는 느낌(feel like I'm also relieving stress)'이 든다고 말하고 있습니다. 그러나 statement는 스트레스가 '사라진다(disappear)'고 표현하여 지문의 뉘앙스보다 훨씬 강하고 단정적인 의미를 담고 있습니다. 'relieving stress(스트레스를 완화하는 느낌)'와 'stress disappear(스트레스가 사라진다)'는 의미상 차이가 있으므로 X로 판정합니다."},{"questionNumber":29,"type":"insertion","typeLabel":"문장 삽입 위치","statement":"She says, 'When my room looks tidy, my life looks brighter.' → As I clean my room, I feel like I'm also relieving stress.","anchorSentence":"She says that when her room looks tidy, her life seems brighter.","targetSentence":"She feels as if she is relieving stress while cleaning her room.","claimedPosition":"after","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":30,"type":"order","typeLabel":"문장 순서","statement":"Dobin's sister cleans her room when stressed. → Dobin's mother enjoys the situation for a good reason.","answer":"X","passageId":3,"passageTitle":"Stress Relief Cleaning","sourceSentence":null},{"questionNumber":31,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Yulia의 어머니는 직장에서의 일과 집안일로 인해 스트레스를 받는다.","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":32,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Yulia는 스트레스를 받을 때 캘린더에 'Me Time'이라고 적는다.","answer":"X","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null,"explanation":"지문에는 Mina(15세, 대전)의 스트레스 해소법(공포 영화 시청)만 소개되어 있으며, 'Yulia'라는 인물은 등장하지 않는다. 따라서 Yulia가 캘린더에 'Me Time'을 적는다는 내용은 지문에서 확인할 수 없다."},{"questionNumber":33,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Yulia의 어머니는 'Me Time' 동안 자신이 좋아하는 일을 하는 것이 중요하다고 말한다.","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":34,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Yulia의 어머니는 캘린더에 'Me Time'을 적기 시작한 지 약 3개월이 되었다.","answer":"X","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":35,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Yulia의 어머니는 'Me Time'을 가진 후로 기분이 훨씬 나아졌다고 말한다.","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":36,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Yulia's mother schedules personal time by writing 'Me Time' on her calendar whenever she feels overwhelmed.","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":37,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Yulia's mother believes the type of activity is the most important factor for relieving stress.","answer":"X","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null,"explanation":"지문에는 'Yulia'라는 인물이 전혀 등장하지 않습니다. 지문에 소개된 인물은 Mina(15세, 대전)이며, 그녀는 스트레스 해소를 위해 공포 영화를 보는 방법을 소개합니다. 따라서 지문에 없는 인물과 내용을 언급한 이 statement는 지문과 일치하지 않습니다."},{"questionNumber":38,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage encourages readers to discover their own best method for dealing with stress.","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":39,"type":"insertion","typeLabel":"문장 삽입","statement":"She reads a book, watches a movie, or talks with her friends. → She says, 'It doesn't really matter what I do, as long as it's something I like.'","anchorSentence":"She reads a book, watches a movie, or talks with her friends.","targetSentence":"She says, 'It doesn't really matter what I do, as long as it's something I like.'","claimedPosition":"after","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null},{"questionNumber":40,"type":"order","typeLabel":"문장 순서","statement":"Yulia의 어머니가 캘린더에 'Me Time'을 적는 방법을 소개한다. → 독자들에게 자신만의 스트레스 해소 방법을 찾아보라고 권유한다.","answer":"O","passageId":4,"passageTitle":"Stress Relief Methods","sourceSentence":null}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
