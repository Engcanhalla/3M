<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<title>단어의 추억 · 중3 Review Test Lv28-29</title>
<style>
  :root{
    --bg-deep:#0f172a;
    --bg-card:#1e293b;
    --bg-card-hover:#253347;
    --bg-card-2:#253347;
    --accent:#f59e0b;
    --accent-light:#fbbf24;
    --accent-glow:rgba(245,158,11,0.15);
    --accent-glow-strong:rgba(245,158,11,0.30);
    --text:#f1f5f9;
    --text-on-dark:#f1f5f9;
    --text-muted:#94a3b8;
    --text-on-dark-muted:#94a3b8;
    --success:#10b981;
    --danger:#ef4444;
    --info:#3b82f6;
    --grade:#10b981;
    --grade-soft:rgba(16,185,129,.15);
    --grade-glow:rgba(16,185,129,.30);
    --grade-glow-strong:rgba(16,185,129,.50);
    --radius-sm:8px;
    --radius-md:14px;
    --radius-lg:20px;
    --radius-xl:28px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.30);
    --shadow-md:0 4px 16px rgba(0,0,0,.35);
    --shadow-lg:0 12px 40px rgba(0,0,0,.45);
    --shadow-xl:0 24px 60px rgba(0,0,0,.55);
    --transition:0.25s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;background:var(--bg-deep);color:var(--text);
    font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;overscroll-behavior:none;
  }
  /* ── Noise texture overlay ── */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;
  }
  /* ── Ambient glow blob (top-right) ── */
  body::after{
    content:'';position:fixed;top:-200px;right:-200px;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(16,185,129,0.10) 0%, transparent 70%);
    pointer-events:none;z-index:0;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}

  /* ---------- HEADER ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg, rgba(15,23,42,.96), rgba(15,23,42,.82));
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(148,163,184,.10);
    padding:12px 16px 10px;
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .grade-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--grade-soft);color:var(--grade);
    padding:6px 14px;border-radius:100px;
    font-weight:700;font-size:.78rem;
    letter-spacing:.06em;text-transform:uppercase;
    border:1px solid rgba(16,185,129,.35);
    box-shadow:0 0 0 3px rgba(16,185,129,.08);
  }
  .grade-badge .chap{color:var(--text);opacity:.85;font-weight:600;text-transform:none;letter-spacing:0;}
  .stats{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
  .stat-pill{
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(148,163,184,.08);
    padding:6px 10px;border-radius:var(--radius-sm);
    border:1px solid rgba(148,163,184,.12);
    transition:background var(--transition);
  }
  .stat-pill b{color:var(--text);font-weight:700;}
  .icon-btn{
    width:38px;height:38px;border-radius:var(--radius-sm);
    display:inline-flex;align-items:center;justify-content:center;
    background:rgba(148,163,184,.08);
    border:1px solid rgba(148,163,184,.12);
    font-size:18px;line-height:1;
    transition:all var(--transition);
  }
  .icon-btn:hover{background:rgba(148,163,184,.14);transform:translateY(-1px);}
  .icon-btn:active{transform:translateY(0) scale(.94);}
  .icon-btn.on{background:var(--grade-soft);border-color:var(--grade);box-shadow:0 0 12px var(--grade-glow);}

  .progress-wrap{margin-top:12px;}
  .dots{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:rgba(148,163,184,.15);
    transition:all var(--transition);
  }
  .dot.done{background:var(--grade);box-shadow:0 0 6px var(--grade-glow);}
  .dot.current{background:var(--accent);transform:scale(1.35);box-shadow:0 0 10px var(--accent-glow-strong);}
  .pbar{
    height:6px;border-radius:100px;
    background:rgba(148,163,184,.12);
    overflow:hidden;
    position:relative;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.2);
  }
  .pbar-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg, var(--grade), #34d399);
    box-shadow:0 0 10px var(--grade-glow-strong), inset 0 1px 0 rgba(255,255,255,.2);
    border-radius:100px;
    transition:width .45s cubic-bezier(.4,0,.2,1);
  }

  /* ---------- MAIN ---------- */
  main{
    position:relative;z-index:1;
    max-width:560px;margin:0 auto;padding:16px;
    min-height:calc(100vh - 130px);
    display:flex;flex-direction:column;
  }
  @keyframes view-in{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  main > *{animation:view-in .35s cubic-bezier(.4,0,.2,1);}

  /* ---------- HOME ---------- */
  .home{
    text-align:center;padding:36px 16px 20px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .home .badge-mini{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(16,185,129,.12);color:var(--grade);
    font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    padding:6px 16px;border-radius:100px;
    border:1px solid rgba(16,185,129,.25);
    margin-bottom:8px;
  }
  .home h1{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:2.4rem;margin:0;
    color:var(--text-on-dark);
    font-weight:800;letter-spacing:-1px;line-height:1.15;
  }
  .home h1 .accent{
    background:linear-gradient(135deg, var(--grade) 0%, #34d399 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  }
  .home .sub{color:var(--text-on-dark-muted);font-size:1rem;line-height:1.6;max-width:340px;}
  .home .lvl{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:56px;font-weight:900;color:var(--grade);
    text-shadow:0 0 30px var(--grade-glow-strong);margin:6px 0 0;
    letter-spacing:-2px;
  }
  .home-card{
    background:var(--bg-card);border:1px solid rgba(148,163,184,.10);
    border-radius:var(--radius-lg);padding:22px;width:100%;max-width:420px;
    box-shadow:var(--shadow-lg);
    margin-top:6px;
  }
  .home-card .row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid rgba(148,163,184,.10);
    font-size:.92rem;color:var(--text-on-dark-muted);
  }
  .home-card .row:last-child{border-bottom:0;}
  .home-card .row b{color:var(--grade);font-weight:700;}
  .start-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    margin-top:10px;
    background:linear-gradient(135deg, var(--grade) 0%, #059669 100%);
    color:#ffffff;font-weight:700;font-size:1.05rem;letter-spacing:.02em;
    padding:15px 40px;border-radius:var(--radius-md);
    box-shadow:0 8px 24px rgba(16,185,129,.35), inset 0 1px 0 rgba(255,255,255,.15);
    transition:all var(--transition);min-height:52px;
  }
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(16,185,129,.45), inset 0 1px 0 rgba(255,255,255,.15);}
  .start-btn:active{transform:translateY(0) scale(.98);}
  .start-btn.alt{
    background:linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
    box-shadow:0 8px 24px rgba(245,158,11,.35), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .start-btn.alt:hover{box-shadow:0 12px 32px rgba(245,158,11,.45), inset 0 1px 0 rgba(255,255,255,.15);}
  .start-btn.adv{
    background:linear-gradient(135deg, #a855f7 0%, #6d28d9 100%);
    box-shadow:0 8px 24px rgba(168,85,247,.40), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .start-btn.adv:hover{box-shadow:0 12px 32px rgba(168,85,247,.55), inset 0 1px 0 rgba(255,255,255,.18);}
  .start-btn.wrong-only{
    background:linear-gradient(135deg,#ef4444 0%,#b91c1c 100%);
    box-shadow:0 8px 24px rgba(239,68,68,.40), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .start-btn.wrong-only:hover{box-shadow:0 12px 32px rgba(239,68,68,.55), inset 0 1px 0 rgba(255,255,255,.18);}

  /* ---------- STAGE PICKER (홈) ---------- */
  .stage-picker{
    display:grid;grid-template-columns:1fr;gap:12px;width:100%;max-width:420px;margin:8px 0;
  }
  .stage-btn{
    display:grid;grid-template-columns:44px 1fr;grid-template-rows:auto auto;gap:2px 14px;
    align-items:center;text-align:left;
    padding:16px 20px;border-radius:var(--radius-lg);
    background:linear-gradient(135deg, rgba(30,41,59,.85), rgba(15,23,42,.85));
    border:1px solid rgba(148,163,184,.20);
    color:var(--text-on-dark);cursor:pointer;
    transition:all var(--transition);
    position:relative;
  }
  .stage-btn .ic{grid-row:span 2;font-size:2rem;text-align:center;}
  .stage-btn .ttl{font-size:1.10rem;font-weight:800;letter-spacing:.02em;}
  .stage-btn .desc{font-size:.82rem;color:var(--text-on-dark-muted);}
  .stage-btn:hover{transform:translateY(-2px);border-color:rgba(148,163,184,.45);box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .stage-btn.basic{border-color:rgba(16,185,129,.35);}
  .stage-btn.basic .ttl{color:var(--grade);}
  .stage-btn.basic:hover{border-color:rgba(16,185,129,.65);box-shadow:0 8px 24px rgba(16,185,129,.30);}
  .stage-btn.advanced{border-color:rgba(168,85,247,.35);}
  .stage-btn.advanced .ttl{color:#c4b5fd;}
  .stage-btn.advanced:hover:not([disabled]){border-color:rgba(168,85,247,.65);box-shadow:0 8px 24px rgba(168,85,247,.30);}
  .stage-btn[disabled]{opacity:.55;cursor:not-allowed;filter:grayscale(.4);}
  .stage-btn[disabled]:hover{transform:none;box-shadow:none;}

  /* ---------- CLOZE 입력 ---------- */
  .cloze-prompt .cloze-sentence{
    font-size:1.35rem;line-height:2.2;color:#f8fafc;font-weight:500;
    margin-top:14px;padding:14px 16px;
    background:rgba(15,23,42,.55);border-radius:var(--radius-md);
    border:1px solid rgba(148,163,184,.18);
    text-align:center;letter-spacing:.02em;
  }
  .cloze-input{
    display:inline-block;
    background:rgba(168,85,247,.10);color:#f8fafc;
    border:2px solid rgba(168,85,247,.50);border-radius:8px;
    font:inherit;font-weight:700;
    padding:2px 10px;margin:0 4px;
    outline:none;transition:all var(--transition);
    min-width:60px;text-align:center;
  }
  .cloze-input:focus{border-color:#c4b5fd;background:rgba(168,85,247,.18);box-shadow:0 0 0 4px rgba(168,85,247,.20);}
  .grammar-prompt .qkr{color:#fef3c7;}
  .grammar-hint{margin-top:10px;padding:8px 12px;background:rgba(252,211,77,.10);border:1px solid rgba(252,211,77,.28);border-radius:8px;color:#fcd34d;font-size:.92rem;line-height:1.5;}
  .cloze-input.correct{border-color:var(--grade);background:rgba(16,185,129,.15);color:#a7f3d0;}
  .cloze-input.wrong{border-color:var(--danger);background:rgba(239,68,68,.15);color:#fca5a5;}
  .input-box.only-btn{justify-content:center;}
  /* 첫글자 프리필 인풋 — 미리 채워진 첫 글자를 시각적으로 강조 */
  .prefill-input{caret-color:#fef3c7;font-family:'Courier New',ui-monospace,monospace;letter-spacing:.05em;font-weight:700;}
  .prefill-hint{color:#c4b5fd;font-size:.82rem;font-weight:500;margin-left:6px;letter-spacing:0;}
  /* ---------- 낱말박스 (자동완성 방어) ---------- */
  .word-answer{display:flex;flex-wrap:wrap;gap:12px 14px;align-items:center;margin:6px 0;}
  .word-answer.inline{display:inline-flex;gap:8px;vertical-align:middle;margin:0 4px;}
  .word-group{
    display:inline-flex;align-items:center;gap:0;
    background:rgba(11,18,32,.7);border:1.5px solid #334155;border-radius:8px;
    padding:0;transition:all .15s;overflow:hidden;flex-shrink:0;
  }
  .word-group:focus-within{border-color:#a78bfa;box-shadow:0 0 0 3px rgba(168,139,250,.22);}
  .word-group.correct{border-color:var(--grade);background:rgba(16,185,129,.10);}
  .word-group.wrong{border-color:var(--danger);background:rgba(239,68,68,.10);}
  /* 폰트: body 상속 sans-serif (이전 .input-box input과 동일한 스타일) */
  .first-letter{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;padding:0 8px;height:44px;line-height:44px;
    background:linear-gradient(180deg,#3b2966 0%,#2a1e4d 100%);
    color:#fef3c7;
    font-family:inherit;
    font-size:1.15rem;font-weight:600;letter-spacing:.5px;
    text-transform:lowercase;
    border-right:1px solid #8b5cf6;user-select:none;
  }
  .rest-input{
    border:0;background:transparent;color:var(--text);outline:none;
    font-family:inherit;
    font-size:1.15rem;font-weight:600;letter-spacing:.5px;
    padding:0 10px;height:44px;line-height:44px;width:120px;min-width:90px;
    text-transform:lowercase;
  }
  .rest-input::placeholder{color:#475569;font-weight:400;}
  .word-group.correct .rest-input{color:#a7f3d0;}
  .word-group.wrong .rest-input{color:#fca5a5;}
  .cloze-sentence .word-answer{display:inline-flex;flex-wrap:wrap;gap:6px 8px;margin:0 4px;vertical-align:middle;}
  .cloze-sentence .word-group{border-radius:6px;}
  .cloze-sentence .first-letter{height:38px;line-height:38px;font-size:1.05rem;min-width:22px;padding:0 7px;}
  .cloze-sentence .rest-input{height:38px;line-height:38px;font-size:1.05rem;width:100px;min-width:70px;padding:0 9px;}
  /* .input-box input 스타일이 .rest-input을 override 하는 문제 해결 */
  .input-box .word-answer input.rest-input{
    background:transparent;border:0;padding:0 10px;
    min-height:44px;height:44px;line-height:44px;text-align:left;
    font-family:inherit;
    font-size:1.15rem;font-weight:600;letter-spacing:.5px;
    text-transform:lowercase;
    width:120px;min-width:90px;box-shadow:none;
  }
  .input-box .word-answer input.rest-input:focus{border:0;box-shadow:none;}
  /* single-letter 그룹 */
  .word-group.single-letter{background:rgba(11,18,32,.5);}
  .word-group.single-letter input.rest-input{width:80px;min-width:60px;}
  .hint-line{margin-top:12px;padding:10px 14px;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.35);border-radius:10px;color:#c4b5fd;font-size:.95rem;line-height:1.55;text-align:center;letter-spacing:.03em;}
  .hint-line b{color:#fef3c7;font-weight:800;font-family:'Courier New',ui-monospace,monospace;font-size:1.05rem;letter-spacing:.15em;margin:0 2px;}

  /* ---------- CARD STUDY ---------- */
  .stage{position:relative;padding:14px 2px;perspective:1200px;flex:1;display:flex;flex-direction:column;}
  .word-counter{
    color:var(--text-on-dark-muted);text-align:center;font-size:.82rem;
    margin-bottom:12px;letter-spacing:.02em;
  }
  .word-counter b{color:var(--grade);font-weight:700;}

  .flipcard{
    position:relative;width:100%;min-height:400px;
    transform-style:preserve-3d;
    transition:transform .48s cubic-bezier(.2,.7,.1,1.2);
    cursor:pointer;
  }
  .flipcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--bg-card);
    border:1px solid rgba(148,163,184,.10);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-lg);
    padding:22px;
    display:flex;flex-direction:column;
    overflow:hidden;
    transition:border-color var(--transition), box-shadow var(--transition);
  }
  .face.front{
    align-items:center;justify-content:center;text-align:center;gap:14px;
    background:
      radial-gradient(circle at 50% 30%, rgba(16,185,129,.10), transparent 65%),
      var(--bg-card);
  }
  .face.front .pos-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .pos-tag{
    background:rgba(245,158,11,.14);color:var(--accent-light);
    padding:4px 10px;border-radius:100px;
    font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    border:1px solid rgba(245,158,11,.20);
  }
  .face.front .word{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:64px;font-weight:800;letter-spacing:-1.5px;
    line-height:1.05;
    color:var(--text-on-dark);
    text-shadow:0 0 32px rgba(16,185,129,.22);
    word-break:break-word;
  }
  .face.front .ph{color:var(--text-on-dark-muted);font-size:1.05rem;font-style:italic;}
  .face.front .cefr{
    position:absolute;top:16px;right:16px;
    background:var(--grade-soft);color:var(--grade);
    padding:4px 10px;border-radius:100px;font-size:.68rem;font-weight:700;
    letter-spacing:.08em;border:1px solid rgba(16,185,129,.25);
  }
  .face.front .hint{color:var(--text-on-dark-muted);font-size:.78rem;margin-top:10px;opacity:.7;letter-spacing:.02em;}
  .speak-btn{
    margin-top:6px;
    background:rgba(59,130,246,.10);color:var(--info);
    border:1px solid rgba(59,130,246,.28);
    padding:10px 18px;border-radius:var(--radius-sm);
    font-size:.88rem;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;min-height:40px;
    transition:all var(--transition);
  }
  .speak-btn:hover{background:rgba(59,130,246,.18);transform:translateY(-1px);}
  .speak-btn:active{transform:translateY(0) scale(.96);}

  .face.back{
    transform:rotateY(180deg);
    padding:18px 18px 16px;
    overflow-y:auto;
    background:linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-hover) 100%);
  }
  /* ── 뒷면 폰트 +20% · 고대비 muted 오버라이드 ── */
  .back{
    /* 뒷면 전용 강화 색 (기본 muted #94a3b8 → #cbd5e1 slate-300) */
    --back-muted:#cbd5e1;
    --back-muted-strong:#e2e8f0;
  }
  .back .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .back .top .w{font-family:'Segoe UI','Malgun Gothic',sans-serif;font-size:1.8rem;font-weight:800;color:var(--grade);letter-spacing:-.5px;}
  .back .top .ph{color:var(--back-muted-strong);font-size:.98rem;font-style:italic;}
  .back .kr{
    font-size:1.5rem;font-weight:700;line-height:1.4;
    margin:6px 0 16px;color:#ffffff;
  }
  .back .kr .sep{color:var(--back-muted);margin:0 6px;font-weight:500;opacity:.85;}
  .section{
    background:rgba(15,23,42,.62);border-radius:var(--radius-md);padding:14px 16px;
    margin-bottom:12px;border:1px solid rgba(148,163,184,.18);
  }
  .section .label{
    font-size:.80rem;color:var(--back-muted-strong);
    text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;font-weight:700;
    display:flex;align-items:center;gap:4px;
  }
  .section.sound{
    background:linear-gradient(135deg, rgba(245,158,11,.14), rgba(245,158,11,.05));
    border:1px solid rgba(245,158,11,.35);
  }
  .section.sound .label{color:var(--accent-light);}
  .section.sound .body{color:#fef3c7;font-weight:600;font-size:1.10rem;}
  .section.story{
    background:linear-gradient(135deg, rgba(59,130,246,.14), rgba(59,130,246,.05));
    border:1px solid rgba(59,130,246,.35);
  }
  .section.story .label{color:#93c5fd;}
  .section.story .body{color:#dbeafe;font-size:1.03rem;line-height:1.55;}
  /* ── 한자 풀이 (wexplain krDetail) ── */
  .section.hanja{
    background:linear-gradient(135deg, rgba(249,115,22,.14), rgba(249,115,22,.05));
    border:1px solid rgba(253,186,116,.38);
  }
  .section.hanja .label{color:#fed7aa;}
  .section.hanja .hanja-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
  .section.hanja .hanja-item{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;
    color:#fff7ed;font-size:1rem;line-height:1.55;
  }
  .section.hanja .ko-word{font-weight:800;color:#fed7aa;white-space:nowrap;}
  .section.hanja .arrow{color:#fdba74;font-weight:600;}
  .section.hanja .explain{color:#ffedd5;font-weight:500;}
  /* ── 자·타동사 예시 (wexplain usageExamples) ── */
  .section.usage{
    background:linear-gradient(135deg, rgba(20,184,166,.14), rgba(20,184,166,.05));
    border:1px solid rgba(94,234,212,.38);
  }
  .section.usage .label{color:#5eead4;}
  .section.usage .usage-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .section.usage .usage-item{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;
    color:#ecfeff;line-height:1.5;
  }
  .section.usage .usage-item .en{font-weight:600;color:#5eead4;}
  .section.usage .usage-item .ko{color:#a5f3fc;}
  .section.usage .usage-item .speak-btn{
    background:transparent;border:1px solid rgba(94,234,212,.4);color:#5eead4;
    padding:2px 6px;border-radius:6px;font-size:.85rem;cursor:pointer;
  }
  /* ── 문법 포인트 (wexplain grammarNote) ── */
  .section.grammar{
    background:linear-gradient(135deg, rgba(245,158,11,.14), rgba(245,158,11,.05));
    border:1px solid rgba(252,211,77,.38);
  }
  .section.grammar .label{color:#fcd34d;}
  .section.grammar .body{color:#fef3c7;font-weight:500;line-height:1.55;font-size:.98rem;}
  /* ── 뉘앙스 섹션 (wkorean) ── */
  .section.nuance{
    background:linear-gradient(135deg, rgba(168,85,247,.14), rgba(168,85,247,.05));
    border:1px solid rgba(168,85,247,.38);
  }
  .section.nuance .label{color:#c4b5fd;}
  .section.nuance .body.ko-simple{color:#f5f3ff;font-weight:600;font-size:1.05rem;line-height:1.55;}
  .section.nuance .when-to-use{
    color:#ddd6fe;font-size:.94rem;line-height:1.55;margin-top:8px;padding-top:8px;
    border-top:1px dashed rgba(168,85,247,.28);font-style:italic;letter-spacing:.01em;
  }
  .section .body{font-size:1.03rem;line-height:1.55;color:#f8fafc;}
  .buddy-list,.col-list{display:flex;flex-direction:column;gap:8px;}
  .buddy-item,.col-item{
    display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap;
    font-size:1.03rem;
    padding:6px 0;border-bottom:1px dashed rgba(148,163,184,.18);
  }
  .buddy-item:last-child,.col-item:last-child{border-bottom:0;}
  .buddy-item .en, .col-item .en{color:#ffffff;font-weight:700;}
  .buddy-item .ko, .col-item .ko{color:var(--back-muted-strong);font-size:.94rem;text-align:right;font-weight:500;}
  .buddy-item .why{font-size:.86rem;color:var(--back-muted);opacity:1;display:block;width:100%;margin-top:3px;font-style:italic;}
  .ex-line{font-size:1.03rem;line-height:1.55;}
  .ex-line .en{color:#f8fafc;font-style:italic;font-weight:500;}
  .ex-line .ko{color:var(--back-muted-strong);font-size:.94rem;display:block;margin-top:4px;font-weight:500;}
  /* 콜로케이션·예문 재생 버튼 */
  .speak-btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;flex:0 0 26px;
    padding:0;margin-right:8px;
    border:1px solid rgba(59,130,246,.35);
    background:rgba(59,130,246,.10);
    color:var(--info);
    font-size:.78rem;line-height:1;
    border-radius:8px;cursor:pointer;
    transition:var(--transition);
  }
  .speak-btn:hover{
    background:rgba(59,130,246,.22);
    border-color:rgba(59,130,246,.55);
    transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(59,130,246,.20);
  }
  .speak-btn:active{transform:translateY(0);}
  .col-item .en, .ex-line .en{flex:1 1 auto;min-width:0;}
  .ex-line{display:flex;flex-wrap:wrap;align-items:baseline;}

  /* Grade buttons */
  .grade-row{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;
    margin-top:14px;
  }
  .grade-btn{
    padding:15px 6px;border-radius:var(--radius-md);
    font-weight:700;font-size:.92rem;
    min-height:56px;
    border:1.5px solid transparent;
    transition:all var(--transition);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  }
  .grade-btn .ic{font-size:20px;line-height:1;}
  .grade-btn.prev{background:rgba(59,130,246,.14);color:#93c5fd;border-color:rgba(59,130,246,.35);}
  .grade-btn.home{background:rgba(245,158,11,.12);color:var(--accent-light);border-color:rgba(245,158,11,.30);}
  .grade-btn.next{background:rgba(16,185,129,.16);color:#6ee7b7;border-color:rgba(16,185,129,.40);}
  .grade-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
  .grade-btn.prev:hover{box-shadow:0 6px 16px rgba(59,130,246,.25);}
  .grade-btn.home:hover{box-shadow:0 6px 16px rgba(245,158,11,.20);}
  .grade-btn.next:hover{box-shadow:0 6px 16px rgba(16,185,129,.30);}
  .grade-btn:active{transform:translateY(0) scale(.97);}
  .grade-btn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.6);}
  .grade-btn:disabled:hover{transform:none;box-shadow:none;filter:grayscale(.6);}

  .flip-hint{
    text-align:center;color:var(--text-on-dark-muted);
    font-size:.72rem;margin-top:10px;opacity:.6;letter-spacing:.02em;
  }

  /* ---------- QUIZ ---------- */
  .quiz-stage{padding:12px 2px;flex:1;display:flex;flex-direction:column;}
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .quiz-num{
    background:var(--bg-card);padding:7px 14px;border-radius:100px;
    font-size:.82rem;font-weight:600;
    border:1px solid rgba(148,163,184,.15);
    color:var(--text-on-dark-muted);
  }
  .quiz-num b{color:var(--grade);font-weight:700;}
  .quiz-mode{
    background:rgba(245,158,11,.12);color:var(--accent-light);
    padding:6px 12px;border-radius:100px;
    font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    border:1px solid rgba(245,158,11,.22);
  }
  .quiz-card{
    background:var(--bg-card);border:1px solid rgba(148,163,184,.10);
    border-radius:var(--radius-lg);padding:24px 20px;
    box-shadow:var(--shadow-lg);
    min-height:320px;display:flex;flex-direction:column;
  }
  .quiz-prompt{
    text-align:center;margin-bottom:20px;
  }
  .quiz-prompt .label{
    font-size:.68rem;color:var(--text-on-dark-muted);
    text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;
  }
  .quiz-prompt .qword{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:2.2rem;font-weight:800;color:var(--text-on-dark);
    line-height:1.15;word-break:break-word;letter-spacing:-1px;
    text-shadow:0 0 24px rgba(16,185,129,.20);
  }
  .quiz-prompt .qkr{font-size:1.5rem;font-weight:700;color:var(--accent-light);line-height:1.3;}
  .quiz-prompt .qph{color:var(--text-on-dark-muted);font-size:.88rem;margin-top:6px;font-style:italic;}
  .quiz-prompt .lis-btn{
    margin:10px auto 0;display:flex;
    background:linear-gradient(135deg, var(--info) 0%, #2563eb 100%);
    color:#ffffff;font-weight:700;font-size:.95rem;
    padding:14px 24px;border-radius:var(--radius-md);align-items:center;gap:8px;
    box-shadow:0 6px 20px rgba(59,130,246,.35), inset 0 1px 0 rgba(255,255,255,.15);
    min-height:48px;transition:all var(--transition);
  }
  .quiz-prompt .lis-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(59,130,246,.42);}
  .quiz-prompt .lis-btn:active{transform:translateY(0) scale(.97);}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{
    background:var(--bg-card-2);
    border:1.5px solid rgba(148,163,184,.12);
    border-radius:var(--radius-md);padding:14px 16px;
    text-align:left;font-size:.98rem;font-weight:600;color:var(--text-on-dark);
    transition:all var(--transition);
    display:flex;align-items:center;gap:12px;
    min-height:52px;line-height:1.3;
  }
  .choice:hover{background:rgba(148,163,184,.10);border-color:rgba(148,163,184,.22);transform:translateY(-1px);}
  .choice .idx{
    flex-shrink:0;width:26px;height:26px;border-radius:var(--radius-sm);
    background:rgba(148,163,184,.14);color:var(--text-on-dark-muted);
    display:flex;align-items:center;justify-content:center;
    font-size:.78rem;font-weight:700;
    transition:all var(--transition);
  }
  .choice:active{transform:scale(.98);}
  .choice.correct{background:rgba(16,185,129,.16);border-color:var(--grade);color:#a7f3d0;box-shadow:0 4px 16px rgba(16,185,129,.20);}
  .choice.correct .idx{background:var(--grade);color:#0f172a;}
  .choice.wrong{background:rgba(239,68,68,.14);border-color:var(--danger);color:#fca5a5;}
  .choice.wrong .idx{background:var(--danger);color:#fff;}
  .choice.dimmed{opacity:.4;}
  body.cb-mode .choice.correct::after{content:"✓";margin-left:auto;font-size:22px;font-weight:900;}
  body.cb-mode .choice.wrong::after{content:"✕";margin-left:auto;font-size:22px;font-weight:900;}

  .input-box{
    display:flex;flex-direction:column;gap:12px;margin-top:6px;
  }
  .input-box input{
    background:var(--bg-card-2);
    border:1.5px solid rgba(148,163,184,.15);
    border-radius:var(--radius-md);padding:16px;
    color:var(--text-on-dark);font-size:1.15rem;font-weight:600;
    text-align:center;letter-spacing:.5px;
    min-height:52px;outline:none;
    transition:all var(--transition);
  }
  .input-box input:focus{border-color:var(--grade);box-shadow:0 0 0 4px rgba(16,185,129,.15);}
  .input-box input.correct{border-color:var(--grade);background:rgba(16,185,129,.10);color:#a7f3d0;}
  .input-box input.wrong{border-color:var(--danger);background:rgba(239,68,68,.10);color:#fca5a5;}
  .submit-btn{
    background:linear-gradient(135deg, var(--grade) 0%, #059669 100%);
    color:#ffffff;font-weight:700;font-size:1rem;
    padding:15px;border-radius:var(--radius-md);min-height:52px;
    box-shadow:0 6px 20px rgba(16,185,129,.30), inset 0 1px 0 rgba(255,255,255,.15);
    transition:all var(--transition);
  }
  .submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(16,185,129,.40);}
  .submit-btn:active{transform:translateY(0) scale(.98);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .feedback{
    text-align:center;margin-top:16px;
    min-height:24px;font-weight:700;font-size:.92rem;
    letter-spacing:.02em;
  }
  .feedback.ok{color:#6ee7b7;}
  .feedback.bad{color:#fca5a5;}

  /* ---------- RESULT ---------- */
  .result{text-align:center;padding:20px 4px;}
  .result h2{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:2rem;margin:10px 0 6px;font-weight:800;letter-spacing:-1px;
    background:linear-gradient(135deg, var(--accent) 0%, var(--grade) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  }
  .result .score-big{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:4rem;font-weight:900;line-height:1;
    margin:20px 0 6px;color:var(--grade);letter-spacing:-2px;
    text-shadow:0 0 40px var(--grade-glow-strong);
  }
  .result .score-pct{color:var(--text-on-dark-muted);font-size:1.1rem;font-weight:600;}
  .result .score-time{
    display:inline-flex;align-items:center;gap:6px;
    margin-top:10px;padding:8px 16px;border-radius:var(--radius-lg);
    background:rgba(15,23,42,.55);border:1px solid rgba(148,163,184,.20);
    color:#f8fafc;font-size:1.05rem;font-weight:600;letter-spacing:.02em;
  }
  .result .score-time b{color:var(--accent-light);font-weight:800;font-variant-numeric:tabular-nums;}
  /* 심화 90%+ 배곧 쵝오 배너 */
  .grand-banner{
    position:relative;margin:14px auto 4px;padding:16px 22px;max-width:520px;
    border-radius:var(--radius-lg);
    background:linear-gradient(135deg,#7c3aed 0%,#db2777 45%,#f59e0b 100%);
    box-shadow:0 12px 40px rgba(168,85,247,.45),0 0 0 1px rgba(255,255,255,.15) inset;
    text-align:center;overflow:hidden;
    animation:grandPop .8s cubic-bezier(.2,.7,.1,1.4) both, grandGlow 2s ease-in-out infinite alternate;
  }
  .grand-banner::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.35), transparent 50%),
               radial-gradient(circle at 70% 80%, rgba(255,255,255,.25), transparent 50%);
    pointer-events:none;
  }
  .grand-banner .grand-line{
    font-size:1.65rem;font-weight:900;color:#fff;letter-spacing:.02em;
    text-shadow:0 2px 12px rgba(0,0,0,.35);position:relative;
  }
  .grand-banner .grand-line b{
    background:linear-gradient(135deg,#fde68a 0%,#fbbf24 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    font-weight:900;padding:0 4px;
  }
  .grand-banner .grand-sub{
    margin-top:6px;color:rgba(255,255,255,.95);
    font-size:.98rem;font-weight:700;letter-spacing:.02em;position:relative;
  }
  @keyframes grandPop{
    0%{transform:scale(.7) rotate(-3deg);opacity:0;}
    60%{transform:scale(1.06) rotate(1deg);opacity:1;}
    100%{transform:scale(1) rotate(0);opacity:1;}
  }
  @keyframes grandGlow{
    from{box-shadow:0 12px 40px rgba(168,85,247,.45),0 0 0 1px rgba(255,255,255,.15) inset;}
    to  {box-shadow:0 20px 60px rgba(245,158,11,.65),0 0 0 1px rgba(255,255,255,.35) inset;}
  }
  /* 고등학교 심화 100% — 화면 전체 랜덤 축하 오버레이 */
  .hg-celebration{
    position:fixed;inset:0;z-index:9999;pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(15,23,42,.55) 0%, rgba(2,6,23,.90) 60%, rgba(0,0,0,.98) 100%);
    display:flex;align-items:center;justify-content:center;padding:24px;
    animation:hgFadeIn .35s ease-out both, hgFadeOut .8s ease-in 5.2s forwards;
  }
  .hg-celebration::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at 20% 30%, rgba(251,191,36,.30), transparent 20%),
      radial-gradient(circle at 80% 25%, rgba(236,72,153,.28), transparent 22%),
      radial-gradient(circle at 30% 75%, rgba(59,130,246,.28), transparent 24%),
      radial-gradient(circle at 75% 80%, rgba(16,185,129,.28), transparent 22%);
    animation:hgSwirl 6s ease-in-out infinite alternate;
    pointer-events:none;
  }
  .hg-halo{
    position:absolute;inset:0;pointer-events:none;
    background:conic-gradient(from 0deg,#fbbf24,#ef4444,#a855f7,#3b82f6,#10b981,#fbbf24);
    mix-blend-mode:screen;opacity:.28;
    animation:hgRotate 12s linear infinite;
  }
  .hg-msg{
    position:relative;font-family:inherit;
    font-size:clamp(28px, 6vw, 68px);font-weight:900;line-height:1.25;text-align:center;
    padding:32px 40px;max-width:92vw;letter-spacing:-.01em;
    background:linear-gradient(90deg,#fbbf24,#ef4444,#ec4899,#a855f7,#3b82f6,#10b981,#fbbf24);
    background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 24px rgba(251,191,36,.75)) drop-shadow(0 0 40px rgba(236,72,153,.45));
    animation:hgRainbow 3.5s linear infinite, hgPop 1.6s cubic-bezier(.2,.7,.1,1.4) both, hgFloat 4s ease-in-out infinite alternate 1.6s;
  }
  .hg-sparkle{
    position:absolute;pointer-events:none;font-size:clamp(24px,3vw,36px);
    animation:hgSparkle 1.8s ease-in-out infinite;
  }
  @keyframes hgFadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes hgFadeOut{to{opacity:0;visibility:hidden;}}
  @keyframes hgRainbow{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
  @keyframes hgPop{
    0%{transform:scale(.15) rotate(-25deg);opacity:0;}
    35%{transform:scale(1.28) rotate(6deg);opacity:1;}
    55%{transform:scale(.94) rotate(-3deg);}
    75%{transform:scale(1.08) rotate(1.5deg);}
    100%{transform:scale(1) rotate(0);opacity:1;}
  }
  @keyframes hgFloat{
    from{transform:translateY(-6px) scale(1);}
    to{transform:translateY(6px) scale(1.02);}
  }
  @keyframes hgSwirl{
    0%{transform:scale(1) rotate(0);}
    100%{transform:scale(1.15) rotate(8deg);}
  }
  @keyframes hgRotate{from{transform:rotate(0);}to{transform:rotate(360deg);}}
  @keyframes hgSparkle{
    0%,100%{opacity:0;transform:scale(.4) rotate(0deg);}
    50%{opacity:1;transform:scale(1.2) rotate(180deg);}
  }
  .result-stats{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
    margin:22px 0;
  }
  .result-stat{
    background:var(--bg-card);padding:16px 12px;border-radius:var(--radius-md);
    border:1px solid rgba(148,163,184,.10);
    box-shadow:var(--shadow-md);
    transition:transform var(--transition);
  }
  .result-stat:hover{transform:translateY(-2px);}
  .result-stat .l{font-size:.68rem;color:var(--text-on-dark-muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600;}
  .result-stat .v{font-family:'Segoe UI','Malgun Gothic',sans-serif;font-size:1.4rem;font-weight:800;color:var(--text-on-dark);margin-top:6px;}
  .result-stat .v.grade-c{color:var(--grade);}
  .result-stat .v.acc-c{color:var(--accent-light);}
  .badges-earned{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 20px;
  }
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--bg-card);padding:8px 14px;border-radius:100px;
    font-size:.82rem;font-weight:700;
    border:1px solid var(--accent);color:var(--accent-light);
    box-shadow:0 0 16px rgba(245,158,11,.22), 0 4px 12px rgba(0,0,0,.3);
    animation:badge-pop .5s cubic-bezier(.2,.7,.1,1.4) backwards;
  }
  .badge .ic{font-size:1.1rem;}
  @keyframes badge-pop{from{transform:scale(.4) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

  /* ---------- ANIMATIONS ---------- */
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(6px);}
  }
  @keyframes bounce-correct{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
  }
  .shake{animation:shake .22s ease;}
  .bounce-correct{animation:bounce-correct .32s ease;}

  /* ---------- CANVAS (particles) ---------- */
  #fxCanvas{
    position:fixed;inset:0;pointer-events:none;z-index:50;
  }

  /* ---------- TOAST ---------- */
  .toast-wrap{
    position:fixed;top:88px;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    pointer-events:none;z-index:40;
  }
  .toast{
    background:rgba(15,23,42,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    color:var(--accent-light);
    padding:10px 18px;border-radius:100px;font-weight:700;font-size:.86rem;
    letter-spacing:.02em;
    border:1px solid rgba(245,158,11,.35);
    box-shadow:0 8px 24px rgba(0,0,0,.4), 0 0 20px rgba(245,158,11,.15);
    animation:toast-in .3s cubic-bezier(.4,0,.2,1), toast-out .45s cubic-bezier(.4,0,.2,1) 1.4s forwards;
  }
  .toast.streak{color:var(--accent-light);}
  .toast.big{font-size:1.05rem;padding:14px 24px;border-color:rgba(16,185,129,.4);color:#a7f3d0;box-shadow:0 12px 32px rgba(0,0,0,.5), 0 0 24px rgba(16,185,129,.2);}
  @keyframes toast-in{from{transform:translateY(-14px) scale(.9);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
  @keyframes toast-out{to{transform:translateY(-14px) scale(.9);opacity:0;}}

    {"id":"u08266","w":"caravan","pos":["noun"],"ph":"","cefr":"A2","kr":["여행자 무리, 대상"],"ex":[{"en":"A long caravan of merchants slowly crossed the sandy desert together.","ko":"긴 상인 대열이 모래사막을 함께 천천히 건넜다."}],"mnemonic":{"soundHint":"캐러밴","story":"'캐러밴'은 사막을 건너는 여행자 무리, 대상을 뜻하는 외래어예요.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"convoy","ko":"호송대","reason":"함께 이동하는 무리라는 점에서 유사"},{"w":"nomad","ko":"유목민","reason":"이동하며 사는 사람들이라는 시나리오 연결"}],"collocBest":[{"en":"a caravan of camels","ko":"낙타 대상"},{"en":"join the caravan","ko":"대상에 합류하다"}]},"nuance":{"koSimple":"낙타 여러 마리가 사막을 줄지어 가는 모습","whenToUse":"사막·여행자·상인 무리 묘사"},"krDetail":[{"ko":"여행자 무리, 대상(隊商)","explain":"낙타에 짐을 싣고 사막을 함께 건너는 상인 무리처럼, 안전을 위해 함께 이동하는 대규모 여행자 집단을 뜻해요. 오늘날에는 이동식 주택(트레일러)을 가리키기도 해요."}],"usageExamples":[{"en":"The long caravan crossed the wide desert for weeks.","ko":"긴 대상 행렬은 몇 주 동안 넓은 사막을 건넜다."},{"en":"A caravan of traders arrived at the ancient city.","ko":"상인들의 대상 행렬이 그 고대 도시에 도착했다."}],"grammarNote":"caravan은 셀 수 있는 명사예요. 'a caravan of + 복수명사' 구조를 자주 쓰며, 이때 동사는 caravan(단수)에 맞춰요. 학생들이 'caravans of camels are' 처럼 caravan을 복수로 쓰는 실수를 자주 해요.","grammarQuiz":[{"sentence":"A large _____ _____ merchants slowly _____ across the hot desert.","ko":"큰 상인 대상이 뜨거운 사막을 천천히 건너갔다.","answer":["caravan","of","moved"],"hint":"대상(caravan) + of + 복수명사, 단수 동사"}]},
    {"id":"u08381","w":"newbie","pos":["noun"],"ph":"","cefr":"A2","kr":["신출내기"],"ex":[{"en":"As a newbie in the coding club, I asked lots of basic questions.","ko":"코딩 동아리 신입이라 나는 기본적인 질문을 잔뜩 했어."}],"mnemonic":{"soundHint":"뉴비","story":"게임에서 흔히 쓰는 '뉴비'는 신출내기, 초보를 뜻하는 외래어예요.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"beginner","ko":"초보자","reason":"새로 시작한 사람이라는 동의어"},{"w":"expert","ko":"전문가","reason":"반의어"}],"collocBest":[{"en":"a total newbie","ko":"완전 초보"},{"en":"newbie mistake","ko":"초보자 실수"}]},"nuance":{"koSimple":"막 들어와 서툴게 두리번거리는 신참","whenToUse":"동아리·게임 초보자"},"krDetail":[{"ko":"신출내기, 초보자, 새내기","explain":"어떤 일이나 그룹에 새로 들어와 아직 경험이 없는 사람을 뜻해요. 캐주얼한 표현으로 게임·직장·커뮤니티에서 자주 써요."}],"usageExamples":[{"en":"Senior members warmly welcomed the newbie to the club.","ko":"선배 회원들은 신입을 동아리에 따뜻하게 환영했다."},{"en":"As a newbie, I asked many questions on my first day.","ko":"신출내기로서 나는 첫날에 많은 질문을 했다."}],"grammarNote":"newbie는 셀 수 있는 명사이고 구어체 표현이에요. 정식 문서에서는 beginner, novice가 더 적절해요. '~의 신출내기'는 'a newbie at/to + 명사'예요. 학생들이 newbie를 형용사로 쓰는 실수를 조심하세요.","grammarQuiz":[{"sentence":"As a complete _____ _____ programming, I found the basic Python lessons very challenging.","ko":"완전한 프로그래밍 초보자로서, 나는 기본 파이썬 수업이 매우 어렵다고 느꼈다.","answer":["newbie","to"],"hint":"a newbie + at/to + 분야"}]},
    {"id":"u08286","w":"compulsive","pos":["adj"],"ph":"","cefr":"A2","kr":["강박의"],"ex":[{"en":"My brother has a compulsive habit of checking his phone every two minutes.","ko":"우리 형은 2분마다 폰을 확인하는 강박적인 습관이 있어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"obsessive","ko":"집착하는","reason":"강박적이라는 유사 의미"},{"w":"addictive","ko":"중독성의","reason":"억제 못 함이라는 시나리오 연결"}],"collocBest":[{"en":"compulsive behavior","ko":"강박 행동"},{"en":"compulsive liar","ko":"상습적인 거짓말쟁이"}]},"nuance":{"koSimple":"계속 확인 안 하면 못 견디는 마음","whenToUse":"강박적 습관·행동 묘사"},"krDetail":[{"ko":"강박의, 강박관념에 사로잡힌","explain":"어떤 행동이나 생각을 하지 않고는 견딜 수 없을 정도로 반복하게 만드는 심리 상태를 나타내요. 도박, 손 씻기 등 조절하기 힘든 습관을 묘사할 때 자주 써요."}],"usageExamples":[{"en":"His compulsive habit annoyed everyone in the office.","ko":"그의 강박적인 습관은 사무실의 모두를 짜증나게 했다."},{"en":"She has a compulsive need to check her phone constantly.","ko":"그녀는 계속 휴대폰을 확인하려는 강박적인 욕구가 있다."}],"grammarNote":"compulsive는 형용사로 명사 앞에 놓이는 한정용법이 흔해요(compulsive behavior). 사람에게 쓸 때는 'a compulsive + 명사(liar, gambler)' 형태를 자주 써요. 학생들이 부사 'compulsively'와 혼동해 위치를 헷갈리는 실수가 잦아요.","grammarQuiz":[{"sentence":"His _____ _____ _____ every night made his family very worried about him.","ko":"매일 밤 그의 강박적인 도박은 그의 가족을 그에 대해 매우 걱정하게 만들었다.","answer":["compulsive","gambling","habit"],"hint":"형용사 + 동명사/명사 + 명사"}]},
    {"id":"u08346","w":"fountain","pos":["noun"],"ph":"","cefr":"A2","kr":["분수"],"ex":[{"en":"We took cute selfies in front of the huge fountain at the park.","ko":"우리는 공원의 커다란 분수 앞에서 귀여운 셀카를 찍었어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"spring","ko":"샘","reason":"물이 솟는 곳이라는 유사어"},{"w":"geyser","ko":"간헐천","reason":"물이 솟구쳐 오르는 시나리오"}],"collocBest":[{"en":"a water fountain","ko":"분수"},{"en":"fountain of youth","ko":"젊음의 샘"}]},"nuance":{"koSimple":"공원 광장에서 물줄기 쏘아 올리는 것","whenToUse":"공원·광장 분수"},"krDetail":[{"ko":"분수, 샘, 원천","explain":"물이 위로 뿜어져 나오는 인공 구조물이나 땅에서 솟는 자연 샘을 뜻해요. 비유적으로 '지식의 원천'처럼 무언가가 흘러나오는 근원을 나타내기도 해요."}],"usageExamples":[{"en":"The children threw coins into the beautiful fountain.","ko":"아이들은 아름다운 분수에 동전을 던졌다."},{"en":"A tall fountain stands in the middle of the plaza.","ko":"높은 분수 하나가 광장 한가운데 서 있다."}],"grammarNote":"fountain은 셀 수 있는 명사예요. 비유적으로 '~의 원천'을 표현할 때 'a fountain of + 명사'를 자주 써요. 학생들이 fountain과 fountain pen(만년필)을 혼동하기도 해요.","grammarQuiz":[{"sentence":"My grandmother _____ a true _____ _____ wisdom for our whole extended family.","ko":"우리 할머니는 우리 대가족 전체에게 진정한 지혜의 원천이시다.","answer":["is","fountain","of"],"hint":"be동사 + a fountain of + 명사"}]},
    {"id":"u08436","w":"rubbish","pos":["noun"],"ph":"","cefr":"A2","kr":["쓰레기"],"ex":[{"en":"Please throw all this rubbish into the big green bin outside the gate.","ko":"이 쓰레기를 전부 정문 밖 큰 초록 통에 버려 줘."}],"mnemonic":{"soundHint":"러비시","story":"'러비시(rubbish)'는 영국식 표현으로 쓰레기통을 러비시 빈(rubbish bin)이라 부른다.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"trash","ko":"쓰레기","reason":"미국식 동의어"},{"w":"garbage","ko":"쓰레기","reason":"일상 쓰레기를 뜻하는 동의어"}],"collocBest":[{"en":"throw away rubbish","ko":"쓰레기를 버리다"},{"en":"rubbish bin","ko":"쓰레기통"}]},"nuance":{"koSimple":"버리는 잡동사니 쓰레기","whenToUse":"영국식으로 쓰레기·헛소리 말할 때"},"krDetail":[{"ko":"쓰레기, 폐기물; 헛소리, 형편없는 것","explain":"영국식 영어에서 '쓰레기'를 뜻하는 대표 단어예요. 미국식 garbage/trash와 같은 뜻으로, 실제 물리적인 쓰레기뿐 아니라 '말도 안 되는 소리, 형편없는 영화·책' 같은 비유적 의미로도 자주 쓰입니다."}],"usageExamples":[{"en":"The strong wind blew rubbish all over the school playground.","ko":"강한 바람이 학교 운동장 전체에 쓰레기를 흩날렸다."},{"en":"Piles of rubbish were left near the school gate this morning.","ko":"오늘 아침 교문 근처에 쓰레기 더미가 남겨져 있었다."}],"grammarNote":"rubbish는 불가산명사라서 a rubbish, rubbishes로 쓸 수 없어요. 수를 세려면 a piece of rubbish, some rubbish처럼 표현합니다. '말도 안 된다'는 That's rubbish! 또는 talk rubbish 구조로 씁니다.","grammarQuiz":[{"sentence":"You should not throw _____ _____ the beautiful river near our small village.","ko":"너는 우리 작은 마을 근처의 아름다운 강에 쓰레기를 버리면 안 된다.","answer":["rubbish","into"],"hint":"명사 + 전치사 into"},{"sentence":"Stop _____ _____ ; your ideas are actually much better than you think.","ko":"헛소리 그만해, 네 아이디어는 사실 네가 생각하는 것보다 훨씬 좋아.","answer":["talking","rubbish"],"hint":"동명사 + 명사"}]},
    {"id":"u08406","w":"priceless","pos":["adj"],"ph":"","cefr":"A2","kr":["대단히 소중한"],"ex":[{"en":"The old photo of my grandmother is absolutely priceless to our whole family.","ko":"할머니의 오래된 사진은 우리 가족 모두에게 정말 값진 보물이야."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"invaluable","ko":"매우 귀중한","reason":"값을 매길 수 없다는 동의어"},{"w":"worthless","ko":"가치 없는","reason":"반의어"}],"collocBest":[{"en":"priceless treasure","ko":"값을 매길 수 없는 보물"},{"en":"priceless memories","ko":"소중한 추억"}]},"nuance":{"koSimple":"돈으로 살 수 없을 만큼 소중한","whenToUse":"소중한 추억·보물"},"krDetail":[{"ko":"대단히 소중한, 값을 매길 수 없는","explain":"너무나 귀해서 가격으로 매길 수 없을 정도로 소중하다는 뜻이에요. worthless(가치 없는)와 헷갈리기 쉬우니 주의하세요. -less가 붙었지만 반대로 '가격을 매길 수 없을 만큼 귀함'을 뜻해요."}],"usageExamples":[{"en":"The museum displays a priceless painting from the 1600s.","ko":"그 박물관은 1600년대의 대단히 소중한 그림을 전시한다."},{"en":"Grandma's old letters are priceless to our family.","ko":"할머니의 오래된 편지들은 우리 가족에게 대단히 소중하다."}],"grammarNote":"priceless는 형용사예요. 접미사 -less는 보통 '~없는(부족)'이지만 priceless는 '가격을 매길 수 없을 만큼 귀함'이라는 예외적 의미예요. 학생들이 worthless(가치 없는)와 혼동해 정반대로 해석하는 실수가 매우 잦아요.","grammarQuiz":[{"sentence":"The old ring my grandmother gave me _____ _____ _____ than any expensive diamond.","ko":"우리 할머니가 내게 주신 오래된 반지는 어떤 비싼 다이아몬드보다도 더 소중하다.","answer":["is","more","priceless"],"hint":"be동사 + 비교급(more + 형용사) + than"}]},
    {"id":"u08481","w":"tin","pos":["noun"],"ph":"","cefr":"A2","kr":["양철, 주석"],"ex":[{"en":"Grandma keeps homemade cookies inside an old tin box on the top shelf.","ko":"할머니는 맨 위 선반의 낡은 양철 상자 안에 손수 만든 쿠키를 보관하셔."}],"mnemonic":{"soundHint":"틴","story":"'틴(tin)'은 통조림 캔의 재료. 팅~ 소리가 나는 얇은 양철 캔을 떠올리자.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"can","ko":"캔, 깡통","reason":"양철로 만든 대표 사물(콜로)"},{"w":"metal","ko":"금속","reason":"주석이 속하는 상위 개념"}],"collocBest":[{"en":"tin can","ko":"양철 캔"},{"en":"tin roof","ko":"양철 지붕"}]},"nuance":{"koSimple":"은빛 반짝이는 얇은 양철 판","whenToUse":"양철 캔·주석 재료 말할 때"},"krDetail":[{"ko":"주석(금속); 양철, 깡통","explain":"무르고 잘 녹슬지 않는 은백색 금속 '주석'을 뜻하는 명사예요. 얇은 주석이나 강철판을 부르는 '양철', 그리고 그 양철로 만든 '깡통(영국식 표현)'의 의미로도 자주 씁니다."}],"usageExamples":[{"en":"The factory uses tin to make cans for many food products.","ko":"그 공장은 많은 식품용 캔을 만들기 위해 주석을 사용한다."},{"en":"An old tin box was found under the desk in my classroom.","ko":"우리 교실 책상 밑에서 낡은 양철 상자가 발견되었다."}],"grammarNote":"tin은 금속을 뜻할 때는 불가산명사예요. '깡통'을 뜻할 때는 셀 수 있어 a tin, two tins로 씁니다. 미국식 영어에서는 깡통을 can이라고 하는 편이 자연스럽고, tin은 영국식 표현에 가깝습니다.","grammarQuiz":[{"sentence":"She opened _____ _____ of tomato soup for her hungry younger brother.","ko":"그녀는 배고픈 남동생을 위해 토마토 수프 한 통을 열었다.","answer":["a","tin"],"hint":"관사 + 명사"},{"sentence":"Tin _____ _____ soft metal that is often mixed with copper for coins.","ko":"주석은 동전을 위해 종종 구리와 섞이는 부드러운 금속이다.","answer":["is","a"],"hint":"be동사 + 관사"}]},
    {"id":"u08451","w":"simultaneously","pos":["adv"],"ph":"","cefr":"A2","kr":["동시에"],"ex":[{"en":"The twins simultaneously shouted the same answer during the quiz show yesterday.","ko":"어제 퀴즈쇼에서 쌍둥이가 동시에 같은 답을 외쳤어."}],"mnemonic":{"soundHint":null,"story":"simul(같은)+taneously → '시뮬레이션(simulation)'도 동시 상황을 재현한다. 두 일이 동시에 진행됨.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"at the same time","ko":"동시에","reason":"같은 뜻의 표현"},{"w":"concurrently","ko":"동시에","reason":"격식체 동의 부사"}],"collocBest":[{"en":"happen simultaneously","ko":"동시에 일어나다"},{"en":"occur simultaneously","ko":"동시에 발생하다"}]},"nuance":{"koSimple":"딱 같은 순간에 함께","whenToUse":"두 일이 같은 시각에 일어날 때"},"krDetail":[{"ko":"동시에, 같은 시각에","explain":"두 가지 이상의 일이 정확히 같은 시각에 일어남을 나타내는 부사예요. at the same time과 같은 뜻이며, 학술·공식 문장에서 더 자주 쓰이는 좀 더 격식 있는 표현입니다."}],"usageExamples":[{"en":"The twins raised their hands simultaneously to answer the teacher's question.","ko":"쌍둥이는 선생님의 질문에 답하려고 동시에 손을 들었다."},{"en":"Two alarms went off simultaneously in the science lab this morning.","ko":"오늘 아침 과학실에서 두 개의 경보가 동시에 울렸다."}],"grammarNote":"simultaneously는 부사예요. 형용사형은 simultaneous(동시의)이고 뒤에 명사를 수식합니다. simultaneously with + 명사 형태로 '~와 동시에'라고 쓸 수 있고, 문장 맨 앞이나 동사 뒤에 자유롭게 위치할 수 있습니다.","grammarQuiz":[{"sentence":"The two young singers began _____ _____ sing the same beautiful song together.","ko":"그 두 젊은 가수는 같은 아름다운 노래를 동시에 함께 부르기 시작했다.","answer":["simultaneously","to"],"hint":"부사 + to부정사"},{"sentence":"The event was broadcast _____ _____ ten countries around the world.","ko":"그 행사는 전 세계 열 개 나라에서 동시에 방송되었다.","answer":["simultaneously","in"],"hint":"부사 + 전치사 in"}]},
    {"id":"u08376","w":"moan","pos":["noun","verb"],"ph":"","cefr":"A2","kr":["신음","신음하다"],"ex":[{"en":"The injured player let out a low moan as the trainer helped him up.","ko":"부상 당한 선수가 트레이너의 부축을 받으며 낮은 신음을 냈어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"groan","ko":"신음하다","reason":"고통스러운 소리라는 동의어"},{"w":"sigh","ko":"한숨 쉬다","reason":"낮은 소리를 낸다는 유사어"}],"collocBest":[{"en":"let out a moan","ko":"신음 소리를 내다"},{"en":"moan in pain","ko":"고통에 신음하다"}]},"nuance":{"koSimple":"아파서 '으으…' 낮게 새어 나오는 소리","whenToUse":"아픔·괴로움 표현"},"krDetail":[{"ko":"신음(소리)","explain":"고통·슬픔·불만을 참지 못하고 낮게 내는 소리를 명사로 표현할 때 써요."},{"ko":"신음하다, 불평하다","explain":"아프거나 힘들 때 낮고 긴 소리를 내는 것을 뜻해요. 실제 고통뿐 아니라 불만·짜증을 표현할 때도 써요."}],"usageExamples":[{"en":"The strong wind moaned the trees all night long.","ko":"강한 바람이 밤새도록 나무들을 신음하게 만들었다."},{"en":"The patient moaned quietly after the long surgery.","ko":"그 환자는 긴 수술 후에 조용히 신음했다."}],"grammarNote":"moan은 명사·동사 둘 다예요. '~때문에 신음하다'는 'moan with/in + 감정(pain, pleasure)'을 써요. 명사로 '신음을 하다'는 'give/let out a moan'이에요. 학생들이 groan과 뜻이 비슷해 자주 헷갈려요.","grammarQuiz":[{"sentence":"The injured player _____ _____ _____ pain after falling hard on the soccer field.","ko":"부상당한 선수는 축구장에 심하게 넘어진 후 고통으로 신음했다.","answer":["moaned","in","great"],"hint":"moan + in/with + 감정 명사"}]},
    {"id":"u08456","w":"spacious","pos":["adj"],"ph":"","cefr":"A2","kr":["넓은"],"ex":[{"en":"Their new apartment has a spacious living room with huge sunny windows.","ko":"그들의 새 아파트에는 커다랗고 햇볕 잘 드는 창이 있는 넓은 거실이 있어."}],"mnemonic":{"soundHint":null,"story":"space(공간)+ious(가득한) → 공간이 넉넉한, 즉 넓은.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"roomy","ko":"공간이 넓은","reason":"실내 공간이 넓다는 뜻의 동의어"},{"w":"cramped","ko":"비좁은","reason":"넓다 vs 좁다의 반의어"}],"collocBest":[{"en":"spacious room","ko":"넓은 방"},{"en":"spacious living room","ko":"넓은 거실"}]},"nuance":{"koSimple":"팔 벌려도 남는 넓은 공간","whenToUse":"방·집이 넓고 시원하다고 할 때"},"krDetail":[{"ko":"넓은, 공간이 넉넉한","explain":"방·건물·차량 등의 내부 공간이 여유롭게 넓은 것을 표현하는 형용사예요. big/large가 크기 자체에 초점이 있다면, spacious는 '움직일 만한 여유 공간이 있다'는 쾌적함을 강조합니다."}],"usageExamples":[{"en":"The new library has a spacious reading room for group study.","ko":"새 도서관에는 그룹 학습을 위한 넓은 열람실이 있다."},{"en":"Our classroom feels spacious after we moved the old desks out.","ko":"낡은 책상을 밖으로 옮긴 뒤 우리 교실이 넓게 느껴진다."}],"grammarNote":"spacious는 주로 '실내 공간'에 사용해요. 야외의 넓은 벌판은 wide나 open, vast를 쓰는 편이 자연스럽습니다. 명사형은 space(공간), 유의어로는 roomy, capacious가 있으니 함께 정리해 두세요.","grammarQuiz":[{"sentence":"Their new apartment is very bright, clean, _____ _____ spacious.","ko":"그들의 새 아파트는 매우 밝고, 깨끗하고, 넓다.","answer":["and","very"],"hint":"접속사 and + 부사"},{"sentence":"We stayed in _____ spacious _____ with a beautiful view of the sea.","ko":"우리는 바다의 아름다운 경치가 보이는 넓은 방에 머물렀다.","answer":["a","room"],"hint":"관사 + 명사"}]},
    {"id":"u08401","w":"prehistoric","pos":["adj"],"ph":"","cefr":"A2","kr":["선사 시대의"],"ex":[{"en":"Our class visited a museum full of tools from prehistoric times last week.","ko":"우리 반은 지난주에 선사 시대 도구가 가득한 박물관을 방문했어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"ancient","ko":"고대의","reason":"아주 옛날이라는 유사 의미"},{"w":"dinosaur","ko":"공룡","reason":"선사 시대 대표 존재 시나리오"}],"collocBest":[{"en":"prehistoric times","ko":"선사 시대"},{"en":"prehistoric animals","ko":"선사 시대 동물"}]},"nuance":{"koSimple":"글자 생기기 전, 동굴에 살던 옛날","whenToUse":"공룡·석기 시대 이야기"},"krDetail":[{"ko":"선사 시대의, 아주 오래된","explain":"문자로 된 역사 기록이 없는 아주 옛날 시대(선사 시대)를 뜻해요. 공룡·원시인·동굴 벽화 같은 주제와 함께 자주 나와요. 비유적으로 '너무 낡은'을 뜻하기도 해요."}],"usageExamples":[{"en":"Scientists discovered prehistoric bones in the deep cave.","ko":"과학자들은 깊은 동굴에서 선사시대의 뼈를 발견했다."},{"en":"These prehistoric paintings are over 15,000 years old.","ko":"이 선사시대 그림들은 15,000년이 넘었다."}],"grammarNote":"prehistoric은 형용사예요. 접두사 pre-(이전)와 historic(역사의)이 결합된 파생어예요. 명사형은 prehistory예요. 학생들이 historic(역사적인)과 historical(역사에 관한)을 구분 못 하는 실수가 자주 뒤따라요.","grammarQuiz":[{"sentence":"Scientists have discovered many _____ _____ _____ in the caves of southern France.","ko":"과학자들은 프랑스 남부의 동굴에서 많은 선사 시대 벽화를 발견했다.","answer":["prehistoric","wall","paintings"],"hint":"형용사 + 복합명사 (paintings 복수)"}]},
    {"id":"u08416","w":"rectangular","pos":["adj"],"ph":"","cefr":"A2","kr":["직사각형의"],"ex":[{"en":"The art teacher asked us to draw a large rectangular shape on the paper.","ko":"미술 선생님은 종이에 큰 직사각형 모양을 그리라고 하셨어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"oblong","ko":"직사각형의","reason":"길쭉한 사각형이라는 동의어"},{"w":"square","ko":"정사각형의","reason":"네 각이 직각인 도형이라는 유사어"}],"collocBest":[{"en":"rectangular shape","ko":"직사각형 모양"},{"en":"rectangular box","ko":"직사각형 상자"}]},"nuance":{"koSimple":"긴 변과 짧은 변이 있는 네모","whenToUse":"모양·상자·탁자 묘사"},"krDetail":[{"ko":"직사각형의, 직사각형 모양의","explain":"네 각이 모두 직각이고 마주 보는 두 쌍의 변 길이가 서로 같은 도형(직사각형) 모양을 나타내는 형용사예요."}],"usageExamples":[{"en":"The carpenter cut the wood into a rectangular shape.","ko":"목수는 나무를 직사각형 모양으로 잘랐다."},{"en":"Our new classroom has a large rectangular window.","ko":"우리 새 교실에는 커다란 직사각형 창문이 있다."}],"grammarNote":"rectangular는 형용사, 명사형은 rectangle(직사각형)이에요. 학생들이 형용사와 명사를 혼동해서 'a rectangular'를 명사처럼 쓰는 실수가 자주 있어요. 정확한 구조는 'a rectangular + 명사' 또는 'a rectangle(명사)'이에요.","grammarQuiz":[{"sentence":"The architect designed a large _____ _____ _____ big glass windows on all sides.","ko":"그 건축가는 사방에 큰 유리창이 있는 큰 직사각형 방을 설계했다.","answer":["rectangular","room","with"],"hint":"형용사(rectangular) + 명사(room) + with"}]},
    {"id":"u08331","w":"embarrassed","pos":["adj"],"ph":"","cefr":"A2","kr":["당황한"],"ex":[{"en":"I felt so embarrassed when I called my teacher \"Mom\" in class.","ko":"수업 중에 선생님을 '엄마'라고 불러서 정말 당황했어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"ashamed","ko":"부끄러운","reason":"부끄러움을 뜻하는 유사어"},{"w":"awkward","ko":"어색한","reason":"당황스러운 상황 시나리오"}],"collocBest":[{"en":"feel embarrassed","ko":"당황스럽다"},{"en":"embarrassed smile","ko":"당황한 미소"}]},"nuance":{"koSimple":"얼굴이 빨개져서 쥐구멍 찾는 그림","whenToUse":"실수·창피한 상황"},"krDetail":[{"ko":"당황한, 창피한, 쑥스러운","explain":"실수하거나 남 앞에서 부끄러운 상황이 되어 얼굴이 붉어질 정도로 어색한 감정을 뜻해요. 사람의 감정을 나타내는 형용사예요."}],"usageExamples":[{"en":"His silly mistake embarrassed the whole team on stage.","ko":"그의 어리석은 실수는 무대 위 팀 전체를 당황시켰다."},{"en":"I felt embarrassed when I forgot my speech.","ko":"나는 연설을 잊어버렸을 때 당황스러웠다."}],"grammarNote":"embarrassed는 감정을 느끼는 사람에게, embarrassing은 창피함을 주는 대상에 써요. 학생들이 'The situation was embarrassed'처럼 헷갈리게 쓰는 실수가 잦아요. 전치사는 by/at/about과 함께 써요.","grammarQuiz":[{"sentence":"Tom _____ _____ _____ his loud singing during the quiet library study time.","ko":"톰은 조용한 도서관 공부 시간 동안 자신의 큰 노래 소리에 당황했다.","answer":["was","embarrassed","about"],"hint":"be동사 + embarrassed + about/by/at"}]},
    {"id":"u08411","w":"purple","pos":["noun","adj"],"ph":"","cefr":"A2","kr":["자주색","자주색의"],"ex":[{"en":"She wore a bright purple hoodie with matching sneakers to the concert.","ko":"그녀는 콘서트에 어울리는 운동화와 밝은 자주색 후드를 입고 갔어."}],"mnemonic":{"soundHint":"퍼플","story":"'퍼플'은 자주색을 뜻하는 외래어로 로열 컬러로도 유명해요.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"violet","ko":"보라색","reason":"비슷한 색상 계열"},{"w":"lavender","ko":"연보라색","reason":"보라 계열의 유사 색상"}],"collocBest":[{"en":"purple color","ko":"자주색"},{"en":"deep purple","ko":"짙은 자주색"}]},"nuance":{"koSimple":"파랑과 빨강이 섞인 진한 보라색","whenToUse":"색깔·꽃·옷 묘사"},"krDetail":[{"ko":"자주색, 보라색","explain":"빨강과 파랑이 섞인 색을 뜻하는 명사형이에요. 왕족·귀족을 상징하는 색으로도 유명해요."},{"ko":"자주색의, 보라색의","explain":"무언가가 자주색·보라색을 띠는 것을 나타내는 형용사예요."}],"usageExamples":[{"en":"My sister painted her new bedroom walls a soft purple.","ko":"언니는 새 침실 벽을 부드러운 자주색으로 칠했다."},{"en":"The purple flowers looked beautiful in the morning light.","ko":"자주색 꽃들은 아침 햇살 속에서 아름다워 보였다."}],"grammarNote":"purple은 색을 나타내는 명사이자 형용사예요. 색깔은 셀 수 없는 명사로 쓸 때 관사가 없어요(I like purple). 특정 사물의 색깔을 말할 때는 형용사로 명사 앞에 놓아요. 학생들이 'the color purple'처럼 정관사를 쓰는 예외적 표현도 알아두세요.","grammarQuiz":[{"sentence":"The little girl _____ _____ _____ boots to school on rainy days last week.","ko":"그 어린 소녀는 지난주에 비 오는 날마다 학교에 그녀의 자주색 부츠를 신고 갔다.","answer":["wore","her","purple"],"hint":"동사 과거형 + 소유격 + purple(형용사) + 명사"}]},
    {"id":"u08466","w":"stink","pos":["verb"],"ph":"","cefr":"A2","kr":["역겹다, 악취가 나다"],"ex":[{"en":"The old sneakers in my locker really stink after the long soccer practice.","ko":"긴 축구 연습 뒤 사물함 속 낡은 운동화에서 정말 악취가 나."}],"mnemonic":{"soundHint":"스팅크","story":"'스팅크(stink)'는 벌레 스팅(sting)처럼 코를 쿡 찌르는 악취.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"smell","ko":"냄새가 나다","reason":"냄새 관련 동의어"},{"w":"stench","ko":"악취","reason":"명사형 관련어(콜로케이션)"}],"collocBest":[{"en":"stink of garbage","ko":"쓰레기 악취가 나다"},{"en":"really stink","ko":"정말 악취가 나다"}]},"nuance":{"koSimple":"코 막힐 만큼 지독한 냄새","whenToUse":"땀·쓰레기 악취 말할 때"},"krDetail":[{"ko":"악취가 나다; (일 등이) 형편없다, 역겹다","explain":"썩은 음식·양말·쓰레기처럼 몹시 불쾌한 냄새가 나는 것을 뜻하는 자동사예요. 비유적으로 '어떤 일이 형편없다, 상황이 나쁘다'는 의미로도 자주 쓰입니다."}],"usageExamples":[{"en":"The old cheese in the fridge really stinks up the whole kitchen.","ko":"냉장고 안의 오래된 치즈가 부엌 전체를 정말 악취로 채운다."},{"en":"The garbage bin behind the cafeteria stinks after a hot afternoon.","ko":"더운 오후가 지나면 급식실 뒤 쓰레기통에서 악취가 난다."}],"grammarNote":"stink는 자동사예요. 변화형은 stink-stank/stunk-stunk로 불규칙 활용합니다. '~한 냄새가 나다'는 stink of + 명사, '~에게 형편없다'는 stink to somebody 형태를 씁니다.","grammarQuiz":[{"sentence":"The old milk in the fridge really _____ _____ rotten cheese today.","ko":"냉장고 안의 오래된 우유가 오늘 정말 상한 치즈 냄새가 난다.","answer":["stinks","of"],"hint":"동사 3인칭 + 전치사 of"},{"sentence":"This whole situation _____ , _____ nobody is telling us the real truth.","ko":"이 상황 전체가 형편없다, 왜냐하면 아무도 우리에게 진짜 진실을 말해주지 않기 때문이다.","answer":["stinks","because"],"hint":"동사 + 접속사"}]},
    {"id":"u08351","w":"handcuff","pos":["noun"],"ph":"","cefr":"A2","kr":["수갑"],"ex":[{"en":"The police officer quickly put handcuffs on the suspect at the scene.","ko":"경찰관은 현장에서 용의자에게 재빨리 수갑을 채웠어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"arrest","ko":"체포하다","reason":"체포 시 수갑을 채우는 시나리오"},{"w":"shackle","ko":"족쇄","reason":"구속 도구라는 유사 개념"}],"collocBest":[{"en":"put on handcuffs","ko":"수갑을 채우다"},{"en":"in handcuffs","ko":"수갑을 찬 채로"}]},"nuance":{"koSimple":"경찰이 손목에 채우는 쇠 고리","whenToUse":"경찰·체포 장면"},"krDetail":[{"ko":"수갑","explain":"경찰이 범인의 손목에 채우는 금속 도구예요. 두 개의 고리가 짧은 사슬로 연결되어 있어 두 손을 함께 묶어요."}],"usageExamples":[{"en":"The officer placed the handcuffs on the suspect quickly.","ko":"경찰관은 용의자에게 재빨리 수갑을 채웠다."},{"en":"The handcuffs were too tight on his thin wrists.","ko":"그 수갑은 그의 가는 손목에 너무 꽉 조여 있었다."}],"grammarNote":"handcuff는 보통 두 개가 한 쌍이라 복수형 handcuffs로 자주 써요. '~에게 수갑을 채우다'는 'put handcuffs on + 사람' 또는 동사로 'handcuff + 사람'을 써요. 학생들이 단수형만 써서 어색한 문장을 만드는 실수가 잦아요.","grammarQuiz":[{"sentence":"The officers quickly _____ _____ _____ the suspect's wrists behind his back.","ko":"경찰관들은 용의자의 손목에 그의 등 뒤로 재빨리 수갑을 채웠다.","answer":["put","handcuffs","on"],"hint":"put + handcuffs(복수) + on + 사람"}]},
    {"id":"u08271","w":"choke","pos":["verb"],"ph":"","cefr":"A2","kr":["질식시키다"],"ex":[{"en":"I almost started to choke on a piece of dry bread at lunch.","ko":"점심 때 마른 빵 조각에 거의 질식할 뻔했어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"suffocate","ko":"질식시키다","reason":"숨을 못 쉬게 한다는 동의어"},{"w":"strangle","ko":"목 졸라 죽이다","reason":"목을 조인다는 시나리오 연결"}],"collocBest":[{"en":"choke on food","ko":"음식이 목에 걸리다"},{"en":"choke to death","ko":"질식사하다"}]},"nuance":{"koSimple":"목에 뭔가 걸려 캑캑거리는 그림","whenToUse":"음식·연기로 숨 막힐 때"},"krDetail":[{"ko":"질식시키다, (목이) 막히다","explain":"목구멍이 막혀 숨을 못 쉬게 하거나 스스로 숨이 막히는 상황을 나타내요. 음식이 목에 걸리거나 연기 때문에 숨쉬기 힘들 때 써요."}],"usageExamples":[{"en":"The thick smoke almost choked the firefighter inside.","ko":"짙은 연기는 안에 있던 소방관을 거의 질식시킬 뻔했다."},{"en":"She choked on a small piece of candy at lunch.","ko":"그녀는 점심 때 작은 사탕 조각에 목이 막혔다."}],"grammarNote":"choke는 타동사(누구를 질식시키다)와 자동사(스스로 목이 막히다) 둘 다 돼요. 자동사로 쓸 때 '~에 목이 막히다'는 'choke on + 명사'로 표현해요. 학생들이 'choke by'로 잘못 쓰는 경우가 많아요.","grammarQuiz":[{"sentence":"The little boy started _____ _____ a small fish bone during dinner last night.","ko":"그 어린 소년은 어젯밤 저녁 식사 중에 작은 생선 가시에 목이 막히기 시작했다.","answer":["to","choke","on"],"hint":"start to-V + choke on + 원인"}]},
    {"id":"u08296","w":"cozy","pos":["adj"],"ph":"","cefr":"A2","kr":["아늑한"],"ex":[{"en":"We spent the rainy afternoon in a cozy little cafe near school.","ko":"우리는 비 오는 오후를 학교 근처 아늑한 작은 카페에서 보냈어."}],"mnemonic":{"soundHint":"코지","story":"'코지 카페'처럼 아늑하고 편안한 공간을 표현하는 외래어예요.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"comfortable","ko":"편안한","reason":"편안함을 뜻하는 유사어"},{"w":"snug","ko":"포근한","reason":"아늑함이라는 동의어"}],"collocBest":[{"en":"a cozy room","ko":"아늑한 방"},{"en":"feel cozy","ko":"아늑함을 느끼다"}]},"nuance":{"koSimple":"이불 속 폭 감싸인 따뜻한 느낌","whenToUse":"따뜻하고 편안한 공간 묘사"},"krDetail":[{"ko":"아늑한, 포근한","explain":"작지만 따뜻하고 편안한 느낌을 주는 공간이나 분위기를 나타내요. 카페, 방, 담요 등을 묘사할 때 자주 써요."}],"usageExamples":[{"en":"The warm blanket made the small room feel cozy.","ko":"따뜻한 담요는 작은 방을 아늑하게 느껴지게 했다."},{"en":"The cafe was cozy on the cold winter afternoon.","ko":"그 카페는 추운 겨울 오후에 아늑했다."}],"grammarNote":"cozy는 형용사예요. 원급-비교급-최상급은 cozy-cozier-coziest처럼 y를 i로 바꿔요. 학생들이 'more cozy'로 잘못 쓰는 실수가 잦아요. 영국식은 cosy로 철자가 달라요.","grammarQuiz":[{"sentence":"This café is _____ _____ than the one we visited near the school yesterday.","ko":"이 카페는 우리가 어제 학교 근처에서 방문한 곳보다 더 아늑하다.","answer":["much","cozier"],"hint":"비교급 강조 much + 비교급"}]},
    {"id":"u08371","w":"malnutrition","pos":["noun"],"ph":"","cefr":"A2","kr":["영양실조"],"ex":[{"en":"Many children in poor regions still suffer from serious malnutrition today.","ko":"가난한 지역의 많은 아이들이 오늘날에도 심각한 영양실조로 고통받아."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"starvation","ko":"굶주림","reason":"영양 부족이라는 시나리오 연결"},{"w":"deficiency","ko":"결핍","reason":"부족 상태를 뜻하는 유사어"}],"collocBest":[{"en":"suffer from malnutrition","ko":"영양실조를 겪다"},{"en":"childhood malnutrition","ko":"아동 영양실조"}]},"nuance":{"koSimple":"먹을 게 없어 뼈만 남은 아이 그림","whenToUse":"기아·건강 문제 말할 때"},"krDetail":[{"ko":"영양실조, 영양 부족","explain":"몸에 필요한 영양소가 부족하거나 균형이 맞지 않아 생기는 건강 문제를 뜻해요. 개발도상국의 심각한 문제로 자주 언급돼요."}],"usageExamples":[{"en":"War often causes serious malnutrition among young children.","ko":"전쟁은 종종 어린이들 사이에 심각한 영양실조를 일으킨다."},{"en":"Malnutrition remains a big problem in many poor regions.","ko":"영양실조는 많은 가난한 지역에서 여전히 큰 문제이다."}],"grammarNote":"malnutrition은 셀 수 없는 명사예요. 관사 'a'를 붙이지 않아요. '~을 겪다'는 'suffer from malnutrition'을 관용적으로 써요. 학생들이 'suffer malnutrition' 처럼 전치사를 빼는 실수가 잦아요.","grammarQuiz":[{"sentence":"Millions of children _____ _____ _____ malnutrition in many developing countries around the world.","ko":"전 세계의 많은 개발도상국에서 수백만 명의 어린이들이 영양실조를 겪고 있다.","answer":["are","suffering","from"],"hint":"be + V-ing + from (진행형 + 전치사)"}]},

    {"id":"u08366","w":"janitor","pos":["noun"],"ph":"","cefr":"A2","kr":["문지기, 관리인"],"ex":[{"en":"The school janitor kindly helped us move the heavy desks after class.","ko":"학교 관리인 아저씨가 수업 후에 무거운 책상 옮기는 걸 친절히 도와주셨어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"caretaker","ko":"관리인","reason":"건물 관리인이라는 동의어"},{"w":"custodian","ko":"관리인, 수위","reason":"건물을 관리하는 사람이라는 동의어"}],"collocBest":[{"en":"school janitor","ko":"학교 관리인"},{"en":"janitor's closet","ko":"관리인 창고"}]},"nuance":{"koSimple":"학교 빗자루 든 관리 아저씨","whenToUse":"건물·학교 청소 관리인"},"krDetail":[{"ko":"문지기, 관리인, (건물의) 청소 관리인","explain":"건물이나 학교의 청소·유지보수를 담당하는 관리인을 뜻해요. 원래는 '문지기'라는 뜻에서 시작되어 오늘날 건물 관리자로 확장됐어요."}],"usageExamples":[{"en":"The kind janitor greets every student in the hallway.","ko":"친절한 관리인은 복도에서 모든 학생에게 인사한다."},{"en":"Our school janitor keeps the building spotlessly clean.","ko":"우리 학교 관리인은 건물을 티끌 하나 없이 깨끗하게 유지한다."}],"grammarNote":"janitor는 셀 수 있는 명사예요. 영국식으로는 caretaker를 더 자주 써요. 학생들이 janitor를 성 중립적인 직업 이름으로 알아두면 좋아요. '~에게 요청하다'는 'ask the janitor to + 원형'이 자주 쓰여요.","grammarQuiz":[{"sentence":"The kind old _____ always _____ the school's long hallways very carefully every night.","ko":"그 친절한 나이 든 관리인은 매일 밤 학교의 긴 복도를 항상 매우 조심스럽게 청소한다.","answer":["janitor","cleans"],"hint":"형용사들 + 명사(janitor) + 3인칭 단수 동사"}]},
    {"id":"u08356","w":"housewarming","pos":["noun"],"ph":"","cefr":"A2","kr":["집들이"],"ex":[{"en":"My cousin invited us over for a fun housewarming party this weekend.","ko":"사촌이 이번 주말에 즐거운 집들이 파티에 우리를 초대했어."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"celebration","ko":"축하 행사","reason":"새 집을 축하하는 행사라는 유사 개념"},{"w":"moving","ko":"이사","reason":"이사 후 집들이 시나리오"}],"collocBest":[{"en":"housewarming party","ko":"집들이 파티"},{"en":"housewarming gift","ko":"집들이 선물"}]},"nuance":{"koSimple":"새집으로 이사한 뒤 친구 부르는 파티","whenToUse":"새집 파티·집들이 선물"},"krDetail":[{"ko":"집들이, 집들이 파티","explain":"새 집으로 이사한 것을 축하하며 친구·가족을 초대해 여는 파티를 뜻해요. 원래는 새 집을 '따뜻하게 데운다'는 의미에서 왔어요."}],"usageExamples":[{"en":"My aunt hosted a lovely housewarming last weekend.","ko":"우리 이모는 지난 주말에 멋진 집들이를 열었다."},{"en":"We brought a small plant to the housewarming party.","ko":"우리는 집들이 파티에 작은 화분을 가져갔다."}],"grammarNote":"housewarming은 셀 수 있는 명사이자 명사 앞에서 형용사처럼 쓰여요(a housewarming party/gift). 학생들이 'house warming'처럼 띄어 쓰는 실수가 많아요. 정식 표기는 한 단어 housewarming이에요.","grammarQuiz":[{"sentence":"They invited all their new neighbors _____ their exciting _____ _____ next Sunday.","ko":"그들은 다음 주 일요일에 있을 신나는 집들이 파티에 새 이웃들을 모두 초대했다.","answer":["to","housewarming","party"],"hint":"invite + to + 명사 (형용사적 housewarming + 명사)"}]},
    {"id":"u08471","w":"suitor","pos":["noun"],"ph":"","cefr":"A2","kr":["소송인, 구혼자"],"ex":[{"en":"In the old novel, a rich suitor asked the young lady to marry him.","ko":"그 고전 소설에서 부유한 구혼자가 젊은 아가씨에게 청혼했어."}],"mnemonic":{"soundHint":null,"story":"suit(정장·소송)+or(사람) → 정장 입고 청혼하는 사람, 또는 소송을 거는 사람.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"admirer","ko":"구애자","reason":"구혼자와 유사한 의미"},{"w":"plaintiff","ko":"원고, 소송인","reason":"소송인이라는 뜻과 연결"}],"collocBest":[{"en":"rejected suitor","ko":"거절당한 구혼자"},{"en":"wealthy suitor","ko":"부유한 구혼자"}]},"nuance":{"koSimple":"청혼하러 온 남자","whenToUse":"옛 소설·법정에서 구혼자 말할 때"},"krDetail":[{"ko":"소송인(원고); 구혼자, 청혼자","explain":"법률 용어로는 '법정에 소송을 제기한 사람(원고)'을 뜻하고, 문학·오래된 표현에서는 '여자에게 결혼을 청하는 남자, 구혼자'를 뜻하는 명사예요. 오늘날 회화에서는 잘 쓰이지 않고 소설·시험 지문에서 주로 만납니다."}],"usageExamples":[{"en":"The princess politely refused every suitor who visited her family's castle.","ko":"공주는 그녀의 가족 성을 방문한 모든 구혼자를 정중히 거절했다."},{"en":"A hopeful suitor waited quietly outside her house all afternoon long.","ko":"희망에 찬 한 구혼자가 오후 내내 그녀의 집 밖에서 조용히 기다렸다."}],"grammarNote":"suitor는 셀 수 있는 명사예요. '~의 구혼자'는 a suitor of/for + 명사 구조를 씁니다. 동사 sue(고소하다)와 형태가 비슷하지만 뜻이 다르니 헷갈리지 마세요. 유사한 옛말로 wooer(구혼자)도 있습니다.","grammarQuiz":[{"sentence":"The lawyer represented the _____ _____ the very complicated legal case.","ko":"그 변호사는 매우 복잡한 법률 사건에서 원고를 대리했다.","answer":["suitor","in"],"hint":"명사 + 전치사 in"},{"sentence":"Many _____ came to ask _____ princess to marry them.","ko":"많은 구혼자들이 그 공주에게 결혼해 달라고 청혼하러 왔다.","answer":["suitors","the"],"hint":"복수명사 + 관사"}]},
    {"id":"u08426","w":"retarded","pos":["adj"],"ph":"","cefr":"A2","kr":["발달이 뒤진"],"ex":[{"en":"The old software felt slow and retarded compared to the newest version.","ko":"그 오래된 소프트웨어는 최신 버전에 비해 느리고 뒤처져 보였어."}],"mnemonic":{"soundHint":null,"story":"'retard(리타드)'는 음악에서 '점점 느리게'라는 뜻. 발달이 리타드처럼 느려진 상태가 retarded.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"delayed","ko":"지연된","reason":"발달·진행이 늦춰졌다는 점에서 동의어"},{"w":"advanced","ko":"발달한","reason":"발달이 앞선 vs 뒤진 반의 관계"}],"collocBest":[{"en":"mentally retarded","ko":"정신 발달이 뒤진"},{"en":"retarded growth","ko":"지체된 성장"}]},"nuance":{"koSimple":"다른 것보다 느리게 자란·발달한","whenToUse":"성장·발달이 뒤처졌다고 말할 때"},"krDetail":[{"ko":"발달이 뒤진, (지능·정신) 지체된","explain":"지능·정신 발달이 또래 평균보다 늦은 상태를 나타내는 형용사예요. 오늘날에는 모욕적 표현으로 여겨져 실제 대화에서는 잘 쓰지 않고, 시험 지문에서만 만나는 단어라고 생각하면 돼요."}],"usageExamples":[{"en":"The teacher never called any student retarded in her class.","ko":"그 선생님은 반에서 어떤 학생도 발달이 뒤졌다고 부른 적이 없다."},{"en":"His growth seemed slightly retarded due to the long illness.","ko":"긴 병으로 그의 성장이 약간 뒤진 것 같았다."}],"grammarNote":"retarded를 사람에게 형용사로 쓰면 심한 모욕이 될 수 있어요. 시험에서는 '발달·성장이 늦어진'이라는 중립적 의미로만 해석하고, 회화에서는 delayed, slow-developing 같은 표현을 대신 쓰는 편이 안전합니다.","grammarQuiz":[{"sentence":"The cold weather _____ _____ growth of the young plants in the garden.","ko":"추운 날씨가 정원에 있는 어린 식물들의 성장을 지체시켰다.","answer":["retarded","the"],"hint":"동사 과거형 + 관사"},{"sentence":"Doctors said the boy was slightly _____ _____ his speech development.","ko":"의사들은 그 소년이 말하기 발달이 약간 뒤져 있다고 말했다.","answer":["retarded","in"],"hint":"형용사 + 전치사 in"}]}

/* ============================================================
   AUDIO (Web Audio API 합성, 즉석 톤 생성)
   ============================================================ */
let ac = null;
function getAC(){
  if(!ac){
    try{ ac = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ ac = null; }
  }
  // resume on user gesture
  if(ac && ac.state === "suspended"){ try{ ac.resume(); }catch(e){} }
  return ac;
}
function tone({type="sine", freq=440, dur=.15, vol=.18, atk=.005, dec=.05, slide=null, t0=0}){
  const a = getAC(); if(!a || !state.sfxOn) return;
  const t = a.currentTime + t0;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if(slide){ o.frequency.exponentialRampToValueAtTime(Math.max(slide,1), t+dur); }
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t+dur+.02);
}
function noise({dur=.04, vol=.12, t0=0, hp=null}){
  const a = getAC(); if(!a || !state.sfxOn) return;
  const t = a.currentTime + t0;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate*dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * (1-i/data.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const g = a.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  let node = src;
  if(hp){
    const f = a.createBiquadFilter(); f.type="highpass"; f.frequency.value=hp;
    node.connect(f); f.connect(g);
  } else {
    node.connect(g);
  }
  g.connect(a.destination);
  src.start(t); src.stop(t+dur);
}

const fx = {
  canvas:null, ctx:null, parts:[], running:false,
  init(){
    this.canvas = document.getElementById("fxCanvas");
    this.ctx = this.canvas.getContext("2d");
    this.resize();
    window.addEventListener("resize", ()=>this.resize());
  },
  resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    this.canvas.width = window.innerWidth*dpr;
    this.canvas.height = window.innerHeight*dpr;
    this.canvas.style.width = window.innerWidth+"px";
    this.canvas.style.height = window.innerHeight+"px";
    this.ctx.setTransform(dpr,0,0,dpr,0,0);
  },
  spawn(kind, opts={}){
    const W = window.innerWidth, H = window.innerHeight;
    const cx = opts.cx ?? W/2, cy = opts.cy ?? H/2;
    if(kind === "sparkle-small"){
      for(let i=0;i<16;i++){
        this.parts.push({
          x:cx, y:cy, vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6-1,
          g:.04, life:60, age:0, size:3+Math.random()*2,
          color: ["#fbbf24","#10b981","#22d3ee"][i%3], shape:"star"
        });
      }
    } else if(kind === "reel-spin-small"){
      for(let i=0;i<28;i++){
        this.parts.push({
          x:cx+(Math.random()-.5)*40, y:cy+(Math.random()-.5)*30,
          vx:(Math.random()-.5)*9, vy:-3-Math.random()*4,
          g:.18, life:80, age:0, size:6,
          color: ["#fbbf24","#fde68a","#fde047"][i%3], shape:"coin"
        });
      }
    } else if(kind === "jackpot-flash" || kind === "jackpot-full"){
      const n = kind === "jackpot-full" ? 90 : 60;
      for(let i=0;i<n;i++){
        this.parts.push({
          x:cx+(Math.random()-.5)*60, y:H+20+Math.random()*40,
          vx:(Math.random()-.5)*5, vy:-9-Math.random()*8,
          g:.28, life:110, age:0, size:6+Math.random()*4,
          color: ["#fbbf24","#fde68a","#10b981","#f59e0b","#22d3ee"][i%5], shape:"coin"
        });
      }
    } else if(kind === "rainbow-burst"){
      const colors = ["#f43f5e","#fbbf24","#10b981","#22d3ee","#a78bfa","#fde047","#fb7185"];
      for(let i=0;i<80;i++){
        const ang = Math.random()*Math.PI*2, sp = 4+Math.random()*8;
        this.parts.push({
          x:cx, y:cy, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp-2,
          g:.18, life:100, age:0, size:5+Math.random()*4,
          color: colors[i%colors.length], shape:"circle"
        });
      }
      const ov = document.createElement("div");
      ov.className = "rainbow-overlay";
      document.body.appendChild(ov);
      setTimeout(()=>ov.remove(), 1500);
    } else if(kind === "fireworks-grand"){
      for(let b=0;b<3;b++){
        setTimeout(()=>{
          const x = W*(.2+Math.random()*.6), y = H*(.2+Math.random()*.3);
          const colors = ["#fbbf24","#10b981","#22d3ee","#f43f5e"];
          for(let i=0;i<40;i++){
            const ang = Math.random()*Math.PI*2, sp = 3+Math.random()*5;
            this.parts.push({
              x, y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
              g:.10, life:80, age:0, size:4+Math.random()*3,
              color: colors[i%colors.length], shape:"circle"
            });
          }
          SFX.fireworks();
        }, b*450);
      }
    }
    if(!this.running) this.loop();
  },
  loop(){
    this.running = true;
    const tick = ()=>{
      const W = window.innerWidth, H = window.innerHeight;
      this.ctx.clearRect(0,0,W,H);
      this.parts = this.parts.filter(p => p.age < p.life);
      for(const p of this.parts){
        p.vy += p.g;
        p.x += p.vx; p.y += p.vy;
        p.age++;
        const alpha = Math.max(0, 1 - p.age/p.life);
        this.ctx.globalAlpha = alpha;
        this.ctx.fillStyle = p.color;
        if(p.shape === "coin"){
          this.ctx.beginPath();
          this.ctx.ellipse(p.x, p.y, p.size, p.size*0.6, p.age*.2, 0, Math.PI*2);
          this.ctx.fill();
          this.ctx.strokeStyle = "rgba(255,255,255,.5)";
          this.ctx.lineWidth = 1;
          this.ctx.stroke();
        } else if(p.shape === "star"){
          drawStar(this.ctx, p.x, p.y, 5, p.size*1.5, p.size*.7);
          this.ctx.fill();
        } else {
          this.ctx.beginPath();
          this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          this.ctx.fill();
        }
      }
      this.ctx.globalAlpha = 1;
      if(this.parts.length > 0) requestAnimationFrame(tick);
      else this.running = false;
    };
    requestAnimationFrame(tick);
  }
};
function drawStar(ctx, cx, cy, spikes, outer, inner){
  ctx.beginPath();
  let rot = Math.PI/2*3, x=cx, y=cy, step = Math.PI/spikes;
  ctx.moveTo(cx, cy-outer);
  for(let i=0;i<spikes;i++){
    x = cx+Math.cos(rot)*outer; y = cy+Math.sin(rot)*outer; ctx.lineTo(x,y); rot += step;
    x = cx+Math.cos(rot)*inner; y = cy+Math.sin(rot)*inner; ctx.lineTo(x,y); rot += step;
  }
  ctx.lineTo(cx, cy-outer);
  ctx.closePath();
}
