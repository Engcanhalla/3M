<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<title>단어의 추억 · 중3 Lv.29</title>
<style>
  :root{
    --bg-deep:#0f172a;
    --bg-card:#1e293b;
    --bg-card-hover:#253347;
    --bg-card-2:#253347;
    --accent:#f59e0b;
    --accent-light:#fbbf24;
    --accent-glow:rgba(245,158,11,0.15);
    --accent-glow-strong:rgba(245,158,11,0.30);
    --text:#f1f5f9;
    --text-on-dark:#f1f5f9;
    --text-muted:#94a3b8;
    --text-on-dark-muted:#94a3b8;
    --success:#10b981;
    --danger:#ef4444;
    --info:#3b82f6;
    --grade:#10b981;
    --grade-soft:rgba(16,185,129,.15);
    --grade-glow:rgba(16,185,129,.30);
    --grade-glow-strong:rgba(16,185,129,.50);
    --radius-sm:8px;
    --radius-md:14px;
    --radius-lg:20px;
    --radius-xl:28px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.30);
    --shadow-md:0 4px 16px rgba(0,0,0,.35);
    --shadow-lg:0 12px 40px rgba(0,0,0,.45);
    --shadow-xl:0 24px 60px rgba(0,0,0,.55);
    --transition:0.25s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;background:var(--bg-deep);color:var(--text);
    font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;overscroll-behavior:none;
  }
  /* ── Noise texture overlay ── */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;
  }
  /* ── Ambient glow blob (top-right) ── */
  body::after{
    content:'';position:fixed;top:-200px;right:-200px;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(16,185,129,0.10) 0%, transparent 70%);
    pointer-events:none;z-index:0;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}

  /* ---------- HEADER ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg, rgba(15,23,42,.96), rgba(15,23,42,.82));
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(148,163,184,.10);
    padding:12px 16px 10px;
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .grade-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--grade-soft);color:var(--grade);
    padding:6px 14px;border-radius:100px;
    font-weight:700;font-size:.78rem;
    letter-spacing:.06em;text-transform:uppercase;
    border:1px solid rgba(16,185,129,.35);
    box-shadow:0 0 0 3px rgba(16,185,129,.08);
  }
  .grade-badge .chap{color:var(--text);opacity:.85;font-weight:600;text-transform:none;letter-spacing:0;}
  .stats{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
  .stat-pill{
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(148,163,184,.08);
    padding:6px 10px;border-radius:var(--radius-sm);
    border:1px solid rgba(148,163,184,.12);
    transition:background var(--transition);
  }
  .stat-pill b{color:var(--text);font-weight:700;}
  .icon-btn{
    width:38px;height:38px;border-radius:var(--radius-sm);
    display:inline-flex;align-items:center;justify-content:center;
    background:rgba(148,163,184,.08);
    border:1px solid rgba(148,163,184,.12);
    font-size:18px;line-height:1;
    transition:all var(--transition);
  }
  .icon-btn:hover{background:rgba(148,163,184,.14);transform:translateY(-1px);}
  .icon-btn:active{transform:translateY(0) scale(.94);}
  .icon-btn.on{background:var(--grade-soft);border-color:var(--grade);box-shadow:0 0 12px var(--grade-glow);}

  .progress-wrap{margin-top:12px;}
  .dots{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:rgba(148,163,184,.15);
    transition:all var(--transition);
  }
  .dot.done{background:var(--grade);box-shadow:0 0 6px var(--grade-glow);}
  .dot.current{background:var(--accent);transform:scale(1.35);box-shadow:0 0 10px var(--accent-glow-strong);}
  .pbar{
    height:6px;border-radius:100px;
    background:rgba(148,163,184,.12);
    overflow:hidden;
    position:relative;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.2);
  }
  .pbar-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg, var(--grade), #34d399);
    box-shadow:0 0 10px var(--grade-glow-strong), inset 0 1px 0 rgba(255,255,255,.2);
    border-radius:100px;
    transition:width .45s cubic-bezier(.4,0,.2,1);
  }

  /* ---------- MAIN ---------- */
  main{
    position:relative;z-index:1;
    max-width:560px;margin:0 auto;padding:16px;
    min-height:calc(100vh - 130px);
    display:flex;flex-direction:column;
  }
  @keyframes view-in{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  main > *{animation:view-in .35s cubic-bezier(.4,0,.2,1);}

  /* ---------- HOME ---------- */
  .home{
    text-align:center;padding:36px 16px 20px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .home .badge-mini{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(16,185,129,.12);color:var(--grade);
    font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    padding:6px 16px;border-radius:100px;
    border:1px solid rgba(16,185,129,.25);
    margin-bottom:8px;
  }
  .home h1{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:2.4rem;margin:0;
    color:var(--text-on-dark);
    font-weight:800;letter-spacing:-1px;line-height:1.15;
  }
  .home h1 .accent{
    background:linear-gradient(135deg, var(--grade) 0%, #34d399 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  }
  .home .sub{color:var(--text-on-dark-muted);font-size:1rem;line-height:1.6;max-width:340px;}
  .home .lvl{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:56px;font-weight:900;color:var(--grade);
    text-shadow:0 0 30px var(--grade-glow-strong);margin:6px 0 0;
    letter-spacing:-2px;
  }
  .home-card{
    background:var(--bg-card);border:1px solid rgba(148,163,184,.10);
    border-radius:var(--radius-lg);padding:22px;width:100%;max-width:420px;
    box-shadow:var(--shadow-lg);
    margin-top:6px;
  }
  .home-card .row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid rgba(148,163,184,.10);
    font-size:.92rem;color:var(--text-on-dark-muted);
  }
  .home-card .row:last-child{border-bottom:0;}
  .home-card .row b{color:var(--grade);font-weight:700;}
  .start-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    margin-top:10px;
    background:linear-gradient(135deg, var(--grade) 0%, #059669 100%);
    color:#ffffff;font-weight:700;font-size:1.05rem;letter-spacing:.02em;
    padding:15px 40px;border-radius:var(--radius-md);
    box-shadow:0 8px 24px rgba(16,185,129,.35), inset 0 1px 0 rgba(255,255,255,.15);
    transition:all var(--transition);min-height:52px;
  }
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(16,185,129,.45), inset 0 1px 0 rgba(255,255,255,.15);}
  .start-btn:active{transform:translateY(0) scale(.98);}
  .start-btn.alt{
    background:linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
    box-shadow:0 8px 24px rgba(245,158,11,.35), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .start-btn.alt:hover{box-shadow:0 12px 32px rgba(245,158,11,.45), inset 0 1px 0 rgba(255,255,255,.15);}
  .start-btn.adv{
    background:linear-gradient(135deg, #a855f7 0%, #6d28d9 100%);
    box-shadow:0 8px 24px rgba(168,85,247,.40), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .start-btn.adv:hover{box-shadow:0 12px 32px rgba(168,85,247,.55), inset 0 1px 0 rgba(255,255,255,.18);}
  .start-btn.wrong-only{
    background:linear-gradient(135deg,#ef4444 0%,#b91c1c 100%);
    box-shadow:0 8px 24px rgba(239,68,68,.40), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .start-btn.wrong-only:hover{box-shadow:0 12px 32px rgba(239,68,68,.55), inset 0 1px 0 rgba(255,255,255,.18);}

  /* ---------- STAGE PICKER (홈) ---------- */
  .stage-picker{
    display:grid;grid-template-columns:1fr;gap:12px;width:100%;max-width:420px;margin:8px 0;
  }
  .stage-btn{
    display:grid;grid-template-columns:44px 1fr;grid-template-rows:auto auto;gap:2px 14px;
    align-items:center;text-align:left;
    padding:16px 20px;border-radius:var(--radius-lg);
    background:linear-gradient(135deg, rgba(30,41,59,.85), rgba(15,23,42,.85));
    border:1px solid rgba(148,163,184,.20);
    color:var(--text-on-dark);cursor:pointer;
    transition:all var(--transition);
    position:relative;
  }
  .stage-btn .ic{grid-row:span 2;font-size:2rem;text-align:center;}
  .stage-btn .ttl{font-size:1.10rem;font-weight:800;letter-spacing:.02em;}
  .stage-btn .desc{font-size:.82rem;color:var(--text-on-dark-muted);}
  .stage-btn:hover{transform:translateY(-2px);border-color:rgba(148,163,184,.45);box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .stage-btn.basic{border-color:rgba(16,185,129,.35);}
  .stage-btn.basic .ttl{color:var(--grade);}
  .stage-btn.basic:hover{border-color:rgba(16,185,129,.65);box-shadow:0 8px 24px rgba(16,185,129,.30);}
  .stage-btn.advanced{border-color:rgba(168,85,247,.35);}
  .stage-btn.advanced .ttl{color:#c4b5fd;}
  .stage-btn.advanced:hover:not([disabled]){border-color:rgba(168,85,247,.65);box-shadow:0 8px 24px rgba(168,85,247,.30);}
  .stage-btn[disabled]{opacity:.55;cursor:not-allowed;filter:grayscale(.4);}
  .stage-btn[disabled]:hover{transform:none;box-shadow:none;}

  /* ---------- CLOZE 입력 ---------- */
  .cloze-prompt .cloze-sentence{
    font-size:1.35rem;line-height:2.2;color:#f8fafc;font-weight:500;
    margin-top:14px;padding:14px 16px;
    background:rgba(15,23,42,.55);border-radius:var(--radius-md);
    border:1px solid rgba(148,163,184,.18);
    text-align:center;letter-spacing:.02em;
  }
  .cloze-input{
    display:inline-block;
    background:rgba(168,85,247,.10);color:#f8fafc;
    border:2px solid rgba(168,85,247,.50);border-radius:8px;
    font:inherit;font-weight:700;
    padding:2px 10px;margin:0 4px;
    outline:none;transition:all var(--transition);
    min-width:60px;text-align:center;
  }
  .cloze-input:focus{border-color:#c4b5fd;background:rgba(168,85,247,.18);box-shadow:0 0 0 4px rgba(168,85,247,.20);}
  .grammar-prompt .qkr{color:#fef3c7;}
  .grammar-hint{margin-top:10px;padding:8px 12px;background:rgba(252,211,77,.10);border:1px solid rgba(252,211,77,.28);border-radius:8px;color:#fcd34d;font-size:.92rem;line-height:1.5;}
  .cloze-input.correct{border-color:var(--grade);background:rgba(16,185,129,.15);color:#a7f3d0;}
  .cloze-input.wrong{border-color:var(--danger);background:rgba(239,68,68,.15);color:#fca5a5;}
  .input-box.only-btn{justify-content:center;}

  /* ---------- CARD STUDY ---------- */
  .stage{position:relative;padding:14px 2px;perspective:1200px;flex:1;display:flex;flex-direction:column;}
  .word-counter{
    color:var(--text-on-dark-muted);text-align:center;font-size:.82rem;
    margin-bottom:12px;letter-spacing:.02em;
  }
  .word-counter b{color:var(--grade);font-weight:700;}

  .flipcard{
    position:relative;width:100%;min-height:400px;
    transform-style:preserve-3d;
    transition:transform .48s cubic-bezier(.2,.7,.1,1.2);
    cursor:pointer;
  }
  .flipcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--bg-card);
    border:1px solid rgba(148,163,184,.10);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-lg);
    padding:22px;
    display:flex;flex-direction:column;
    overflow:hidden;
    transition:border-color var(--transition), box-shadow var(--transition);
  }
  .face.front{
    align-items:center;justify-content:center;text-align:center;gap:14px;
    background:
      radial-gradient(circle at 50% 30%, rgba(16,185,129,.10), transparent 65%),
      var(--bg-card);
  }
  .face.front .pos-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .pos-tag{
    background:rgba(245,158,11,.14);color:var(--accent-light);
    padding:4px 10px;border-radius:100px;
    font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    border:1px solid rgba(245,158,11,.20);
  }
  .face.front .word{
    font-family:'Segoe UI','Malgun Gothic',sans-serif;
    font-size:64px;font-weight:800;letter-spacing:-1.5px;
    line-height:1.05;
    color:var(--text-on-dark);
    text-shadow:0 0 32px rgba(16,185,129,.22);
    word-break:break-word;
  }
  .face.front .ph{color:var(--text-on-dark-muted);font-size:1.05rem;font-style:italic;}
  .face.front .cefr{
    position:absolute;top:16px;right:16px;
    background:var(--grade-soft);color:var(--grade);
    padding:4px 10px;border-radius:100px;font-size:.68rem;font-weight:700;
    letter-spacing:.08em;border:1px solid rgba(16,185,129,.25);
  }
  .face.front .hint{color:var(--text-on-dark-muted);font-size:.78rem;margin-top:10px;opacity:.7;letter-spacing:.02em;}
  .speak-btn{
    margin-top:6px;
    background:rgba(59,130,246,.10);color:var(--info);
    border:1px solid rgba(59,130,246,.28);
    padding:10px 18px;border-radius:var(--radius-sm);
    font-size:.88rem;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;min-height:40px;
    transition:all var(--transition);
  }
  .speak-btn:hover{background:rgba(59,130,246,.18);transform:translateY(-1px);}
  .speak-btn:active{transform:translateY(0) scale(.96);}

  .face.back{
    transform:rotateY(180deg);
    padding:18px 18px 16px;
    overflow-y:auto;
    background:linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-hover) 100%);
  }
  /* ── 뒷면 폰트 +20% · 고대비 muted 오버라이드 ── */
  .back{
    /* 뒷면 전용 강화 색 (기본 muted #94a3b8 → #cbd5e1 slate-300) */
    --back-muted:#cbd5e1;
    --back-muted-strong:#e2e8f0;
  }
  .back .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .back .top .w{font-family:'Segoe UI','Malgun Gothic',sans-serif;font-size:1.8rem;font-weight:800;color:var(--grade);letter-spacing:-.5px;}
  .back .top .ph{color:var(--back-muted-strong);font-size:.98rem;font-style:italic;}
  .back .kr{
    font-size:1.5rem;font-weight:700;line-height:1.4;
    margin:6px 0 16px;color:#ffffff;
  }
  .back .kr .sep{color:var(--back-muted);margin:0 6px;font-weight:500;opacity:.85;}
  .section{
    background:rgba(15,23,42,.62);border-radius:var(--radius-md);padding:14px 16px;
    margin-bottom:12px;border:1px solid rgba(148,163,184,.18);
  }
  .section .label{
    font-size:.80rem;color:var(--back-muted-strong);
    text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;font-weight:700;
    display:flex;align-items:center;gap:4px;
  }
  .section.sound{
    background:linear-gradient(135deg, rgba(245,158,11,.14), rgba(245,158,11,.05));
    border:1px solid rgba(245,158,11,.35);
  }
  .section.sound .label{color:var(--accent-light);}
  .section.sound .body{color:#fef3c7;font-weight:600;font-size:1.10rem;}
  .section.story{
    background:linear-gradient(135deg, rgba(59,130,246,.14), rgba(59,130,246,.05));
    border:1px solid rgba(59,130,246,.35);
  }
  .section.story .label{color:#93c5fd;}
  .section.story .body{color:#dbeafe;font-size:1.03rem;line-height:1.55;}
  /* ── 한자 풀이 (wexplain krDetail) ── */
  .section.hanja{
    background:linear-gradient(135deg, rgba(249,115,22,.14), rgba(249,115,22,.05));
    border:1px solid rgba(253,186,116,.38);
  }
  .section.hanja .label{color:#fed7aa;}
  .section.hanja .hanja-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
  .section.hanja .hanja-item{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;
    color:#fff7ed;font-size:1rem;line-height:1.55;
  }
  .section.hanja .ko-word{font-weight:800;color:#fed7aa;white-space:nowrap;}
  .section.hanja .arrow{color:#fdba74;font-weight:600;}
  .section.hanja .explain{color:#ffedd5;font-weight:500;}
  /* ── 자·타동사 예시 (wexplain usageExamples) ── */
  .section.usage{
    background:linear-gradient(135deg, rgba(20,184,166,.14), rgba(20,184,166,.05));
    border:1px solid rgba(94,234,212,.38);
  }
  .section.usage .label{color:#5eead4;}
  .section.usage .usage-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .section.usage .usage-item{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;
    color:#ecfeff;line-height:1.5;
  }
  .section.usage .usage-item .en{font-weight:600;color:#5eead4;}
  .section.usage .usage-item .ko{color:#a5f3fc;}
  .section.usage .usage-item .speak-btn{
    background:transparent;border:1px solid rgba(94,234,212,.4);color:#5eead4;
    padding:2px 6px;border-radius:6px;font-size:.85rem;cursor:pointer;
  }
  /* ── 문법 포인트 (wexplain grammarNote) ── */
  .section.grammar{
    background:linear-gradient(135deg, rgba(245,158,11,.14), rgba(245,158,11,.05));
    border:1px solid rgba(252,211,77,.38);
  }
  .section.grammar .label{color:#fcd34d;}
  .section.grammar .body{color:#fef3c7;font-weight:500;line-height:1.55;font-size:.98rem;}
  /* ── 뉘앙스 섹션 (wkorean) ── */
  .section.nuance{
    background:linear-gradient(135deg, rgba(168,85,247,.14), rgba(168,85,247,.05));
    border:1px solid rgba(168,85,247,.38);
  }
  .section.nuance .label{color:#c4b5fd;}
  .section.nuance .body.ko-simple{color:#f5f3ff;font-weight:600;font-size:1.05rem;line-height:1.55;}
  .section.nuance .when-to-use{
    color:#ddd6fe;font-size:.94rem;line-height:1.55;margin-top:8px;padding-top:8px;
    border-top:1px dashed rgba(168,85,247,.28);font-style:italic;letter-spacing:.01em;
  }
  .section .body{font-size:1.03rem;line-height:1.55;color:#f8fafc;}
  .buddy-list,.col-list{display:flex;flex-direction:column;gap:8px;}
  .buddy-item,.col-item{
    display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap;
    font-size:1.03rem;
    padding:6px 0;border-bottom:1px dashed rgba(148,163,184,.18);
  }
  .buddy-item:last-child,.col-item:last-child{border-bottom:0;}
  .buddy-item .en, .col-item .en{color:#ffffff;font-weight:700;}
  .buddy-item .ko, .col-item .ko{color:var(--back-muted-strong);font-size:.94rem;text-align:right;font-weight:500;}
  .buddy-item .why{font-size:.86rem;color:var(--back-muted);opacity:1;display:block;width:100%;margin-top:3px;font-style:italic;}
  .ex-line{font-size:1.03rem;line-height:1.55;}
  .ex-line .en{color:#f8fafc;font-style:italic;font-weight:500;}
  .ex-line .ko{color:var(--back-muted-strong);font-size:.94rem;display:block;margin-top:4px;font-weight:500;}

    {"id":"u08431","w":"riddle","pos":["noun"],"ph":"","cefr":"A2","kr":["수수께끼"],"ex":[{"en":"My little brother spent all morning trying to solve a tricky riddle online.","ko":"남동생은 아침 내내 온라인의 까다로운 수수께끼를 풀려고 애썼어."}],"mnemonic":{"soundHint":"리들","story":"'리들(riddle)'은 아이들이 서로 내는 수수께끼 이름처럼 들린다.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"puzzle","ko":"퍼즐, 수수께끼","reason":"풀어야 할 문제라는 점에서 동의어"},{"w":"mystery","ko":"미스터리","reason":"정답이 숨겨진 문제라는 시나리오에서 함께 쓰임"}],"collocBest":[{"en":"solve a riddle","ko":"수수께끼를 풀다"},{"en":"ask a riddle","ko":"수수께끼를 내다"}]},"nuance":{"koSimple":"머리 굴려 답을 맞히는 수수께끼","whenToUse":"재미로 푸는 수수께끼 문제"},"krDetail":[{"ko":"수수께끼, 알쏭달쏭한 문제","explain":"정답을 알아내기 어려운 문제나 상황을 뜻하는 명사예요. 어린이 놀이의 '수수께끼'뿐만 아니라, 풀기 힘든 미스터리나 이해되지 않는 사람의 행동을 비유할 때도 자주 씁니다."}],"usageExamples":[{"en":"My uncle asked me a tricky riddle at dinner last night.","ko":"삼촌은 어젯밤 저녁 식사 때 나에게 까다로운 수수께끼를 냈다."},{"en":"The riddle in the old book remained unsolved for many years.","ko":"그 오래된 책 속의 수수께끼는 오랫동안 풀리지 않았다."}],"grammarNote":"riddle은 셀 수 있는 명사예요. '수수께끼를 풀다'는 solve a riddle, '수수께끼를 내다'는 ask/tell a riddle로 쓰고, guess a riddle은 어색합니다. '~에게는 수수께끼다'는 be a riddle to somebody 구조를 씁니다.","grammarQuiz":[{"sentence":"The old man asked me _____ difficult _____ that no one could solve.","ko":"그 노인은 아무도 풀 수 없는 어려운 수수께끼를 나에게 냈다.","answer":["a","riddle"],"hint":"관사 a + 명사"},{"sentence":"Her sudden change of mind is still _____ _____ all of her close friends.","ko":"그녀의 갑작스러운 마음의 변화는 여전히 가까운 친구들 모두에게 수수께끼다.","answer":["a","riddle","to"],"hint":"a + 명사 + 전치사 to"}]},
    {"id":"u08436","w":"rubbish","pos":["noun"],"ph":"","cefr":"A2","kr":["쓰레기"],"ex":[{"en":"Please throw all this rubbish into the big green bin outside the gate.","ko":"이 쓰레기를 전부 정문 밖 큰 초록 통에 버려 줘."}],"mnemonic":{"soundHint":"러비시","story":"'러비시(rubbish)'는 영국식 표현으로 쓰레기통을 러비시 빈(rubbish bin)이라 부른다.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"trash","ko":"쓰레기","reason":"미국식 동의어"},{"w":"garbage","ko":"쓰레기","reason":"일상 쓰레기를 뜻하는 동의어"}],"collocBest":[{"en":"throw away rubbish","ko":"쓰레기를 버리다"},{"en":"rubbish bin","ko":"쓰레기통"}]},"nuance":{"koSimple":"버리는 잡동사니 쓰레기","whenToUse":"영국식으로 쓰레기·헛소리 말할 때"},"krDetail":[{"ko":"쓰레기, 폐기물; 헛소리, 형편없는 것","explain":"영국식 영어에서 '쓰레기'를 뜻하는 대표 단어예요. 미국식 garbage/trash와 같은 뜻으로, 실제 물리적인 쓰레기뿐 아니라 '말도 안 되는 소리, 형편없는 영화·책' 같은 비유적 의미로도 자주 쓰입니다."}],"usageExamples":[{"en":"The strong wind blew rubbish all over the school playground.","ko":"강한 바람이 학교 운동장 전체에 쓰레기를 흩날렸다."},{"en":"Piles of rubbish were left near the school gate this morning.","ko":"오늘 아침 교문 근처에 쓰레기 더미가 남겨져 있었다."}],"grammarNote":"rubbish는 불가산명사라서 a rubbish, rubbishes로 쓸 수 없어요. 수를 세려면 a piece of rubbish, some rubbish처럼 표현합니다. '말도 안 된다'는 That's rubbish! 또는 talk rubbish 구조로 씁니다.","grammarQuiz":[{"sentence":"You should not throw _____ _____ the beautiful river near our small village.","ko":"너는 우리 작은 마을 근처의 아름다운 강에 쓰레기를 버리면 안 된다.","answer":["rubbish","into"],"hint":"명사 + 전치사 into"},{"sentence":"Stop _____ _____ ; your ideas are actually much better than you think.","ko":"헛소리 그만해, 네 아이디어는 사실 네가 생각하는 것보다 훨씬 좋아.","answer":["talking","rubbish"],"hint":"동명사 + 명사"}]},
    {"id":"u08441","w":"semiconductor","pos":["noun"],"ph":"","cefr":"A2","kr":["반도체"],"ex":[{"en":"Korea is famous around the world for producing high-quality semiconductor chips.","ko":"한국은 고품질 반도체 칩 생산으로 전 세계에서 유명해."}],"mnemonic":{"soundHint":null,"story":"semi(반)+conductor(전도체) → 전기를 반만 통하는 물질, 즉 반도체.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"chip","ko":"반도체 칩","reason":"반도체 제품을 부르는 콜로케이션 동의어"},{"w":"conductor","ko":"전도체","reason":"semi가 붙지 않은 원형과 대비"}],"collocBest":[{"en":"semiconductor industry","ko":"반도체 산업"},{"en":"semiconductor chip","ko":"반도체 칩"}]},"nuance":{"koSimple":"전기 흐름을 조절하는 작은 칩","whenToUse":"반도체 산업·칩 이야기 할 때"},"krDetail":[{"ko":"반도체","explain":"전기가 잘 통하는 '도체(conductor)'와 통하지 않는 '부도체' 사이의 성질을 가진 물질을 가리키는 명사예요. 스마트폰·컴퓨터의 핵심 부품인 반도체 산업(semiconductor industry)에서 자주 등장하는 단어입니다."}],"usageExamples":[{"en":"Korean companies produce a semiconductor used in almost every phone.","ko":"한국 기업들은 거의 모든 휴대폰에 사용되는 반도체를 생산한다."},{"en":"A tiny semiconductor is hidden inside every modern smart device.","ko":"작은 반도체가 모든 현대 스마트 기기 안에 숨겨져 있다."}],"grammarNote":"semiconductor는 셀 수 있는 명사예요. 하나면 a semiconductor, 여러 개면 semiconductors로 씁니다. 산업·시장을 말할 때는 the semiconductor industry/market처럼 형용사처럼 쓸 수 있고, 이때는 뒤 명사가 복수여도 semiconductor는 단수형을 유지합니다.","grammarQuiz":[{"sentence":"Korea is one of the biggest producers _____ _____ in the whole world.","ko":"한국은 전 세계에서 반도체의 최대 생산국 중 하나이다.","answer":["of","semiconductors"],"hint":"전치사 of + 복수명사"},{"sentence":"Many students want to work in the _____ _____ after graduation.","ko":"많은 학생들이 졸업 후 반도체 산업에서 일하고 싶어 한다.","answer":["semiconductor","industry"],"hint":"명사 수식 + 명사"}]},
    {"id":"u08446","w":"shrub","pos":["noun"],"ph":"","cefr":"A2","kr":["관목"],"ex":[{"en":"A small brown rabbit was hiding behind the low shrub in our garden.","ko":"작은 갈색 토끼가 우리 정원의 낮은 관목 뒤에 숨어 있었어."}],"mnemonic":{"soundHint":null,"story":"shrub은 나무(tree)보다 작은 관목. 정원을 꾸미는 낮은 덤불을 떠올리자.","hintConfidence":1},"pairs":{"buddyWords":[{"w":"bush","ko":"덤불","reason":"작은 나무·덤불이라는 뜻의 동의어"},{"w":"tree","ko":"나무","reason":"큰 나무 vs 작은 관목의 대비"}],"collocBest":[{"en":"trim a shrub","ko":"관목을 다듬다"},{"en":"flowering shrub","ko":"꽃 피는 관목"}]},"nuance":{"koSimple":"키 작은 덤불 나무","whenToUse":"정원의 낮은 덤불 말할 때"},"krDetail":[{"ko":"관목, 키가 작은 나무","explain":"키가 사람 키보다 작고, 뿌리 부근에서 여러 줄기가 갈라져 자라는 나무를 가리키는 명사예요. 큰 나무(tree)와는 구별되며, 정원의 장식용 나무나 산울타리(hedge)를 이루는 식물을 설명할 때 자주 씁니다."}],"usageExamples":[{"en":"My grandfather planted a small shrub near the front gate yesterday.","ko":"할아버지는 어제 대문 근처에 작은 관목을 심으셨다."},{"en":"A tiny bird was hiding behind the shrub in our garden.","ko":"작은 새 한 마리가 우리 정원 관목 뒤에 숨어 있었다."}],"grammarNote":"shrub은 셀 수 있는 명사라 a shrub, two shrubs처럼 씁니다. tree(큰 나무)와 grass(풀) 사이에 위치한 '작은 나무'라는 이미지를 기억하세요. '관목 숲'은 shrubbery라는 별도 명사를 씁니다.","grammarQuiz":[{"sentence":"A small brown bird was hiding _____ _____ shrub near the wooden fence.","ko":"작은 갈색 새 한 마리가 나무 울타리 근처 관목 안에 숨어 있었다.","answer":["in","the"],"hint":"전치사 in + 관사"},{"sentence":"My grandfather planted several _____ along _____ path last spring.","ko":"우리 할아버지는 지난 봄 오솔길을 따라 관목 몇 그루를 심으셨다.","answer":["shrubs","the"],"hint":"복수명사 + 관사"}]},
    {"id":"u08451","w":"simultaneously","pos":["adv"],"ph":"","cefr":"A2","kr":["동시에"],"ex":[{"en":"The twins simultaneously shouted the same answer during the quiz show yesterday.","ko":"어제 퀴즈쇼에서 쌍둥이가 동시에 같은 답을 외쳤어."}],"mnemonic":{"soundHint":null,"story":"simul(같은)+taneously → '시뮬레이션(simulation)'도 동시 상황을 재현한다. 두 일이 동시에 진행됨.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"at the same time","ko":"동시에","reason":"같은 뜻의 표현"},{"w":"concurrently","ko":"동시에","reason":"격식체 동의 부사"}],"collocBest":[{"en":"happen simultaneously","ko":"동시에 일어나다"},{"en":"occur simultaneously","ko":"동시에 발생하다"}]},"nuance":{"koSimple":"딱 같은 순간에 함께","whenToUse":"두 일이 같은 시각에 일어날 때"},"krDetail":[{"ko":"동시에, 같은 시각에","explain":"두 가지 이상의 일이 정확히 같은 시각에 일어남을 나타내는 부사예요. at the same time과 같은 뜻이며, 학술·공식 문장에서 더 자주 쓰이는 좀 더 격식 있는 표현입니다."}],"usageExamples":[{"en":"The twins raised their hands simultaneously to answer the teacher's question.","ko":"쌍둥이는 선생님의 질문에 답하려고 동시에 손을 들었다."},{"en":"Two alarms went off simultaneously in the science lab this morning.","ko":"오늘 아침 과학실에서 두 개의 경보가 동시에 울렸다."}],"grammarNote":"simultaneously는 부사예요. 형용사형은 simultaneous(동시의)이고 뒤에 명사를 수식합니다. simultaneously with + 명사 형태로 '~와 동시에'라고 쓸 수 있고, 문장 맨 앞이나 동사 뒤에 자유롭게 위치할 수 있습니다.","grammarQuiz":[{"sentence":"The two young singers began _____ _____ sing the same beautiful song together.","ko":"그 두 젊은 가수는 같은 아름다운 노래를 동시에 함께 부르기 시작했다.","answer":["simultaneously","to"],"hint":"부사 + to부정사"},{"sentence":"The event was broadcast _____ _____ ten countries around the world.","ko":"그 행사는 전 세계 열 개 나라에서 동시에 방송되었다.","answer":["simultaneously","in"],"hint":"부사 + 전치사 in"}]},
    {"id":"u08456","w":"spacious","pos":["adj"],"ph":"","cefr":"A2","kr":["넓은"],"ex":[{"en":"Their new apartment has a spacious living room with huge sunny windows.","ko":"그들의 새 아파트에는 커다랗고 햇볕 잘 드는 창이 있는 넓은 거실이 있어."}],"mnemonic":{"soundHint":null,"story":"space(공간)+ious(가득한) → 공간이 넉넉한, 즉 넓은.","hintConfidence":3},"pairs":{"buddyWords":[{"w":"roomy","ko":"공간이 넓은","reason":"실내 공간이 넓다는 뜻의 동의어"},{"w":"cramped","ko":"비좁은","reason":"넓다 vs 좁다의 반의어"}],"collocBest":[{"en":"spacious room","ko":"넓은 방"},{"en":"spacious living room","ko":"넓은 거실"}]},"nuance":{"koSimple":"팔 벌려도 남는 넓은 공간","whenToUse":"방·집이 넓고 시원하다고 할 때"},"krDetail":[{"ko":"넓은, 공간이 넉넉한","explain":"방·건물·차량 등의 내부 공간이 여유롭게 넓은 것을 표현하는 형용사예요. big/large가 크기 자체에 초점이 있다면, spacious는 '움직일 만한 여유 공간이 있다'는 쾌적함을 강조합니다."}],"usageExamples":[{"en":"The new library has a spacious reading room for group study.","ko":"새 도서관에는 그룹 학습을 위한 넓은 열람실이 있다."},{"en":"Our classroom feels spacious after we moved the old desks out.","ko":"낡은 책상을 밖으로 옮긴 뒤 우리 교실이 넓게 느껴진다."}],"grammarNote":"spacious는 주로 '실내 공간'에 사용해요. 야외의 넓은 벌판은 wide나 open, vast를 쓰는 편이 자연스럽습니다. 명사형은 space(공간), 유의어로는 roomy, capacious가 있으니 함께 정리해 두세요.","grammarQuiz":[{"sentence":"Their new apartment is very bright, clean, _____ _____ spacious.","ko":"그들의 새 아파트는 매우 밝고, 깨끗하고, 넓다.","answer":["and","very"],"hint":"접속사 and + 부사"},{"sentence":"We stayed in _____ spacious _____ with a beautiful view of the sea.","ko":"우리는 바다의 아름다운 경치가 보이는 넓은 방에 머물렀다.","answer":["a","room"],"hint":"관사 + 명사"}]},
    {"id":"u08461","w":"sprain","pos":["verb"],"ph":"","cefr":"A2","kr":["삐다"],"ex":[{"en":"I badly sprained my ankle while playing basketball during gym class yesterday.","ko":"어제 체육 시간에 농구를 하다가 발목을 심하게 삐었어."}],"mnemonic":{"soundHint":null,"story":"spring(튀다)처럼 관절이 튀어 발목을 삐다. sp-r 소리에 '삐끗' 느낌.","hintConfidence":1},"pairs":{"buddyWords":[{"w":"twist","ko":"삐다, 비틀다","reason":"발목을 삐끗한다는 뜻의 동의어"},{"w":"ankle","ko":"발목","reason":"sprain의 대표 대상인 신체 부위"}],"collocBest":[{"en":"sprain one's ankle","ko":"발목을 삐다"},{"en":"sprain a wrist","ko":"손목을 삐다"}]},"nuance":{"koSimple":"발목·손목이 꺾여 삐끗함","whenToUse":"운동하다 관절을 삐었을 때"},"krDetail":[{"ko":"(발목·손목 등을) 삐다, 접질리다","explain":"관절 주위의 인대가 순간적으로 무리한 힘을 받아 늘어나거나 다치는 것을 나타내는 동사예요. break(뼈가 부러지다)보다는 가볍고, hurt(다치다)보다는 더 구체적인 부상을 뜻합니다."}],"usageExamples":[{"en":"She sprained her ankle badly during yesterday's basketball match at school.","ko":"그녀는 어제 학교 농구 경기 중에 발목을 심하게 삐었다."},{"en":"My wrist was sprained when I fell on the icy sidewalk.","ko":"얼음 낀 인도에서 넘어졌을 때 내 손목이 삐었다."}],"grammarNote":"sprain은 타동사여서 반드시 다친 신체 부위(발목·손목 등)를 목적어로 씁니다. sprain-sprained-sprained로 규칙 변화하며, 명사로도 써서 get a sprain, have a sprain(삠·염좌)이라고 표현할 수 있어요.","grammarQuiz":[{"sentence":"She _____ _____ ankle while she was playing basketball on the school playground.","ko":"그녀는 학교 운동장에서 농구를 하다가 발목을 삐었다.","answer":["sprained","her"],"hint":"동사 과거형 + 소유격"},{"sentence":"Be careful, or you might _____ _____ wrist during today's dance lesson.","ko":"조심해, 그렇지 않으면 오늘 댄스 수업 중에 손목을 삘 수도 있어.","answer":["sprain","your"],"hint":"동사원형 + 소유격"}]},
    {"id":"u08466","w":"stink","pos":["verb"],"ph":"","cefr":"A2","kr":["역겹다, 악취가 나다"],"ex":[{"en":"The old sneakers in my locker really stink after the long soccer practice.","ko":"긴 축구 연습 뒤 사물함 속 낡은 운동화에서 정말 악취가 나."}],"mnemonic":{"soundHint":"스팅크","story":"'스팅크(stink)'는 벌레 스팅(sting)처럼 코를 쿡 찌르는 악취.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"smell","ko":"냄새가 나다","reason":"냄새 관련 동의어"},{"w":"stench","ko":"악취","reason":"명사형 관련어(콜로케이션)"}],"collocBest":[{"en":"stink of garbage","ko":"쓰레기 악취가 나다"},{"en":"really stink","ko":"정말 악취가 나다"}]},"nuance":{"koSimple":"코 막힐 만큼 지독한 냄새","whenToUse":"땀·쓰레기 악취 말할 때"},"krDetail":[{"ko":"악취가 나다; (일 등이) 형편없다, 역겹다","explain":"썩은 음식·양말·쓰레기처럼 몹시 불쾌한 냄새가 나는 것을 뜻하는 자동사예요. 비유적으로 '어떤 일이 형편없다, 상황이 나쁘다'는 의미로도 자주 쓰입니다."}],"usageExamples":[{"en":"The old cheese in the fridge really stinks up the whole kitchen.","ko":"냉장고 안의 오래된 치즈가 부엌 전체를 정말 악취로 채운다."},{"en":"The garbage bin behind the cafeteria stinks after a hot afternoon.","ko":"더운 오후가 지나면 급식실 뒤 쓰레기통에서 악취가 난다."}],"grammarNote":"stink는 자동사예요. 변화형은 stink-stank/stunk-stunk로 불규칙 활용합니다. '~한 냄새가 나다'는 stink of + 명사, '~에게 형편없다'는 stink to somebody 형태를 씁니다.","grammarQuiz":[{"sentence":"The old milk in the fridge really _____ _____ rotten cheese today.","ko":"냉장고 안의 오래된 우유가 오늘 정말 상한 치즈 냄새가 난다.","answer":["stinks","of"],"hint":"동사 3인칭 + 전치사 of"},{"sentence":"This whole situation _____ , _____ nobody is telling us the real truth.","ko":"이 상황 전체가 형편없다, 왜냐하면 아무도 우리에게 진짜 진실을 말해주지 않기 때문이다.","answer":["stinks","because"],"hint":"동사 + 접속사"}]},
    {"id":"u08471","w":"suitor","pos":["noun"],"ph":"","cefr":"A2","kr":["소송인, 구혼자"],"ex":[{"en":"In the old novel, a rich suitor asked the young lady to marry him.","ko":"그 고전 소설에서 부유한 구혼자가 젊은 아가씨에게 청혼했어."}],"mnemonic":{"soundHint":null,"story":"suit(정장·소송)+or(사람) → 정장 입고 청혼하는 사람, 또는 소송을 거는 사람.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"admirer","ko":"구애자","reason":"구혼자와 유사한 의미"},{"w":"plaintiff","ko":"원고, 소송인","reason":"소송인이라는 뜻과 연결"}],"collocBest":[{"en":"rejected suitor","ko":"거절당한 구혼자"},{"en":"wealthy suitor","ko":"부유한 구혼자"}]},"nuance":{"koSimple":"청혼하러 온 남자","whenToUse":"옛 소설·법정에서 구혼자 말할 때"},"krDetail":[{"ko":"소송인(원고); 구혼자, 청혼자","explain":"법률 용어로는 '법정에 소송을 제기한 사람(원고)'을 뜻하고, 문학·오래된 표현에서는 '여자에게 결혼을 청하는 남자, 구혼자'를 뜻하는 명사예요. 오늘날 회화에서는 잘 쓰이지 않고 소설·시험 지문에서 주로 만납니다."}],"usageExamples":[{"en":"The princess politely refused every suitor who visited her family's castle.","ko":"공주는 그녀의 가족 성을 방문한 모든 구혼자를 정중히 거절했다."},{"en":"A hopeful suitor waited quietly outside her house all afternoon long.","ko":"희망에 찬 한 구혼자가 오후 내내 그녀의 집 밖에서 조용히 기다렸다."}],"grammarNote":"suitor는 셀 수 있는 명사예요. '~의 구혼자'는 a suitor of/for + 명사 구조를 씁니다. 동사 sue(고소하다)와 형태가 비슷하지만 뜻이 다르니 헷갈리지 마세요. 유사한 옛말로 wooer(구혼자)도 있습니다.","grammarQuiz":[{"sentence":"The lawyer represented the _____ _____ the very complicated legal case.","ko":"그 변호사는 매우 복잡한 법률 사건에서 원고를 대리했다.","answer":["suitor","in"],"hint":"명사 + 전치사 in"},{"sentence":"Many _____ came to ask _____ princess to marry them.","ko":"많은 구혼자들이 그 공주에게 결혼해 달라고 청혼하러 왔다.","answer":["suitors","the"],"hint":"복수명사 + 관사"}]},
    {"id":"u08476","w":"swell","pos":["verb"],"ph":"","cefr":"A2","kr":["부풀다"],"ex":[{"en":"My knee began to swell badly after I fell down during soccer practice.","ko":"축구 연습 중에 넘어진 뒤 무릎이 심하게 붓기 시작했어."}],"mnemonic":{"soundHint":null,"story":"발음이 'well(잘)'과 비슷. 반죽이 잘 부풀어 오르는 장면을 떠올리자.","hintConfidence":1},"pairs":{"buddyWords":[{"w":"expand","ko":"팽창하다","reason":"부피가 커진다는 뜻의 동의어"},{"w":"shrink","ko":"줄어들다","reason":"부풀다 vs 줄어들다의 반의어"}],"collocBest":[{"en":"swell up","ko":"부풀어 오르다"},{"en":"ankle swells","ko":"발목이 붓다"}]},"nuance":{"koSimple":"풍선처럼 부풀어 오르는 것","whenToUse":"다친 곳·강물이 붓거나 불 때"},"krDetail":[{"ko":"붓다, 부풀다; 증가하다","explain":"다친 부위가 붓거나 풍선처럼 크기가 커지는 것을 나타내는 동사예요. 신체가 부어오르는 상황뿐 아니라, 강물이 불어나거나 인구·소리가 갑자기 커지는 것에도 비유적으로 씁니다."}],"usageExamples":[{"en":"Heavy rain swelled the small river behind our school last week.","ko":"지난주 폭우가 학교 뒤의 작은 강물을 불어나게 했다."},{"en":"My knee swelled up after I fell during the soccer game.","ko":"축구 경기 중에 넘어진 뒤 내 무릎이 부풀어 올랐다."}],"grammarNote":"swell은 주로 자동사로 써서 목적어 없이 '붓다, 부풀다'라는 뜻을 나타내요. 변화는 swell-swelled-swollen(형용사적 과거분사)로 불규칙이며, swollen ankle(부은 발목)처럼 형용사처럼도 자주 쓰입니다.","grammarQuiz":[{"sentence":"My right ankle began _____ _____ badly after the long soccer match yesterday.","ko":"내 오른쪽 발목이 어제 긴 축구 경기 후에 심하게 붓기 시작했다.","answer":["to","swell"],"hint":"to부정사 + 동사원형"},{"sentence":"The heavy rain last night made _____ small river _____ very quickly.","ko":"어젯밤 폭우는 그 작은 강을 매우 빠르게 불어나게 했다.","answer":["the","swell"],"hint":"관사 + 원형부정사"}]},
    {"id":"u08481","w":"tin","pos":["noun"],"ph":"","cefr":"A2","kr":["양철, 주석"],"ex":[{"en":"Grandma keeps homemade cookies inside an old tin box on the top shelf.","ko":"할머니는 맨 위 선반의 낡은 양철 상자 안에 손수 만든 쿠키를 보관하셔."}],"mnemonic":{"soundHint":"틴","story":"'틴(tin)'은 통조림 캔의 재료. 팅~ 소리가 나는 얇은 양철 캔을 떠올리자.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"can","ko":"캔, 깡통","reason":"양철로 만든 대표 사물(콜로)"},{"w":"metal","ko":"금속","reason":"주석이 속하는 상위 개념"}],"collocBest":[{"en":"tin can","ko":"양철 캔"},{"en":"tin roof","ko":"양철 지붕"}]},"nuance":{"koSimple":"은빛 반짝이는 얇은 양철 판","whenToUse":"양철 캔·주석 재료 말할 때"},"krDetail":[{"ko":"주석(금속); 양철, 깡통","explain":"무르고 잘 녹슬지 않는 은백색 금속 '주석'을 뜻하는 명사예요. 얇은 주석이나 강철판을 부르는 '양철', 그리고 그 양철로 만든 '깡통(영국식 표현)'의 의미로도 자주 씁니다."}],"usageExamples":[{"en":"The factory uses tin to make cans for many food products.","ko":"그 공장은 많은 식품용 캔을 만들기 위해 주석을 사용한다."},{"en":"An old tin box was found under the desk in my classroom.","ko":"우리 교실 책상 밑에서 낡은 양철 상자가 발견되었다."}],"grammarNote":"tin은 금속을 뜻할 때는 불가산명사예요. '깡통'을 뜻할 때는 셀 수 있어 a tin, two tins로 씁니다. 미국식 영어에서는 깡통을 can이라고 하는 편이 자연스럽고, tin은 영국식 표현에 가깝습니다.","grammarQuiz":[{"sentence":"She opened _____ _____ of tomato soup for her hungry younger brother.","ko":"그녀는 배고픈 남동생을 위해 토마토 수프 한 통을 열었다.","answer":["a","tin"],"hint":"관사 + 명사"},{"sentence":"Tin _____ _____ soft metal that is often mixed with copper for coins.","ko":"주석은 동전을 위해 종종 구리와 섞이는 부드러운 금속이다.","answer":["is","a"],"hint":"be동사 + 관사"}]},
    {"id":"u08486","w":"veterinarian","pos":["noun"],"ph":"","cefr":"A2","kr":["수의사"],"ex":[{"en":"We took our sick puppy to the veterinarian early on Saturday morning.","ko":"우리는 아픈 강아지를 데리고 토요일 아침 일찍 수의사에게 갔어."}],"mnemonic":{"soundHint":null,"story":"veterin(가축)+arian(전문가) → 가축을 돌보는 전문가, 수의사. veteran(참전용사)과 헷갈리지 말자.","hintConfidence":2},"pairs":{"buddyWords":[{"w":"vet","ko":"수의사(줄임말)","reason":"veterinarian의 축약 동의어"},{"w":"doctor","ko":"의사","reason":"사람 의사 vs 동물 의사의 시나리오 대비"}],"collocBest":[{"en":"see a veterinarian","ko":"수의사에게 진료받다"},{"en":"licensed veterinarian","ko":"면허 있는 수의사"}]},"nuance":{"koSimple":"동물을 치료하는 의사","whenToUse":"강아지·고양이 아플 때 데려가는 곳"},"krDetail":[{"ko":"수의사","explain":"동물의 병을 진찰하고 치료하는 의사, 즉 '수의사'를 뜻하는 명사예요. 회화체에서는 흔히 줄임말 vet을 사용하고, veterinarian은 다소 격식 있는 표현으로 문서나 시험 지문에서 자주 등장합니다."}],"usageExamples":[{"en":"The kind veterinarian saved my puppy after the terrible car accident.","ko":"친절한 수의사가 끔찍한 자동차 사고 후에 내 강아지를 구했다."},{"en":"My cousin wants to become a veterinarian who helps injured wild animals.","ko":"내 사촌은 다친 야생 동물을 돕는 수의사가 되고 싶어 한다."}],"grammarNote":"veterinarian은 셀 수 있는 명사예요. 미국식 영어에서 더 자주 쓰이고, 영국식에서는 veterinary surgeon이라고 부르기도 합니다. 형용사형 veterinary(수의학의)와 함께 veterinary clinic(동물병원)도 함께 익혀 두세요.","grammarQuiz":[{"sentence":"The kind _____ carefully examined _____ small dog's leg in the animal clinic.","ko":"그 친절한 수의사는 동물 병원에서 그 작은 개의 다리를 조심스럽게 살펴보았다.","answer":["veterinarian","the"],"hint":"명사 + 관사"},{"sentence":"You should take your sick cat _____ _____ veterinarian right now.","ko":"너는 지금 당장 아픈 고양이를 수의사에게 데려가야 한다.","answer":["to","a"],"hint":"전치사 to + 관사"}]},
    {"id":"u08301","w":"crust","pos":["noun"],"ph":"","cefr":"A2","kr":["껍질, 지각"],"ex":[{"en":"I love the crispy crust of freshly baked bread from that bakery.","ko":"나는 그 빵집에서 갓 구운 빵의 바삭한 껍질이 정말 좋아."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"shell","ko":"껍질","reason":"겉을 감싸는 층이라는 유사 의미"},{"w":"layer","ko":"층","reason":"지각의 층 구조 시나리오 연결"}],"collocBest":[{"en":"the earth's crust","ko":"지구의 지각"},{"en":"bread crust","ko":"빵 껍질"}]},"nuance":{"koSimple":"빵 겉면·지구 겉껍질","whenToUse":"빵 껍질이나 지각 말할 때"},"krDetail":[{"ko":"껍질, (지구의) 지각","explain":"빵이나 파이의 바깥쪽 딱딱한 부분, 또는 지구·행성의 가장 바깥쪽 단단한 층을 뜻해요. '겉을 덮는 딱딱한 층'이라는 공통 이미지를 기억하세요."}],"usageExamples":[{"en":"My brother always cuts the crust off his sandwich.","ko":"내 남동생은 항상 샌드위치의 껍질을 잘라낸다."},{"en":"The Earth's crust is thinner under the deep oceans.","ko":"지구의 지각은 깊은 바다 아래에서 더 얇다."}],"grammarNote":"crust는 셀 수 있는 명사와 셀 수 없는 명사 둘 다 돼요. 빵 껍질처럼 조각이면 셀 수 있고, 지각처럼 층 전체면 the crust로 정관사와 함께 써요. 학생들이 crust와 shell(조개껍데기 등)을 혼동해요.","grammarQuiz":[{"sentence":"The Earth's _____ _____ made of many tectonic plates that slowly _____ over time.","ko":"지구의 지각은 시간이 지나면서 천천히 움직이는 많은 지각판으로 이루어져 있다.","answer":["crust","is","move"],"hint":"정관사 the + crust + 단수 be + 관계사절 복수동사"}]},
    {"id":"w06585","w":"useful","pos":["adj"],"ph":"/ˈjuːsfəl/","cefr":"A2","kr":["유용한","도움이 되는"],"ex":[{"en":"A dictionary is a useful tool for students.","ko":"사전은 학생들에게 유용한 도구이다."}],"mnemonic":{"soundHint":null,"story":null,"hintConfidence":0},"pairs":{"buddyWords":[{"w":"helpful","ko":"도움이 되는","reason":"동의어로 함께 쓰임"},{"w":"useless","ko":"쓸모없는","reason":"반의어로 대조 짝"},{"w":"information","ko":"정보","reason":"useful information 콜로케이션"}],"collocBest":[{"en":"useful information","ko":"유용한 정보"},{"en":"useful skill","ko":"유용한 기술"}]},"nuance":{"koSimple":"딱 필요할 때 도움되는 것","whenToUse":"쓸모 있는 도구·정보"},"krDetail":[{"ko":"유용한","explain":"쓸모가 있어 도움이 되는"},{"ko":"도움이 되는","explain":"필요할 때 실질적으로 이로운"}],"usageExamples":[{"en":"This dictionary is really useful when I read English books.","ko":"이 사전은 내가 영어책을 읽을 때 정말 유용하다."},{"en":"The map was very useful during our field trip yesterday.","ko":"그 지도는 어제 현장 학습 동안 매우 유용했다."}],"grammarNote":"'useful for + 명사/동명사' 또는 'useful to + 사람' 구조를 씁니다. 'useful to + 동사원형'처럼 to부정사로 쓰는 실수가 흔합니다.","grammarQuiz":[{"sentence":"This new smartphone app is very _____ _____ learning new vocabulary.","ko":"이 새로운 스마트폰 앱은 새 어휘를 배우는 데 매우 유용하다.","answer":["useful","for"],"hint":"형용사 + 전치사 (~에 유용한, 동명사 앞)"}]},
    {"id":"u08241","w":"assassinate","pos":["verb"],"ph":"","cefr":"A2","kr":["암살하다"],"ex":[{"en":"The novel describes a secret plan to assassinate the king during the festival.","ko":"그 소설은 축제 중에 왕을 암살하려는 비밀 계획을 그린다."}],"mnemonic":{"soundHint":null,"story":"assassin(암살자)이 암살하다","hintConfidence":2},"pairs":{"buddyWords":[{"w":"murder","ko":"살해하다","reason":"살해 동의어"},{"w":"president","ko":"대통령","reason":"요인 암살 시나리오"}],"collocBest":[{"en":"assassinate a leader","ko":"지도자를 암살하다"},{"en":"plot to assassinate","ko":"암살 음모"}]},"nuance":{"koSimple":"유명인을 몰래 살해하다","whenToUse":"대통령·왕 등 요인 살해 말할 때"},"krDetail":[{"ko":"암살하다","explain":"정치인·유명인을 계획적으로 살해하는 행위를 뜻하는 타동사."}],"usageExamples":[{"en":"The rebels tried to assassinate the king last night.","ko":"반란군은 어젯밤 왕을 암살하려고 시도했다."},{"en":"The famous leader was assassinated in front of the crowd.","ko":"그 유명한 지도자는 군중 앞에서 암살당했다."}],"grammarNote":"assassinate는 s가 네 번 들어간 어려운 철자이다. assassination(암살), assassin(암살자)까지 함께 외워두는 것이 좋다.","grammarQuiz":[{"sentence":"The famous leader _____ assassinated by an enemy soldier _____ a public event.","ko":"그 유명한 지도자는 공개 행사에서 적군 병사에 의해 암살되었다.","answer":["was","at"],"hint":"수동태 be동사 + 장소 전치사"}]},

/* ---------- WORD STATS HELPERS ---------- */
function getWordStat(id){
  return state.wordStats[id] || { box:1, correctStreak:0, lastSeen:null };
}
function setWordStat(id, patch){
  state.wordStats[id] = { ...getWordStat(id), ...patch, lastSeen: Date.now() };
  lsSet(KEY+":words", state.wordStats);
}
function promoteBox(id){
  const s = getWordStat(id);
  const nb = Math.min(s.box+1, DATA.reviewPolicy.leitnerBoxes);
  setWordStat(id, { box:nb, correctStreak: s.correctStreak+1 });
}
function demoteBox(id){
  const s = getWordStat(id);
  setWordStat(id, { box:1, correctStreak:0 });
}

/* ============================================================
   AUDIO (Web Audio API 합성, 즉석 톤 생성)
   ============================================================ */
let ac = null;
function getAC(){
  if(!ac){
    try{ ac = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ ac = null; }
  }
  // resume on user gesture
  if(ac && ac.state === "suspended"){ try{ ac.resume(); }catch(e){} }
  return ac;
}
function tone({type="sine", freq=440, dur=.15, vol=.18, atk=.005, dec=.05, slide=null, t0=0}){
  const a = getAC(); if(!a || !state.sfxOn) return;
  const t = a.currentTime + t0;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if(slide){ o.frequency.exponentialRampToValueAtTime(Math.max(slide,1), t+dur); }
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t+dur+.02);
}
function noise({dur=.04, vol=.12, t0=0, hp=null}){
  const a = getAC(); if(!a || !state.sfxOn) return;
  const t = a.currentTime + t0;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate*dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * (1-i/data.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const g = a.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  let node = src;
  if(hp){
    const f = a.createBiquadFilter(); f.type="highpass"; f.frequency.value=hp;
    node.connect(f); f.connect(g);
  } else {
    node.connect(g);
  }
  g.connect(a.destination);
  src.start(t); src.stop(t+dur);
}

const fx = {

    this.canvas = document.getElementById("fxCanvas");
    this.ctx = this.canvas.getContext("2d");
    this.resize();
    window.addEventListener("resize", ()=>this.resize());

  resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    this.canvas.width = window.innerWidth*dpr;
    this.canvas.height = window.innerHeight*dpr;
    this.canvas.style.width = window.innerWidth+"px";
    this.canvas.style.height = window.innerHeight+"px";
    this.ctx.setTransform(dpr,0,0,dpr,0,0);

            });

      }
    }
    if(!this.running) this.loop();
  },
  loop(){
    this.running = true;
    const tick = ()=>{
      const W = window.innerWidth, H = window.innerHeight;
      this.ctx.clearRect(0,0,W,H);
      this.parts = this.parts.filter(p => p.age < p.life);
      for(const p of this.parts){
        p.vy += p.g;
        p.x += p.vx; p.y += p.vy;
        p.age++;
        const alpha = Math.max(0, 1 - p.age/p.life);
        this.ctx.globalAlpha = alpha;
        this.ctx.fillStyle = p.color;
        if(p.shape === "coin"){
          this.ctx.beginPath();
          this.ctx.ellipse(p.x, p.y, p.size, p.size*0.6, p.age*.2, 0, Math.PI*2);
          this.ctx.fill();
          this.ctx.strokeStyle = "rgba(255,255,255,.5)";
          this.ctx.lineWidth = 1;
          this.ctx.stroke();
        } else if(p.shape === "star"){
          drawStar(this.ctx, p.x, p.y, 5, p.size*1.5, p.size*.7);
          this.ctx.fill();
        } else {
          this.ctx.beginPath();
          this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          this.ctx.fill();
        }
      }
      this.ctx.globalAlpha = 1;
      if(this.parts.length > 0) requestAnimationFrame(tick);
      else this.running = false;
    };
    requestAnimationFrame(tick);
  }
};
function drawStar(ctx, cx, cy, spikes, outer, inner){
  ctx.beginPath();
  let rot = Math.PI/2*3, x=cx, y=cy, step = Math.PI/spikes;
  ctx.moveTo(cx, cy-outer);
  for(let i=0;i<spikes;i++){
    x = cx+Math.cos(rot)*outer; y = cy+Math.sin(rot)*outer; ctx.lineTo(x,y); rot += step;
    x = cx+Math.cos(rot)*inner; y = cy+Math.sin(rot)*inner; ctx.lineTo(x,y); rot += step;
  }
  ctx.lineTo(cx, cy-outer);
  ctx.closePath();
}

function fmtTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60), r = s%60;
  return String(m).padStart(2,"0")+":"+String(r).padStart(2,"0");
}
function startTimer(){
  if(state.tickHandle) clearInterval(state.tickHandle);
  state.tickHandle = setInterval(()=>{
    if(state.phase === "result"){ clearInterval(state.tickHandle); return; }
    const el = Date.now() - state.startTime + (state.sessionElapsedBase || 0);
    document.getElementById("timerVal").textContent = fmtTime(el);

}

/* ============================================================
   TTS — 여자 목소리 + 기존 대비 1.5배 느리게
   ============================================================ */
function pickFemaleVoice(){
  const voices = window.speechSynthesis.getVoices();
  if(!voices || !voices.length) return null;
  const en = voices.filter(v => /^en/i.test(v.lang));
  // 이름 기반 여성 보이스 매칭 (플랫폼별 표준 이름)
  const femaleRe = /female|woman|zira|samantha|karen|susan|victoria|allison|kate|serena|tessa|moira|fiona|jenny|aria|nova|sara|linda|amy|libby|monica|paulina|catherine|nancy|natasha/i;
  return en.find(v => femaleRe.test(v.name))
      || voices.find(v => femaleRe.test(v.name))
      || en[0]
      || voices[0]
      || null;
}
// 최초 로드 시 voices 캐시 (브라우저에 따라 비동기 로드)
if("speechSynthesis" in window){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
function speak(word){
  try{
    if("speechSynthesis" in window){
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = "en-US";
      u.rate = 0.6;   // 기존 .9 → 1.5배 느리게
      u.pitch = 1.0;
      const v = pickFemaleVoice();
      if(v) u.voice = v;
      window.speechSynthesis.speak(u);
    }
  }catch(e){}
}

const QUIZ_MODES = ["meaning-mcq","word-mcq","spelling","listening"];

function buildQuizPool(){
  const pool = [];
  const words = [...DATA.newWords];
  // 셔플
  const shuffled = shuffle(words).slice(0, 15);
  // 모드 균등 분배 (대략)
  const modeOrder = [
    ...Array(5).fill("meaning-mcq"),
    ...Array(5).fill("word-mcq"),
    ...Array(3).fill("spelling"),
    ...Array(2).fill("listening")
  ];

/* ============================================================
   ADVANCED (심화단계)
   ── 콜로케이션 영작 · 예문 빈칸 채우기
   ============================================================ */
function normalizeAnswer(s){
  return String(s||"")
    .toLowerCase()
    .replace(/[.,!?;:"'`~]/g,"")
    .replace(/\s+/g," ")
    .trim();
}
// 예문 en 을 알파벳 단어 + 사이 세그먼트로 파싱
function parseSentence(s){
  const tokens = [];
  const re = /([A-Za-z']+)|([^A-Za-z']+)/g;
  let m;
  while((m = re.exec(s)) !== null){
    if(m[1]) tokens.push({ word:true, text:m[1] });
    else     tokens.push({ word:false, text:m[2] });
  }
  return tokens;
}
// 빈칸 두 개 후보 인덱스 뽑기 — [원단어 위치, 그 외 알파벳4자+ 중 랜덤]
function pickBlanks(tokens, mainWord){
  const wordIdxs = tokens.map((t,i)=>t.word ? i : -1).filter(i=>i>=0);
  const mw = normalizeAnswer(mainWord);
  const stop = new Set(["the","a","an","of","is","are","was","were","be","been","being","to","and","or","in","on","at","for","with","by","from","as","it","its","this","that","these","those","he","she","they","we","you","i","him","her","them","us","my","your","his","their","our","not","no","so","if","but"]);
  const mainIdx = wordIdxs.find(i => normalizeAnswer(tokens[i].text) === mw);
  const others = wordIdxs.filter(i => i !== mainIdx);
  const strong = others.filter(i => tokens[i].text.length >= 4 && !stop.has(tokens[i].text.toLowerCase()));
  const medium = others.filter(i => tokens[i].text.length >= 3 && !stop.has(tokens[i].text.toLowerCase()));
  const anyOne = others;
  shuffle(strong); shuffle(medium); shuffle(anyOne);
  const picks = [];
  if(mainIdx !== undefined) picks.push(mainIdx);
  const secondPool = strong.length ? strong : medium.length ? medium : anyOne;
  if(secondPool.length){
    const sec = secondPool.find(i => i !== picks[0]);
    if(sec !== undefined) picks.push(sec);
  }
  // main 없을 때 두 개 이상 뽑기
  if(picks.length < 2){
    const extra = anyOne.find(i => !picks.includes(i));
    if(extra !== undefined) picks.push(extra);
  }
  return picks.slice(0,2).sort((a,b)=>a-b);
}
function buildAdvancedPool(){
  const collocPool = [];
  const clozePool  = [];
  const grammarPool = [];
  for(const w of DATA.newWords){
    // (1) 콜로케이션 영작
    if(w.pairs && w.pairs.collocBest){
      for(const c of w.pairs.collocBest){
        if(c && c.en && c.ko) collocPool.push({ word:w, mode:"colloc-write", colloc:c });
      }
    }
    // (2) 예문 빈칸 채우기
    if(w.ex && w.ex[0] && w.ex[0].en && w.ex[0].ko){
      const tokens = parseSentence(w.ex[0].en);
      const blankIdxs = pickBlanks(tokens, w.w);
      if(blankIdxs.length >= 1){
        clozePool.push({
          word:w, mode:"cloze",
          sentence:{ en:w.ex[0].en, ko:w.ex[0].ko },
          tokens, blankIdxs
        });
      }
    }
    // (3) 문법 빈칸 채우기
    if(Array.isArray(w.grammarQuiz)){
      for(const q of w.grammarQuiz){
        if(q && q.sentence && q.ko && q.answer){
          grammarPool.push({ word:w, mode:"grammar-fill", quiz:q });
        }
      }
    }
  }
  shuffle(collocPool); shuffle(clozePool); shuffle(grammarPool);
  const TARGET = 20;
  const picked = [];
  // 문법 우선 (있으면 최대 8개 or pool의 절반)
  const gTake = Math.min(grammarPool.length, Math.max(1, Math.min(8, Math.ceil(grammarPool.length / 2))));
  picked.push(...grammarPool.slice(0, gTake));
  // 나머지 자리는 콜로/예문 균등
  const rest = TARGET - picked.length;
  const cTake = Math.min(collocPool.length, Math.ceil(rest / 2));
  const zTake = Math.min(clozePool.length, rest - cTake);
  picked.push(...collocPool.slice(0, cTake));
  picked.push(...clozePool.slice(0, zTake));
  // 부족하면 남은 후보에서 보충
  if(picked.length < TARGET){
    const leftover = [
      ...grammarPool.slice(gTake),
      ...collocPool.slice(cTake),
      ...clozePool.slice(zTake)
    ];
    shuffle(leftover);
    picked.push(...leftover.slice(0, TARGET - picked.length));
  }
  shuffle(picked);
  return picked.slice(0, TARGET);
}

function renderQuiz(){
  if(state.quizIdx >= state.quizPool.length){
    finishSession();
    return;
  }
  state.quizAnswered = false;
  state.quizCurrent = state.quizPool[state.quizIdx];
  renderHeader();

  const { word, mode } = state.quizCurrent;
  const main = document.getElementById("main");

  let modeLabel = ({
    "meaning-mcq":"영→한 의미",
    "word-mcq":"한→영 단어",
    "spelling":"철자 입력",
    "listening":"듣고 받아쓰기",
    "colloc-write":"🎯 콜로케이션 영작",
    "cloze":"🎯 예문 빈칸 채우기",
    "grammar-fill":"📌 문법 서술형 빈칸"
  })[mode] || mode;

  let promptHTML = "";
  let answerHTML = "";

  if(mode === "meaning-mcq"){
    const correct = word.kr[0];
    const distractors = pickDistractors(word, "kr", 3);
    const opts = shuffle([correct, ...distractors]);
    promptHTML = `
      <div class="quiz-prompt">
        <div class="label">다음 단어의 뜻은?</div>
        <div class="qword">${escape(word.w)}</div>
        <div class="qph">${escape(word.ph||"")}</div>
      </div>`;
    answerHTML = `
      <div class="choices" id="choices">
        ${opts.map((o,i)=>`<button class="choice" data-v="${escape(o)}"><span class="idx">${i+1}</span><span>${escape(o)}</span></button>`).join("")}
      </div>`;
  } else if(mode === "word-mcq"){
    const correct = word.w;
    const distractors = pickDistractors(word, "w", 3);
    const opts = shuffle([correct, ...distractors]);
    promptHTML = `
      <div class="quiz-prompt">
        <div class="label">다음 뜻의 단어는?</div>
        <div class="qkr">${escape(word.kr.join(" · "))}</div>
      </div>`;
    answerHTML = `
      <div class="choices" id="choices">
        ${opts.map((o,i)=>`<button class="choice" data-v="${escape(o)}"><span class="idx">${i+1}</span><span>${escape(o)}</span></button>`).join("")}
      </div>`;
  } else if(mode === "spelling"){
    promptHTML = `
      <div class="quiz-prompt">
        <div class="label">뜻을 보고 영어 단어를 입력하세요</div>
        <div class="qkr">${escape(word.kr.join(" · "))}</div>
        <div class="qph">${escape(word.ph||"")}</div>
      </div>`;
    answerHTML = `
      <div class="input-box">
        <input type="text" id="ansInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="영어로 입력...">
        <button class="submit-btn" id="submitBtn">제출</button>
      </div>`;
  } else if(mode === "listening"){
    promptHTML = `
      <div class="quiz-prompt">
        <div class="label">발음을 듣고 단어를 입력하세요</div>
        <button class="lis-btn" id="lisBtn">🔊 다시 듣기</button>
        <div class="qph">${escape(word.ph||"")}</div>
      </div>`;
    answerHTML = `
      <div class="input-box">
        <input type="text" id="ansInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="영어로 입력...">
        <button class="submit-btn" id="submitBtn">제출</button>
      </div>`;
  } else if(mode === "colloc-write"){
    const c = state.quizCurrent.colloc;
    const hint = firstCharsHint(c.en);
    promptHTML = `
      <div class="quiz-prompt">
        <div class="label">뜻에 맞는 <b>콜로케이션</b>을 영어로 쓰세요</div>
        <div class="qkr">${escape(c.ko)}</div>
      </div>`;
    answerHTML = `
      <div class="input-box">
        <input type="text" id="ansInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${escape(hint)}">
        <button class="submit-btn" id="submitBtn">제출</button>
      </div>`;
  } else if(mode === "cloze"){
    const { tokens, blankIdxs, sentence } = state.quizCurrent;
    // 문장 렌더 — 빈칸 위치에 인풋 (정답의 첫 글자 placeholder 힌트)
    const sentHTML = tokens.map((t, i) => {
      const bIdx = blankIdxs.indexOf(i);
      if(bIdx >= 0){
        const ans = t.text;
        const size = Math.max(4, Math.min(14, ans.length + 2));
        const hint = firstCharsHint(ans);
        return `<input type="text" class="cloze-input" data-blank-idx="${bIdx}" data-ans="${escape(ans)}" size="${size}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${escape(hint)}">`;
      }
      return escape(t.text);
    }).join("");
    promptHTML = `
      <div class="quiz-prompt cloze-prompt">
        <div class="label">해석에 맞게 <b>${blankIdxs.length}개 빈칸</b>을 채우세요</div>
        <div class="qkr">${escape(sentence.ko)}</div>
        <div class="cloze-sentence">${sentHTML}</div>
      </div>`;
    answerHTML = `
      <div class="input-box only-btn">
        <button class="submit-btn" id="submitBtn">제출</button>
      </div>`;
  } else if(mode === "grammar-fill"){
    const { quiz } = state.quizCurrent;
    // sentence 안의 _____ (밑줄 3개 이상)을 인풋으로 대체 · 각 빈칸에 정답의 첫 글자만 placeholder 로 힌트
    const ansList = Array.isArray(quiz.answer) ? quiz.answer : [quiz.answer];
    let blankSeq = 0;
    const sentHTML = escape(quiz.sentence).replace(/_{3,}/g, () => {
      const ans = ansList[blankSeq] ?? ansList[0];
      const size = Math.max(5, Math.min(20, (ans||'').length + 2));
      const idx = blankSeq++;
      const hint = firstCharsHint(ans);
      return `<input type="text" class="cloze-input grammar-input" data-blank-idx="${idx}" data-ans="${escape(ans)}" size="${size}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${escape(hint)}">`;
    });

      <div class="quiz-prompt cloze-prompt grammar-prompt">
        <div class="label">📌 <b>문법 포인트</b> — 해석에 맞게 빈칸을 채우세요</div>
        <div class="qkr">${escape(quiz.ko)}</div>
        <div class="cloze-sentence">${sentHTML}</div>
      </div>`;
    answerHTML = `
      <div class="input-box only-btn">

  main.innerHTML = `

    inputs.forEach((inp, i)=>{

          if(next) next.focus();
          else handleSubmit();
        }
      });
    });
    document.getElementById("submitBtn").addEventListener("click", handleSubmit);
    if(inputs[0]) setTimeout(()=>inputs[0].focus(), 100);
  } else {
    const inp = document.getElementById("ansInput");
    inp.addEventListener("keydown", e=>{
      if(e.key === "Enter") handleSubmit();
    });
    document.getElementById("submitBtn").addEventListener("click", handleSubmit);
    setTimeout(()=>inp.focus(), 100);
    if(mode === "listening"){
      setTimeout(()=>speak(word.w), 250);
      document.getElementById("lisBtn").addEventListener("click", ()=>speak(word.w));
    }
  }
}

function pickDistractors(word, field, n){
  const pool = DATA.newWords.filter(w=>w.id !== word.id);
  shuffle(pool);
  const seen = new Set();
  const out = [];
  for(const w of pool){
    let v;
    if(field === "kr") v = w.kr[0];
    else if(field === "w") v = w.w;
    if(!v || seen.has(v)) continue;
    seen.add(v);
    out.push(v);
    if(out.length >= n) break;
  }
  return out;
}

function handleChoice(btn){
  if(state.quizAnswered) return;
  state.quizAnswered = true;
  const { word, mode } = state.quizCurrent;
  const picked = btn.dataset.v;
  const correct = (mode === "meaning-mcq") ? word.kr[0] : word.w;
  const isCorrect = picked === correct;

  document.querySelectorAll(".choice").forEach(c=>{
    if(c.dataset.v === correct) c.classList.add("correct");
    else if(c === btn && !isCorrect) c.classList.add("wrong");
    else c.classList.add("dimmed");
  });

  finishQuestion(isCorrect);
}

function handleSubmit(){
  if(state.quizAnswered) return;
  const { word, mode } = state.quizCurrent;

  // ── 심화: 콜로케이션 영작 ──────────────────────────────
  if(mode === "colloc-write"){
    const inp = document.getElementById("ansInput");
    const val = normalizeAnswer(inp.value);
    if(!val) return;
    state.quizAnswered = true;
    const correct = normalizeAnswer(state.quizCurrent.colloc.en);
    const isCorrect = val === correct;
    inp.classList.add(isCorrect ? "correct" : "wrong");
    inp.disabled = true;
    document.getElementById("submitBtn").disabled = true;
    if(!isCorrect){
      document.getElementById("feedback").innerHTML = `정답: <b style="color:var(--grade)">${escape(state.quizCurrent.colloc.en)}</b>`;
    }
    finishQuestion(isCorrect);
    return;
  }

  // ── 심화: 예문 빈칸 채우기 · 문법 빈칸 채우기 ────────────
  if(mode === "cloze" || mode === "grammar-fill"){
    const inputs = Array.from(document.querySelectorAll(".cloze-input"));
    if(inputs.some(i => !i.value.trim())) return;
    state.quizAnswered = true;
    let allOk = true;
    inputs.forEach(i => {
      const guess = normalizeAnswer(i.value);
      const ans = normalizeAnswer(i.dataset.ans);
      const ok = guess === ans;
      i.classList.add(ok ? "correct" : "wrong");
      i.disabled = true;
      if(!ok) allOk = false;
    });
    document.getElementById("submitBtn").disabled = true;
    if(!allOk){
      const answers = inputs.map(i => `<b style="color:var(--grade)">${escape(i.dataset.ans)}</b>`).join(" , ");
      document.getElementById("feedback").innerHTML = `정답: ${answers}`;
    }
    finishQuestion(allOk);
    return;
  }

  // ── 기본: 철자·리스닝 ────────────────────────────────
  const inp = document.getElementById("ansInput");
  const val = (inp.value||"").trim().toLowerCase();
  if(!val) return;
  state.quizAnswered = true;
  const isCorrect = val === word.w.toLowerCase();
  inp.classList.add(isCorrect ? "correct" : "wrong");
  inp.disabled = true;
  document.getElementById("submitBtn").disabled = true;
  if(!isCorrect){
    document.getElementById("feedback").innerHTML = `정답: <b style="color:var(--grade)">${escape(word.w)}</b>`;
  }
  finishQuestion(isCorrect);
}

function finishQuestion(isCorrect){
  const { word } = state.quizCurrent;
  const fb = document.getElementById("feedback");
  if(isCorrect){
    state.quizCorrect++;
    state.streak++;
    state.xp += DATA.xpTable.correct;
    promoteBox(word.id);
    SFX.correct();
    fb.classList.add("ok");
    fb.textContent = "정답! +" + DATA.xpTable.correct + " XP " + (state.cbMode ? "✓" : "");
    document.querySelector(".quiz-card").classList.add("bounce-correct");
    handleStreak();
  } else {
    state.streak = 0;
    demoteBox(word.id);
    state.quizWrongIds.add(word.id);
    state.quizWrongItems.push(state.quizCurrent);
    SFX.wrong();
    fb.classList.add("bad");
    if(!fb.textContent) fb.textContent = "오답! " + (state.cbMode ? "✕ " : "") + " 정답: " + word.w;
    document.querySelector(".quiz-card").classList.add("shake");
  }
  state.maxStreak = Math.max(state.maxStreak, state.streak);
  state.perChapterMaxStreak = Math.max(state.perChapterMaxStreak, state.streak);
  renderHeader();

  setTimeout(()=>{
    state.quizIdx++;
    renderQuiz();
  }, isCorrect ? 900 : 1500);
}

   ============================================================ */
function finishSession(){
  state.phase = "result";
  if(state.tickHandle) clearInterval(state.tickHandle);
  const total = state.quizPool.length;
  const correct = state.quizCorrect;
  const pct = Math.round(correct / total * 100);
  const isPerfect = correct === total;
  const elapsed = Date.now() - state.startTime + (state.sessionElapsedBase || 0);

  const isAdv = state.quizType === "advanced";
  const clearFlag = isAdv ? "advancedCleared" : "chapterCleared";
  const clearKey  = isAdv ? (KEY+":cleared_adv") : (KEY+":cleared");
  const resultKey = isAdv ? (KEY+":lastResult_adv") : (KEY+":lastResult");

  // chapter clear?
  let bonusXP = 0;
  const newCleared = !state[clearFlag];
  if(newCleared){
    bonusXP += DATA.xpTable.firstClear;
    state[clearFlag] = true;
    lsSet(clearKey, true);
  }
  // 기본단계 90%+ 달성 → 심화 잠금 해제 (한 번 해금되면 유지)
  let newUnlock = false;
  if(!isAdv && pct >= 90 && !state.basicThresholdPassed){
    state.basicThresholdPassed = true;
    lsSet(KEY+":basic_90pct", true);
    newUnlock = true;
  }
  if(isPerfect){
    bonusXP += DATA.xpTable.perfectChapter;
    state.perfectFlag = true;
  }
  state.xp += bonusXP;
  state.xpTotal += state.xp;
  state.globalMaxStreak = Math.max(state.globalMaxStreak, state.maxStreak);
  lsSet(XP_GLOBAL_KEY, state.xpTotal);
  lsSet(MAXSTREAK_KEY, state.globalMaxStreak);
  lsSet(resultKey, { date:Date.now(), correct, total, xp:state.xp, elapsed });

  // badges
  const earnedBadges = [];
  if(newCleared) earnedBadges.push(DATA.badges.find(b=>b.id==="first-step"));
  if(state.maxStreak >= 10) earnedBadges.push(DATA.badges.find(b=>b.id==="streak-10"));
  if(isPerfect) earnedBadges.push(DATA.badges.find(b=>b.id==="perfect"));

  renderHeader();

  const main = document.getElementById("main");
  const stageLbl = isAdv ? "심화단계" : "기본단계";
  const passedM3 = (pct >= 60) && (DATA.grade === '중3');
  const title = passedM3
    ? `💰 방금 당신의 미래 연봉이 10만원 더 올라갔슴돠!!`

  // 심화면 [🎯 심화 다시] + [🏠 홈으로]. 기본이면 [🔁 다시 보기] + (심화 해금 시) [🎯 심화 도전]
  const canGoAdvanced = !isAdv && state.basicThresholdPassed;
  const advGrand = isAdv && pct >= 90;   // 심화 90%+ 특별 축포
  const unlockBanner = newUnlock
    ? `<div style="margin:8px auto 6px;padding:10px 14px;border-radius:var(--radius-md);

       </div>`
    : "";
  const grandBanner = advGrand
    ? `<div class="grand-banner">
         <div class="grand-line">🎆 당신이 <b>배곧 쵝오</b>! 🎆</div>

      SFX.grandFanfare();                                          // 브라스 팡파레+아르페지오+종
      setTimeout(()=>{ fx.spawn("fireworks-grand"); SFX.fireworks(); }, 300);
      setTimeout(()=>{ fx.spawn("jackpot-full"); SFX.coinDrop(); }, 700);
      setTimeout(()=>{ fx.spawn("fireworks-grand"); SFX.streak(); }, 1300);
      setTimeout(()=>{ fx.spawn("rainbow-burst"); SFX.fireworks(); }, 1900);
      setTimeout(()=>{ fx.spawn("jackpot-full"); SFX.bigWin(); }, 2500);
      setTimeout(()=>{ fx.spawn("fireworks-grand"); SFX.coinDrop(); }, 3300);
      setTimeout(()=>{ SFX.grandFanfare(); }, 4000);                // 마지막 대미 팡파레
    } else if(isPerfect){
      fx.spawn("rainbow-burst");
      SFX.bigWin();
      setTimeout(()=>fx.spawn("jackpot-full"), 600);
      setTimeout(()=>SFX.coinDrop(), 700);
    } else if(newCleared){
      fx.spawn("jackpot-full");
      SFX.levelUp();
      setTimeout(()=>SFX.coinDrop(), 500);
    } else if(pct >= 80){
      fx.spawn("reel-spin-small");
      SFX.spinReel();
    }
  }, 250);

  document.getElementById("retryBtn").addEventListener("click", ()=>{
    if(isAdv){ startAdvanced(); }
    else{ renderHome(); }
  });
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.addEventListener("click", ()=>{
    alert("Lv.2 미생성 — 시범 버전입니다.");
  });
  const goAdvBtn = document.getElementById("goAdvBtn");
  if(goAdvBtn) goAdvBtn.addEventListener("click", ()=>{
    state.quizType = "advanced";
    startAdvanced();
  });
  const homeBtn = document.getElementById("homeBtn");
  if(homeBtn) homeBtn.addEventListener("click", ()=> renderHome());
  const retryWrongBtn = document.getElementById("retryWrongBtn");
  if(retryWrongBtn){
    retryWrongBtn.addEventListener("click", ()=>{
      if(isAdv) startAdvancedRetryWrong();
      else startBasicRetryWrong();
    });
  }
}

/* ============================================================
   UTILS
   ============================================================ */
/* 빈칸 힌트: 정답 문자열의 각 단어 첫 글자를 "a… b…" 형태로 반환
   예: "appeared" → "a…"  ·  "in the absence of" → "i… t… a… o…"  ·  "feel bad" → "f… b…"  */
function firstCharsHint(s){
  return (s||'').trim().split(/\s+/).filter(Boolean).map(w => (w.charAt(0)||'') + '…').join(' ');
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function escape(s){
  if(s == null) return "";
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* ============================================================
   GLOBAL EVENTS
   ============================================================ */
document.getElementById("sfxBtn").addEventListener("click", ()=>{
  state.sfxOn = !state.sfxOn;
  lsSet(SFX_KEY, state.sfxOn);
  renderHeader();
  if(state.sfxOn){ getAC(); SFX.streak(); }
});
document.getElementById("cbBtn").addEventListener("click", ()=>{
  state.cbMode = !state.cbMode;
  lsSet(CB_KEY, state.cbMode);
  document.body.classList.toggle("cb-mode", state.cbMode);
  renderHeader();
});

// keyboard
document.addEventListener("keydown", e=>{
  if(state.phase === "study"){
    if(e.code === "Space"){ e.preventDefault(); flipCard(); }
    else if(e.key === "1") navCard("prev");
    else if(e.key === "2") navCard("home");
    else if(e.key === "3") navCard("next");
    else if(e.key === "ArrowLeft") navCard("prev");
    else if(e.key === "ArrowRight") navCard("next");
  } else if(state.phase === "quiz" && !state.quizAnswered){
    const mode = state.quizCurrent && state.quizCurrent.mode;
    if(mode === "meaning-mcq" || mode === "word-mcq"){
      const n = parseInt(e.key, 10);
      if(n >= 1 && n <= 4){
        const btns = document.querySelectorAll(".choice");
        if(btns[n-1]) handleChoice(btns[n-1]);
      }
    }
  }
});

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  fx.init();
  if(state.cbMode) document.body.classList.add("cb-mode");
  renderHome();
}
boot();
</script>
